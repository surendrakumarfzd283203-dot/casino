<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Small | Solo Casino</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dice-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
        }
        .die {
            width: 80px;
            height: 80px;
            background: white;
            color: #111;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }
        .die.rolling {
            animation: roll 0.2s infinite;
        }
        @keyframes roll {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(0.9); }
            100% { transform: rotate(360deg) scale(1); }
        }
        .prediction-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        .pred-btn {
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #333;
            background: #1a1a1a;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pred-btn.selected {
            border-color: #ff9800;
            background: rgba(255, 152, 0, 0.1);
        }
        .pred-btn h4 { font-size: 24px; margin-bottom: 5px; }
        .pred-btn span { font-size: 14px; opacity: 0.7; }

        .big-text { color: #2196f3; }
        .small-text { color: #f44336; }

        .result-panel {
            min-height: 80px;
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Big Small Dice</h1>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="wallet.html">Wallet</a>
            <a href="profile.html">Profile</a>
        </nav>
    </header>

    <div class="form-box" style="max-width: 600px; text-align: center;">
        <div class="balance-badge" style="display: inline-block; background: rgba(255, 152, 0, 0.1); color: #ff9800; padding: 8px 15px; border-radius: 20px; margin-bottom: 15px; font-weight: bold;">
            Balance: <span id="balanceDisplay">0</span> Coins
        </div>

        <div class="dice-container" id="diceContainer">
            <div class="die" id="die1">?</div>
            <div class="die" id="die2">?</div>
            <div class="die" id="die3">?</div>
        </div>

        <div class="prediction-buttons">
            <button class="pred-btn" onclick="selectPrediction('SMALL')" id="btnSmall">
                <span class="small-text" style="display: block; font-size: 24px; font-weight: bold; margin-bottom: 5px;">SMALL</span>
                <span>3 - 10</span>
            </button>
            <button class="pred-btn" onclick="selectPrediction('BIG')" id="btnBig">
                <span class="big-text" style="display: block; font-size: 24px; font-weight: bold; margin-bottom: 5px;">BIG</span>
                <span>11 - 18</span>
            </button>
        </div>

        <div class="wallet-card" style="margin-bottom: 20px;">
            <label for="betAmount">Bet Amount</label>
            <input type="number" id="betAmount" value="10" min="1" style="text-align: center; font-size: 20px;">
        </div>

        <button class="button-primary" id="playBtn" onclick="playGame()" style="font-size: 20px; font-weight: bold;">ROLL DICE</button>

        <div class="result-panel" id="resultPanel"></div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const token = localStorage.getItem("token");
        if (!token) location.href = "login.html";

        let selectedPrediction = null;
        let currentBalance = 0;

        async function fetchBalance() {
            try {
                const res = await fetch(`${API_URL}/api/profile`, {
                    headers: { authorization: token }
                });
                const data = await res.json();
                if (data.success) {
                    currentBalance = data.user.coins;
                    document.getElementById("balanceDisplay").innerText = currentBalance;
                }
            } catch (e) { console.error(e); }
        }

        fetchBalance();

        function selectPrediction(pred) {
            selectedPrediction = pred;
            document.getElementById("btnSmall").classList.remove("selected");
            document.getElementById("btnBig").classList.remove("selected");

            if (pred === "SMALL") document.getElementById("btnSmall").classList.add("selected");
            else document.getElementById("btnBig").classList.add("selected");
        }

        async function playGame() {
            const betAmount = parseInt(document.getElementById("betAmount").value);

            if (!selectedPrediction) return alert("Select BIG or SMALL");
            if (isNaN(betAmount) || betAmount <= 0) return alert("Enter valid bet");
            if (betAmount > currentBalance) {
                if(confirm("Insufficient Balance! Deposit now to continue playing?")) {
                    location.href = "wallet.html";
                }
                return;
            }

            const playBtn = document.getElementById("playBtn");
            const resultPanel = document.getElementById("resultPanel");
            const dice = [document.getElementById("die1"), document.getElementById("die2"), document.getElementById("die3")];

            playBtn.disabled = true;
            resultPanel.innerText = "Rolling...";
            resultPanel.style.color = "white";

            // Visual effect
            dice.forEach(d => d.classList.add("rolling"));

            try {
                const res = await fetch(`${API_URL}/api/play/bigsmall`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        authorization: token
                    },
                    body: JSON.stringify({
                        betAmount: betAmount,
                        prediction: selectedPrediction
                    })
                });

                const data = await res.json();

                // Keep rolling for at least 1 second
                setTimeout(() => {
                    dice.forEach(d => d.classList.remove("rolling"));

                    if (data.success) {
                        // Set dice values
                        data.diceRolls.forEach((val, i) => {
                            dice[i].innerText = val;
                        });

                        if (data.result === "WIN") {
                            resultPanel.innerText = `WIN! Total: ${data.total} (${data.actualResult})`;
                            resultPanel.style.color = "#4caf50";
                        } else {
                            resultPanel.innerText = `LOSE! Total: ${data.total} (${data.actualResult})`;
                            resultPanel.style.color = "#f44336";
                        }

                        currentBalance = data.newBalance;
                        document.getElementById("balanceDisplay").innerText = currentBalance;
                    } else {
                        alert(data.message || "Game Error");
                    }
                    playBtn.disabled = false;
                }, 1000);

            } catch (e) {
                console.error(e);
                alert("Server Connection Error");
                dice.forEach(d => d.classList.remove("rolling"));
                playBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
