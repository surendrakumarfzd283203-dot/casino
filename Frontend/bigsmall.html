<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Small | Solo Casino</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .timer-box { font-size: 40px; font-weight: bold; color: #ff9800; margin: 20px 0; }
        .dice-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        .die {
            width: 70px;
            height: 70px;
            background: white;
            color: #111;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .prediction-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        .pred-btn {
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #333;
            background: #1a1a1a;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pred-btn.selected {
            border-color: #ff9800;
            background: rgba(255, 152, 0, 0.1);
        }
        .big-text { color: #2196f3; }
        .small-text { color: #f44336; }

        .history-list {
            margin-top: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .history-item {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 14px;
        }
        .bg-big { background: #2196f3; }
        .bg-small { background: #f44336; }
    </style>
</head>
<body>
    <header>
        <h1>Big Small</h1>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="wallet.html">Wallet</a>
        </nav>
    </header>

    <div class="form-box" style="max-width: 600px; text-align: center;">
        <div class="balance-badge" style="display: inline-block; background: rgba(255, 152, 0, 0.1); color: #ff9800; padding: 8px 15px; border-radius: 20px; font-weight: bold;">
            Balance: <span id="balance">0</span> Coins
        </div>

        <div class="timer-box" id="timer">00:00</div>
        <div style="font-size: 14px; opacity: 0.7; margin-bottom: 10px;">Round ID: <span id="roundId">-</span></div>

        <div class="dice-container" id="lastResultDice">
            <div class="die">?</div>
            <div class="die">?</div>
            <div class="die">?</div>
        </div>
        <div id="lastResultText" style="font-weight: bold; margin-bottom: 20px;">Waiting for result...</div>

        <div class="prediction-buttons">
            <button class="pred-btn" onclick="selectPrediction('SMALL')" id="btnSmall">
                <span class="small-text" style="display: block; font-size: 24px;">SMALL</span>
                <span style="font-size: 14px; opacity: 0.7;">3 - 10</span>
            </button>
            <button class="pred-btn" onclick="selectPrediction('BIG')" id="btnBig">
                <span class="big-text" style="display: block; font-size: 24px;">BIG</span>
                <span style="font-size: 14px; opacity: 0.7;">11 - 18</span>
            </button>
        </div>

        <div class="wallet-card">
            <label>Bet Amount</label>
            <input type="number" id="betAmount" value="10" min="10" style="text-align: center; font-size: 20px;">
        </div>

        <button class="button-primary" id="placeBetBtn" onclick="placeBet()" style="margin-top: 20px;">PLACE BET</button>

        <div class="history-list" id="history"></div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const token = localStorage.getItem("token");
        if (!token) location.href = "login.html";

        let selectedValue = null;
        let currentBalance = 0;
        let lastRoundId = null;

        const timerDisplay = document.getElementById("timer");
        const roundIdDisplay = document.getElementById("roundId");
        const historyContainer = document.getElementById("history");
        const lastResultDice = document.getElementById("lastResultDice");
        const lastResultText = document.getElementById("lastResultText");

        async function fetchState() {
            try {
                const res = await fetch(`${API_URL}/api/game/bigsmall/state`, {
                    headers: { authorization: token }
                });
                const data = await res.json();
                if (data.success) {
                    updateUI(data);
                }
            } catch (e) { console.error(e); }
        }

        function updateUI(data) {
            roundIdDisplay.innerText = data.roundId;
            const mins = Math.floor(data.timer / 60);
            const secs = data.timer % 60;
            timerDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

            if (data.timer < 5) {
                document.getElementById("placeBetBtn").disabled = true;
                document.getElementById("placeBetBtn").innerText = "WAITING...";
            } else {
                document.getElementById("placeBetBtn").disabled = false;
                document.getElementById("placeBetBtn").innerText = "PLACE BET";
            }

            if (data.history && data.history.length > 0) {
                const last = data.history[0];
                if (last.roundId !== lastRoundId) {
                    lastRoundId = last.roundId;
                    renderLastResult(last);
                    fetchBalance(); // Refresh balance after a round ends
                }
                renderHistory(data.history);
            }
        }

        function renderLastResult(last) {
            lastResultDice.innerHTML = "";
            last.dice.forEach(val => {
                const d = document.createElement("div");
                d.className = "die";
                d.innerText = val;
                lastResultDice.appendChild(d);
            });
            lastResultText.innerText = `Last Result: ${last.total} (${last.result})`;
            lastResultText.style.color = last.result === 'BIG' ? '#2196f3' : '#f44336';
        }

        function renderHistory(history) {
            historyContainer.innerHTML = "";
            history.forEach(h => {
                const item = document.createElement("div");
                item.className = `history-item ${h.result === 'BIG' ? 'bg-big' : 'bg-small'}`;
                item.innerText = h.result[0];
                item.title = `Total: ${h.total}`;
                historyContainer.appendChild(item);
            });
        }

        function selectPrediction(val) {
            selectedValue = val;
            document.querySelectorAll(".pred-btn").forEach(el => el.classList.remove("selected"));
            if (val === 'SMALL') document.getElementById("btnSmall").classList.add("selected");
            else document.getElementById("btnBig").classList.add("selected");
        }

        async function placeBet() {
            const amount = parseInt(document.getElementById("betAmount").value);
            if (!selectedValue) return alert("Select BIG or SMALL");
            if (isNaN(amount) || amount < 10) return alert("Min bet is 10");

            try {
                const res = await fetch(`${API_URL}/api/game/bigsmall/bet`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", authorization: token },
                    body: JSON.stringify({ prediction: selectedValue, amount })
                });
                const data = await res.json();
                if (data.success) {
                    alert("Bet Placed!");
                    fetchBalance();
                } else {
                    alert(data.message);
                }
            } catch (e) { alert("Server Error"); }
        }

        async function fetchBalance() {
            const res = await fetch(`${API_URL}/api/profile`, { headers: { authorization: token } });
            const data = await res.json();
            if (data.success) {
                currentBalance = data.user.coins;
                document.getElementById("balance").innerText = currentBalance.toLocaleString();
            }
        }

        setInterval(fetchState, 2000);
        fetchBalance();
    </script>
</body>
</html>
