<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Small | Solo Casino</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --win-green: #28a745;
            --win-red: #ef4444;
            --gold: #d4af37;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .balance-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 20px;
            color: var(--gold);
            font-weight: bold;
        }

        .timer-box {
            text-align: center;
            margin-bottom: 20px;
        }
        #timer { font-size: 32px; font-weight: bold; color: var(--gold); }

        .dice-display {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .die {
            width: 60px; height: 60px;
            background: white; color: black;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .prediction-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .pred-btn {
            background: #1e293b;
            border: 2px solid #334155;
            color: white;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
        }
        .pred-btn.selected { border-color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        .pred-btn h3 { margin: 0; font-size: 24px; }
        .pred-btn span { font-size: 12px; opacity: 0.6; }

        .bet-input-section {
            background: #1e293b;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .input-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .input-row input {
            background: #000;
            border: 1px solid #334155;
            color: white;
            padding: 8px;
            width: 80px;
            border-radius: 5px;
            text-align: center;
        }

        .action-btns { display: flex; gap: 10px; }
        .btn-confirm { flex: 2; background: var(--win-green); color: white; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-cancel { flex: 1; background: #444; color: white; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; display: none; }

        .result-display {
            text-align: center;
            padding: 15px;
            margin-top: 20px;
            border-radius: 10px;
            font-weight: bold;
            display: none;
        }

        .history {
            margin-top: 20px;
            display: flex;
            gap: 5px;
            overflow-x: auto;
        }
        .hist-item {
            width: 30px; height: 30px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold;
            color: white;
        }
        .bg-big { background: #3b82f6; }
        .bg-small { background: #ef4444; }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="location.href='dashboard.html'" style="background:none; border:none; color:white; font-size: 20px;"><i class="fas fa-arrow-left"></i></button>
        <div class="balance-box">₹ <span id="balance">0.00</span></div>
    </div>

    <div class="timer-box">
        <div style="font-size: 12px; opacity: 0.6;">TIME LEFT</div>
        <div id="timer">00:00</div>
    </div>

    <div class="dice-display" id="diceBox">
        <div class="die">?</div>
        <div class="die">?</div>
        <div class="die">?</div>
    </div>

    <div class="prediction-grid">
        <div class="pred-btn" id="pred-SMALL" onclick="selectPred('SMALL')">
            <h3>SMALL</h3>
            <span>3 - 10</span>
        </div>
        <div class="pred-btn" id="pred-BIG" onclick="selectPred('BIG')">
            <h3>BIG</h3>
            <span>11 - 18</span>
        </div>
    </div>

    <div class="bet-input-section">
        <div class="input-row">
            <span>Bet Amount</span>
            <input type="number" id="betAmount" value="100" min="10">
        </div>
        <div class="action-btns">
            <button id="cancelBtn" class="btn-cancel" onclick="cancelBet()">CANCEL</button>
            <button id="confirmBtn" class="btn-confirm" onclick="placeBet()">PLACE BET</button>
        </div>
    </div>

    <div class="result-display" id="resultBox"></div>

    <div class="history" id="history"></div>

    <script src="js/config.js"></script>
    <script>
        const token = localStorage.getItem("token");
        let selectedValue = null;
        let isBetPlaced = false;
        let lastRoundId = null;

        async function fetchState() {
            try {
                const res = await fetch(`${API_URL}/api/game/bigsmall/state`, { headers: { authorization: token } });
                const data = await res.json();
                if (data.success) {
                    updateUI(data);
                }
            } catch (e) {}
        }

        function updateUI(data) {
            const mins = Math.floor(data.timer / 60);
            const secs = data.timer % 60;
            document.getElementById("timer").innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

            const confirmBtn = document.getElementById("confirmBtn");
            const cancelBtn = document.getElementById("cancelBtn");

            if (data.timer < 5) {
                confirmBtn.disabled = true;
                confirmBtn.innerText = "WAITING...";
            } else if (!isBetPlaced) {
                confirmBtn.disabled = false;
                confirmBtn.innerText = "PLACE BET";
                cancelBtn.style.display = "none";
            }

            if (data.history && data.history.length > 0) {
                const last = data.history[0];
                if (last.roundId !== lastRoundId) {
                    lastRoundId = last.roundId;
                    renderResult(last);
                    fetchBalance();
                    if (isBetPlaced) {
                        checkWin(last);
                        isBetPlaced = false;
                    }
                }
                renderHistory(data.history);
            }
        }

        function selectPred(val) {
            if (isBetPlaced) return;
            selectedValue = val;
            document.getElementById("pred-SMALL").classList.remove("selected");
            document.getElementById("pred-BIG").classList.remove("selected");
            document.getElementById(`pred-${val}`).classList.add("selected");
        }

        async function placeBet() {
            if (!selectedValue) return alert("Select BIG or SMALL");
            const amount = document.getElementById("betAmount").value;
            try {
                const res = await fetch(`${API_URL}/api/game/bigsmall/bet`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", authorization: token },
                    body: JSON.stringify({ prediction: selectedValue, amount })
                });
                const data = await res.json();
                if (data.success) {
                    isBetPlaced = true;
                    document.getElementById("confirmBtn").innerText = "BET PLACED";
                    document.getElementById("confirmBtn").disabled = true;
                    document.getElementById("cancelBtn").style.display = "block";
                    fetchBalance();
                } else alert(data.message);
            } catch (e) {}
        }

        function cancelBet() {
            // Simplified cancel logic
            isBetPlaced = false;
            document.getElementById("confirmBtn").disabled = false;
            document.getElementById("confirmBtn").innerText = "PLACE BET";
            document.getElementById("cancelBtn").style.display = "none";
            alert("Bet Cancelled!");
            fetchBalance();
        }

        function renderResult(last) {
            const diceBox = document.getElementById("diceBox");
            diceBox.innerHTML = last.dice.map(d => `<div class="die">${d}</div>`).join('');
        }

        function checkWin(last) {
            const resBox = document.getElementById("resultBox");
            resBox.style.display = "block";
            if (last.result === selectedValue) {
                resBox.innerText = `YOU WON! Total: ${last.total}`;
                resBox.style.background = "var(--win-green)";
            } else {
                resBox.innerText = `YOU LOST! Total: ${last.total}`;
                resBox.style.background = "var(--win-red)";
            }
            setTimeout(() => resBox.style.display = "none", 5000);
        }

        function renderHistory(history) {
            document.getElementById("history").innerHTML = history.slice(0, 10).map(h => `
                <div class="hist-item ${h.result === 'BIG' ? 'bg-big' : 'bg-small'}">${h.result[0]}</div>
            `).join('');
        }

        async function fetchBalance() {
            const res = await fetch(`${API_URL}/api/profile`, { headers: { authorization: token } });
            const data = await res.json();
            if (data.success) {
                document.getElementById("balance").innerText = data.user.coins.toFixed(2);
            }
        }

        setInterval(fetchState, 1000);
        fetchBalance();
    </script>
</body>
</html>
