<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History | Solo Casino</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        .filter-btn {
            padding: 8px 15px;
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            border-radius: 10px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }
        .filter-btn.active { background: var(--primary); color: #000; border-color: var(--primary); font-weight: 800; }

        .history-card {
            background: #151518;
            border: 1px solid #222;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .game-icon {
            width: 40px; height: 40px;
            background: rgba(255,152,0,0.1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: var(--primary);
            font-size: 20px;
        }
    </style>
</head>
<body style="background: #0a0a0c;">
    <header>
        <button onclick="location.href='dashboard.html'" style="background:none; border:none; color:white; font-size: 20px;"><i class="fas fa-arrow-left"></i></button>
        <h1>HISTORY</h1>
        <nav><a href="dashboard.html">Home</a></nav>
    </header>

    <div class="container" style="max-width: 700px; padding: 15px;">
        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterHistory('all')">ALL</button>
            <button class="filter-btn" onclick="filterHistory('game')">GAMES</button>
            <button class="filter-btn" onclick="filterHistory('deposit')">DEPOSITS</button>
            <button class="filter-btn" onclick="filterHistory('withdraw')">WITHDRAWALS</button>
            <button class="filter-btn" onclick="filterHistory('bonus')">BONUS</button>
            <button class="filter-btn" onclick="filterHistory('referral')">REFERRAL</button>
        </div>

        <div id="historySummary" style="background: var(--bg-card); padding: 15px; border-radius: 15px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border: 1px solid var(--glass-border);">
            <div style="text-align: center;">
                <div style="font-size: 11px; opacity: 0.6;">Total Won</div>
                <div id="totalWon" style="font-size: 18px; font-weight: 800; color: #4caf50;">0</div>
            </div>
            <div style="text-align: center;">
                <div style="font-size: 11px; opacity: 0.6;">Total Lost</div>
                <div id="totalLost" style="font-size: 18px; font-weight: 800; color: #f44336;">0</div>
            </div>
        </div>

        <div id="historyList"></div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const token = localStorage.getItem("token");
        let allTxns = [];

        async function fetchHistory() {
            const res = await fetch(`${API_URL}/api/transactions`, { headers: { authorization: token } });
            const data = await res.json();
            if (data.success) {
                allTxns = data.transactions;
                renderHistory(allTxns);
            }
        }

        function renderHistory(txns) {
            let win = 0, loss = 0;
            txns.forEach(t => {
                if(t.amount > 0) win += t.amount;
                else loss += Math.abs(t.amount);
            });
            document.getElementById("totalWon").innerText = "₹" + win.toLocaleString();
            document.getElementById("totalLost").innerText = "₹" + loss.toLocaleString();

            const container = document.getElementById("historyList");
            container.innerHTML = txns.map(t => {
                const isGame = t.type.includes('game');
                const isWin = t.amount > 0;
                return `
                    <div class="history-card">
                        <div style="display: flex; gap: 15px; align-items: center;">
                            <div class="game-icon">
                                <i class="fas ${getIcon(t.type, t.game_name)}"></i>
                            </div>
                            <div>
                                <div style="font-weight: 800; font-size: 14px;">${t.game_name || t.type.toUpperCase()}</div>
                                <div style="font-size: 11px; opacity: 0.6; margin-top: 2px;">${t.details || ''}</div>
                                <div style="font-size: 10px; color: #444; margin-top: 4px;">${new Date(t.created_at).toLocaleString()}</div>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-size: 16px; font-weight: 900; color: ${isWin ? '#4caf50' : '#f44336'}">
                                ${isWin ? '+' : ''}${t.amount}
                            </div>
                            <div style="font-size: 9px; opacity: 0.5;">${t.status.toUpperCase()}</div>
                        </div>
                    </div>
                `;
            }).join('') || '<p style="text-align:center; opacity:0.3; margin-top:50px;">No records found</p>';
        }

        function getIcon(type, game) {
            if(game === 'Aviator') return 'fa-plane';
            if(game === 'Color Game') return 'fa-palette';
            if(game === 'Teen Patti') return 'fa-jedi';
            if(game === 'Big Small') return 'fa-dice';
            if(type === 'deposit') return 'fa-wallet';
            if(type === 'withdraw') return 'fa-bank';
            if(type === 'bonus') return 'fa-gift';
            if(type === 'referral') return 'fa-user-plus';
            return 'fa-exchange-alt';
        }

        function filterHistory(type) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            if(type === 'all') renderHistory(allTxns);
            else if(type === 'game') renderHistory(allTxns.filter(t => t.type.includes('game')));
            else renderHistory(allTxns.filter(t => t.type === type));
        }

        fetchHistory();
    </script>
</body>
</html>
