<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Solo Casino</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
        <h1>SOLO CASINO</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="register.html" class="active">Register</a>
        </nav>
    </header>

    <div class="container" style="max-width: 500px;">
        <div class="form-box animate">
            <h2>Join Solo Casino</h2>
            <p style="text-align: center; color: var(--text-dim); margin-bottom: 30px;">Start your winning journey today</p>

            <div style="position: relative;">
                <i class="fas fa-user" style="position: absolute; left: 15px; top: 15px; color: var(--text-dim); font-size: 14px;"></i>
                <input type="text" id="name" placeholder="Full Name" style="padding-left: 45px;">
            </div>

            <div style="position: relative;">
                <i class="fas fa-envelope" style="position: absolute; left: 15px; top: 15px; color: var(--text-dim); font-size: 14px;"></i>
                <input type="email" id="email" placeholder="Email Address" style="padding-left: 45px;">
            </div>

            <div style="position: relative;">
                <i class="fas fa-lock" style="position: absolute; left: 15px; top: 15px; color: var(--text-dim); font-size: 14px;"></i>
                <input type="password" id="password" placeholder="Create Password" style="padding-left: 45px;">
            </div>

            <div style="position: relative;">
                <i class="fas fa-user-plus" style="position: absolute; left: 15px; top: 15px; color: var(--text-dim); font-size: 14px;"></i>
                <input type="text" id="referral" placeholder="Referral Code (Optional)" style="padding-left: 45px;">
            </div>

            <button onclick="register()" class="button-primary" style="width: 100%; padding: 15px; font-size: 16px; margin-top: 10px;" id="regBtn">
                Register Now
            </button>

            <p style="text-align: center; margin-top: 25px; color: var(--text-dim); font-size: 14px;">
                Already have an account? <a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Login</a>
            </p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        async function register() {
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const referral = document.getElementById("referral").value;
            const btn = document.getElementById("regBtn");

            if (!name || !email || !password) {
                return alert("Please fill all fields");
            }

            btn.innerText = "Creating Account...";
            btn.disabled = true;

            try {
                const data = { name, email, password, referral };
                const res = await fetch(`${API_URL}/api/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                const result = await res.json();
                alert(result.message);

                if (result.success) {
                    location.href = "login.html";
                }
            } catch (err) {
                console.error(err);
                alert("Server Error. Please try again later.");
            } finally {
                btn.innerText = "Register Now";
                btn.disabled = false;
            }
        }
    </script>

</body>
</html>
