<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win Go 5 Color | Solo Casino</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --red: #ef4444; --blue: #3b82f6; --green: #22c55e; --yellow: #eab308; --violet: #8b5cf6;
            --gold: #f1c40f;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 10px;
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .balance-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 15px;
            border-radius: 20px;
            color: var(--gold);
            font-weight: 900;
            border: 1px solid rgba(241, 196, 15, 0.2);
        }

        .timer-panel {
            text-align: center;
            margin: 15px 0;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #334155;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        #timer { font-size: 48px; font-weight: 900; color: var(--gold); text-shadow: 0 0 15px rgba(241,196,15,0.3); }

        .section-label { font-size: 12px; font-weight: 800; color: #aaa; margin: 15px 0 8px 5px; text-transform: uppercase; letter-spacing: 1px; }

        .size-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        .size-btn {
            height: 50px;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            color: white;
            cursor: pointer;
            font-size: 16px;
            background: #334155;
            transition: 0.2s;
        }
        .btn-big { background: #3b82f6; }
        .btn-small { background: #ef4444; }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }
        .color-btn {
            height: 50px;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            color: white;
            cursor: pointer;
            font-size: 10px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            transition: 0.1s;
        }
        .color-btn:active { transform: translateY(2px); box-shadow: none; }
        .selected { outline: 3px solid white; outline-offset: -3px; transform: scale(1.05); }

        .number-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }
        .num-btn {
            height: 45px;
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 900;
            font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }

        .bet-input-card {
            background: #1e293b;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        .bet-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .bet-row input { background: #000; border: 2px solid #334155; color: var(--gold); padding: 8px; width: 120px; text-align: center; border-radius: 10px; font-size: 20px; font-weight: 900; }

        .btn-confirm { background: #22c55e; color: white; width: 100%; height: 55px; border: none; border-radius: 15px; font-weight: 900; font-size: 18px; cursor: pointer; box-shadow: 0 4px 0 #15803d; }
        .btn-confirm:disabled { opacity: 0.5; background: #444; box-shadow: none; }

        .active-bets {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 12px;
        }
        .active-bet-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .history-card {
            background: #1e293b;
            border-radius: 15px;
            overflow: hidden;
            font-size: 13px;
            border: 1px solid #334155;
        }
        .hist-header { background: #334155; padding: 10px 15px; font-weight: 900; display: flex; justify-content: space-between; }
        .hist-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            padding: 10px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        #resPopup {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 30px 50px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 32px;
            z-index: 1000;
            display: none;
            text-align: center;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            animation: zoomIn 0.3s;
        }
        @keyframes zoomIn { from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="location.href='dashboard.html'" style="background:none; border:none; color:white; font-size: 24px;"><i class="fas fa-arrow-left"></i></button>
        <div class="balance-box">₹ <span id="balance">0.00</span></div>
    </div>

    <div class="timer-panel">
        <div style="font-size: 11px; opacity: 0.6; font-weight: 800; text-transform: uppercase;">Next Draw In</div>
        <div id="timer">00:20</div>
    </div>

    <div class="section-label">Size (1.95x)</div>
    <div class="size-grid">
        <button class="size-btn btn-big" onclick="selectBet('SIZE', 'BIG')" id="size-BIG">BIG</button>
        <button class="size-btn btn-small" onclick="selectBet('SIZE', 'SMALL')" id="size-SMALL">SMALL</button>
    </div>

    <div class="section-label">Colors (4.5x)</div>
    <div class="color-grid">
        <button class="color-btn" style="background: var(--red);" onclick="selectBet('COLOR', 'RED')" id="color-RED">RED</button>
        <button class="color-btn" style="background: var(--blue);" onclick="selectBet('COLOR', 'BLUE')" id="color-BLUE">BLUE</button>
        <button class="color-btn" style="background: var(--green);" onclick="selectBet('COLOR', 'GREEN')" id="color-GREEN">GREEN</button>
        <button class="color-btn" style="background: var(--yellow);" onclick="selectBet('COLOR', 'YELLOW')" id="color-YELLOW">YELLOW</button>
        <button class="color-btn" style="background: var(--violet);" onclick="selectBet('COLOR', 'VIOLET')" id="color-VIOLET">VIOLET</button>
    </div>

    <div class="section-label">Numbers (18x)</div>
    <div class="number-grid" id="numGrid"></div>

    <div class="bet-input-card">
        <div class="bet-row">
            <span style="font-weight: 800;">Bet Amount</span>
            <input type="number" id="betAmount" value="100">
        </div>
        <button id="confirmBtn" class="btn-confirm" onclick="placeBet()">PLACE BET</button>
    </div>

    <div id="activeBetsList" class="active-bets" style="display: none;">
        <div style="font-weight: 800; border-bottom: 1px solid #444; padding-bottom: 5px; margin-bottom: 5px;">ACTIVE BETS</div>
        <div id="betItems"></div>
    </div>

    <div class="history-card">
        <div class="hist-header">
            <span>PERIOD</span>
            <span>NUM</span>
            <span>COLOR</span>
            <span>SIZE</span>
        </div>
        <div id="historyRows"></div>
    </div>

    <div id="resPopup"></div>

    <script src="js/config.js"></script>
    <script>
        const token = localStorage.getItem("token");
        let selectedType = "";
        let selectedValue = "";
        let currentBets = [];
        let lastRoundId = null;

        const grid = document.getElementById("numGrid");
        for(let i=1; i<=20; i++) {
            grid.innerHTML += `<button class="num-btn" id="num-${i}" onclick="selectBet('NUMBER', ${i})">${i}</button>`;
        }

        async function fetchState() {
            try {
                const res = await fetch(`${API_URL}/api/game/color/state`, { headers: { authorization: token } });
                const data = await res.json();
                if (data.success) updateUI(data);
            } catch (e) {}
        }

        function updateUI(data) {
            const secs = data.timer;
            document.getElementById("timer").innerText = `00:${secs.toString().padStart(2, '0')}`;
            if(secs < 5) {
                document.getElementById("timer").style.color = "#ef4444";
                document.getElementById("confirmBtn").disabled = true;
                document.getElementById("confirmBtn").innerText = "WAITING...";
            } else {
                document.getElementById("timer").style.color = "var(--gold)";
                document.getElementById("confirmBtn").disabled = false;
                document.getElementById("confirmBtn").innerText = "PLACE BET";
            }

            if (data.history && data.history.length > 0) {
                const last = data.history[0];
                if (last.roundId !== lastRoundId) {
                    if (lastRoundId !== null && currentBets.length > 0) {
                        checkWin(last);
                        currentBets = [];
                        renderActiveBets();
                    }
                    lastRoundId = last.roundId;
                    fetchBalance();
                }
                renderHistory(data.history);
            }
        }

        function selectBet(type, val) {
            selectedType = type;
            selectedValue = val;
            document.querySelectorAll(".num-btn, .color-btn, .size-btn").forEach(b => b.classList.remove("selected"));
            if(type === 'NUMBER') document.getElementById(`num-${val}`).classList.add("selected");
            else if(type === 'COLOR') document.getElementById(`color-${val}`).classList.add("selected");
            else if(type === 'SIZE') document.getElementById(`size-${val}`).classList.add("selected");
        }

        async function placeBet() {
            if (!selectedType) return alert("Select something to bet on");
            const amount = parseInt(document.getElementById("betAmount").value);
            if (isNaN(amount) || amount <= 0) return alert("Invalid amount");

            const res = await fetch(`${API_URL}/api/game/color/bet`, {
                method: "POST",
                headers: { "Content-Type": "application/json", authorization: token },
                body: JSON.stringify({ type: selectedType, value: selectedValue, amount })
            });
            const data = await res.json();
            if (data.success) {
                currentBets.push({ type: selectedType, value: selectedValue, amount });
                renderActiveBets();
                fetchBalance();
                // Clear selection
                selectedType = "";
                selectedValue = "";
                document.querySelectorAll(".num-btn, .color-btn, .size-btn").forEach(b => b.classList.remove("selected"));
            } else alert(data.message);
        }

        function renderActiveBets() {
            const container = document.getElementById("activeBetsList");
            const items = document.getElementById("betItems");
            if (currentBets.length === 0) {
                container.style.display = "none";
                return;
            }
            container.style.display = "block";
            items.innerHTML = currentBets.map(b => `
                <div class="active-bet-item">
                    <span>${b.type}: ${b.value}</span>
                    <span style="color: var(--gold); font-weight: 800;">₹${b.amount}</span>
                </div>
            `).join('');
        }

        function checkWin(last) {
            let totalWon = 0;
            let count = 0;

            for(let bet of currentBets) {
                let won = false;
                if (bet.type === 'COLOR' && last.color === bet.value) won = true;
                if (bet.type === 'NUMBER' && last.number == bet.value) won = true;
                if (bet.type === 'SIZE' && last.size === bet.value) won = true;
                if (won) count++;
            }

            const msg = document.getElementById("resPopup");
            msg.style.display = "block";
            if (count > 0) {
                msg.innerText = `WINNER! (${count} Bets)`;
                msg.style.background = "rgba(34, 197, 94, 0.95)";
            } else {
                msg.innerText = "LOST";
                msg.style.background = "rgba(239, 68, 68, 0.95)";
            }
            setTimeout(() => msg.style.display = "none", 4000);
        }

        function renderHistory(history) {
            document.getElementById("historyRows").innerHTML = history.slice(0, 10).map(h => `
                <div class="hist-row">
                    <span>${h.roundId.toString().slice(-4)}</span>
                    <span style="font-weight:900;">${h.number}</span>
                    <span style="color:var(--${h.color.toLowerCase()}); font-weight:900;">${h.color}</span>
                    <span style="color: ${h.size === 'BIG' ? '#3b82f6' : '#ef4444'}; font-weight: 900;">${h.size}</span>
                </div>
            `).join('');
        }

        async function fetchBalance() {
            const res = await fetch(`${API_URL}/api/profile`, { headers: { authorization: token } });
            const data = await res.json();
            if (data.success) document.getElementById("balance").innerText = data.user.coins.toFixed(2);
        }

        setInterval(fetchState, 1000);
        fetchBalance();
    </script>
</body>
</html>
