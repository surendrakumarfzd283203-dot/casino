<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Go | Solo Casino</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --win-green: #28a745;
            --win-red: #ef4444;
            --win-violet: #722ed1;
            --gold: #d4af37;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
        }

        .balance-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 20px;
            color: var(--gold);
            font-weight: bold;
        }

        .timer-section {
            text-align: center;
            margin: 20px 0;
            background: #1e293b;
            padding: 15px;
            border-radius: 15px;
        }
        #timer { font-size: 32px; font-weight: bold; color: var(--gold); }

        .color-btns {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .color-btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }

        .number-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }
        .num-btn {
            aspect-ratio: 1;
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }
        .num-btn.selected { border-color: var(--gold); background: rgba(212, 175, 55, 0.1); }

        .bet-input-box {
            background: #1e293b;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .bet-actions { display: flex; gap: 10px; margin-top: 10px; }
        .btn-confirm { flex: 2; background: var(--win-green); color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-cancel { flex: 1; background: #444; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: none; }

        .result-msg {
            text-align: center;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
            font-weight: bold;
            display: none;
        }

        .history-table {
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
            font-size: 13px;
        }
        .hist-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 8px 15px;
            border-bottom: 1px solid #334155;
        }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="location.href='dashboard.html'" style="background:none; border:none; color:white;"><i class="fas fa-arrow-left"></i></button>
        <div class="balance-box">₹ <span id="balance">0.00</span></div>
    </div>

    <div class="timer-section">
        <div style="font-size: 12px; opacity: 0.6;">PERIOD: <span id="period">0</span></div>
        <div id="timer">00:00</div>
    </div>

    <div class="result-msg" id="resultMsg"></div>

    <div class="color-btns">
        <button class="color-btn" style="background: var(--win-green);" onclick="selectBet('COLOR', 'GREEN')">GREEN</button>
        <button class="color-btn" style="background: var(--win-violet);" onclick="selectBet('COLOR', 'VIOLET')">VIOLET</button>
        <button class="color-btn" style="background: var(--win-red);" onclick="selectBet('COLOR', 'RED')">RED</button>
    </div>

    <div class="number-grid" id="numGrid"></div>

    <div class="bet-input-box">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span>Bet Amount</span>
            <input type="number" id="betAmount" value="100" style="background:#000; border:1px solid #334155; color:white; padding:8px; width:80px; text-align:center; border-radius:5px;">
        </div>
        <div class="bet-actions">
            <button id="cancelBtn" class="btn-cancel" onclick="cancelBet()">CANCEL</button>
            <button id="confirmBtn" class="btn-confirm" onclick="placeBet()">PLACE BET</button>
        </div>
    </div>

    <div class="history-table">
        <div style="background: #334155; padding: 8px 15px; font-weight: bold;">RECENT RESULTS</div>
        <div id="historyRows"></div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const token = localStorage.getItem("token");
        let selectedType = "";
        let selectedValue = "";
        let isBetPlaced = false;
        let lastRoundId = null;

        const grid = document.getElementById("numGrid");
        for(let i=0; i<=9; i++) {
            grid.innerHTML += `<button class="num-btn" id="num-${i}" onclick="selectBet('NUMBER', ${i})">${i}</button>`;
        }

        async function fetchState() {
            try {
                const res = await fetch(`${API_URL}/api/game/color/state`, { headers: { authorization: token } });
                const data = await res.json();
                if (data.success) {
                    updateUI(data);
                }
            } catch (e) {}
        }

        function updateUI(data) {
            document.getElementById("period").innerText = data.roundId;
            const mins = Math.floor(data.timer / 60);
            const secs = data.timer % 60;
            document.getElementById("timer").innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

            const confirmBtn = document.getElementById("confirmBtn");
            const cancelBtn = document.getElementById("cancelBtn");

            if (data.timer < 5) {
                confirmBtn.disabled = true;
                confirmBtn.innerText = "WAITING...";
            } else if (!isBetPlaced) {
                confirmBtn.disabled = false;
                confirmBtn.innerText = "PLACE BET";
                cancelBtn.style.display = "none";
            }

            if (data.history && data.history.length > 0) {
                const last = data.history[0];
                if (last.roundId !== lastRoundId) {
                    lastRoundId = last.roundId;
                    fetchBalance();
                    if (isBetPlaced) {
                        checkWin(last);
                        isBetPlaced = false;
                    }
                }
                renderHistory(data.history);
            }
        }

        function selectBet(type, val) {
            if (isBetPlaced) return;
            selectedType = type;
            selectedValue = val;
            document.querySelectorAll(".num-btn").forEach(b => b.classList.remove("selected"));
            if(type === 'NUMBER') document.getElementById(`num-${val}`).classList.add("selected");
            alert(`Selected: ${val}`);
        }

        async function placeBet() {
            if (!selectedType) return alert("Select a color or number");
            const amount = document.getElementById("betAmount").value;
            try {
                const res = await fetch(`${API_URL}/api/game/color/bet`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", authorization: token },
                    body: JSON.stringify({ type: selectedType, value: selectedValue, amount })
                });
                const data = await res.json();
                if (data.success) {
                    isBetPlaced = true;
                    document.getElementById("confirmBtn").innerText = "BET PLACED";
                    document.getElementById("confirmBtn").disabled = true;
                    document.getElementById("cancelBtn").style.display = "block";
                    fetchBalance();
                } else alert(data.message);
            } catch (e) {}
        }

        function cancelBet() {
            isBetPlaced = false;
            document.getElementById("confirmBtn").disabled = false;
            document.getElementById("confirmBtn").innerText = "PLACE BET";
            document.getElementById("cancelBtn").style.display = "none";
            alert("Bet Cancelled!");
            fetchBalance();
        }

        function checkWin(last) {
            const msg = document.getElementById("resultMsg");
            msg.style.display = "block";
            let won = false;
            if (selectedType === 'COLOR' && last.color === selectedValue) won = true;
            if (selectedType === 'NUMBER' && last.number == selectedValue) won = true;

            if (won) {
                msg.innerText = "YOU WON!";
                msg.style.background = "var(--win-green)";
            } else {
                msg.innerText = "YOU LOST!";
                msg.style.background = "var(--win-red)";
            }
            setTimeout(() => msg.style.display = "none", 5000);
        }

        function renderHistory(history) {
            document.getElementById("historyRows").innerHTML = history.slice(0, 10).map(h => `
                <div class="hist-row">
                    <span>${h.roundId}</span>
                    <span style="font-weight:bold;">${h.number}</span>
                    <span style="color:${getHex(h.color)}; font-weight:bold;">${h.color}</span>
                </div>
            `).join('');
        }

        function getHex(c) {
            if(c==='RED') return '#ef4444';
            if(c==='GREEN') return '#28a745';
            return '#722ed1';
        }

        async function fetchBalance() {
            const res = await fetch(`${API_URL}/api/profile`, { headers: { authorization: token } });
            const data = await res.json();
            if (data.success) {
                document.getElementById("balance").innerText = data.user.coins.toFixed(2);
            }
        }

        setInterval(fetchState, 1000);
        fetchBalance();
    </script>
</body>
</html>
