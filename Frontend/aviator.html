<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Pro | Solo Casino</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050507; overflow-x: hidden; }
        .aviator-main-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .bet-sidebar {
            background: #111116;
            border-radius: 15px;
            border: 1px solid #222;
            padding: 15px;
            height: calc(100vh - 150px);
            overflow-y: auto;
        }
        .game-canvas-area {
            background: #0d0d0f;
            border-radius: 20px;
            position: relative;
            height: 500px;
            border: 1px solid #1a1a1f;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #multiplier {
            font-size: 120px;
            font-weight: 900;
            color: #fff;
            z-index: 10;
            text-shadow: 0 0 50px rgba(233,30,99,0.3);
            font-family: 'Arial Black', sans-serif;
            transition: color 0.3s;
        }
        .flying #multiplier { color: #e91e63; }

        .plane-wrapper {
            position: absolute;
            bottom: 50px;
            left: 50px;
            z-index: 5;
            transition: transform 0.1s linear;
        }

        .control-footer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .bet-box {
            background: #1c1c24;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #333;
            text-align: center;
        }
        .bet-box input {
            width: 100%;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            padding: 12px;
            border-radius: 10px;
            font-size: 20px;
            text-align: center;
            margin: 10px 0;
        }
        .btn-bet {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-bet.active { background: #28a745; color: #fff; }
        .btn-bet.disabled { background: #333; color: #666; cursor: not-allowed; }

        .history-strip {
            display: flex;
            gap: 10px;
            padding: 10px;
            background: #111;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
        }
        .hist-item {
            background: rgba(233,30,99,0.1);
            color: #e91e63;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid rgba(233,30,99,0.2);
        }

        /* Unique Background Grid */
        .grid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }
    </style>
</head>
<body>
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px 30px;">
            <h1 onclick="location.href='dashboard.html'" style="cursor: pointer; color: #e91e63; font-style: italic;">AVIATOR <span style="color:#fff; font-weight:100;">PRO</span></h1>
            <div class="balance-badge" style="background:#1c1c24; border:1px solid #333; padding:10px 20px; border-radius:30px;">
                <i class="fas fa-coins" style="color:#ff9800; margin-right:10px;"></i>
                <span id="balance">0</span> Coins
            </div>
        </div>
    </header>

    <div class="aviator-main-layout">
        <div class="bet-sidebar">
            <h3 style="font-size: 14px; color: #666; margin-bottom: 15px;">ALL BETS</h3>
            <div id="allBetsList"></div>
        </div>

        <div class="game-area">
            <div class="history-strip" id="historyStrip"></div>

            <div class="game-canvas-area" id="canvasArea">
                <div class="grid-bg"></div>
                <div id="multiplier">1.00x</div>
                <div id="gameStatus" style="position:absolute; top:20px; color:#666; font-size:14px; letter-spacing:1px;"></div>

                <div class="plane-wrapper" id="plane">
                    <!-- High Fidelity SVG Plane -->
                    <svg width="100" height="50" viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5,20 L15,15 L20,15 L20,25 L5,20 Z" fill="#E91E63" />
                        <path d="M5,30 L15,35 L20,35 L20,25 L5,30 Z" fill="#E91E63" />
                        <path d="M18,22 L75,18 L85,25 L75,32 L18,28 Z" fill="#E91E63" />
                        <path d="M35,18 L55,5 L75,5 L65,18 Z" fill="#E91E63" />
                        <path d="M35,32 L55,45 L75,45 L65,32 Z" fill="#E91E63" />
                        <path d="M68,22 L76,28 M76,22 L68,28" stroke="black" stroke-width="2" />
                        <g style="transform-origin: 88px 25px;">
                            <rect x="87" y="5" width="2" height="40" fill="#E91E63">
                                <animateTransform attributeName="transform" type="scale" values="1 1; 1 0.1; 1 1" dur="0.1s" repeatCount="indefinite" />
                            </rect>
                        </g>
                    </svg>
                </div>
            </div>

            <div class="control-footer">
                <div class="bet-box">
                    <label style="color:#666; font-size:12px;">BET AMOUNT</label>
                    <input type="number" id="betAmount" value="100" min="10">
                    <button id="betBtn" class="btn-bet active" onclick="placeBet()">BET</button>
                </div>
                <div class="bet-box">
                    <label style="color:#666; font-size:12px;">AUTO CASH OUT</label>
                    <input type="number" id="autoCashOut" value="2.00" step="0.1">
                    <div style="color:#444; font-size:11px; margin-top:10px;">System will auto cash out at target</div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const token = localStorage.getItem("token");
        if (!token) location.href = "login.html";

        let isFlying = false;
        let animationRunning = false;

        async function fetchState() {
            try {
                const res = await fetch(`${API_URL}/api/game/aviator/state`, { headers: { authorization: token } });
                const data = await res.json();
                if (data.success) {
                    const status = document.getElementById("gameStatus");
                    const betBtn = document.getElementById("betBtn");
                    const canvas = document.getElementById("canvasArea");

                    if (data.isFlying) {
                        isFlying = true;
                        canvas.classList.add("flying");
                        status.innerText = "AIRBORNE";
                        betBtn.disabled = true;
                        betBtn.innerText = "WAITING...";
                        if (!animationRunning) startLocalFlight(data.crashMultiplier);
                    } else {
                        isFlying = false;
                        animationRunning = false;
                        canvas.classList.remove("flying");
                        const mins = Math.floor(data.timer / 60);
                        const secs = data.timer % 60;
                        status.innerText = `NEXT ROUND IN ${mins}:${secs.toString().padStart(2, '0')}`;
                        betBtn.disabled = data.timer < 5;
                        betBtn.innerText = data.timer < 5 ? "WAITING..." : "BET";
                        document.getElementById("multiplier").innerText = "1.00x";
                        document.getElementById("multiplier").style.color = "#fff";
                        const plane = document.getElementById("plane");
                        plane.style.transform = "translate(0,0) rotate(0)";
                        plane.style.opacity = "1";
                    }
                    renderHistory(data.history);
                    renderAllBets(data.activeBets);
                }
            } catch (e) { console.error(e); }
        }

        function startLocalFlight(crash) {
            animationRunning = true;
            let current = 1.0;
            const display = document.getElementById("multiplier");
            const plane = document.getElementById("plane");

            const interval = setInterval(() => {
                if (!isFlying || current >= crash) {
                    clearInterval(interval);
                    if (isFlying) {
                        display.innerText = crash.toFixed(2) + "x";
                        display.style.color = "#f44336";
                        plane.style.transition = "0.5s";
                        plane.style.transform += " translate(500px, -500px) rotate(-45deg)";
                        plane.style.opacity = "0";
                    }
                    return;
                }
                current += 0.01 + (current * 0.001);
                display.innerText = current.toFixed(2) + "x";

                const x = (current - 1) * 80;
                const y = Math.pow((current - 1) * 15, 1.2);
                plane.style.transform = `translate(${x}px, -${y}px) rotate(-${y/10}deg)`;
            }, 50);
        }

        async function placeBet() {
            const amount = parseInt(document.getElementById("betAmount").value);
            const target = parseFloat(document.getElementById("autoCashOut").value);

            const res = await fetch(`${API_URL}/api/play/aviator`, {
                method: "POST",
                headers: { "Content-Type": "application/json", authorization: token },
                body: JSON.stringify({ betAmount: amount, cashOutMultiplier: target })
            });
            const data = await res.json();
            if (data.success) { alert("Bet Accepted!"); fetchBalance(); }
            else alert(data.message);
        }

        function renderHistory(history) {
            const strip = document.getElementById("historyStrip");
            strip.innerHTML = history.map(h => `<div class="hist-item">${h.crash.toFixed(2)}x</div>`).join('');
        }

        function renderAllBets(bets) {
            const list = document.getElementById("allBetsList");
            list.innerHTML = bets.map(b => `
                <div style="display:flex; justify-content:space-between; font-size:12px; padding:8px 0; border-bottom:1px solid #222;">
                    <span style="color:#aaa;">${b.name}</span>
                    <span style="color:#ff9800; font-weight:bold;">${b.betAmount}</span>
                    <span style="color:#666;">${b.cashOutMultiplier}x</span>
                </div>
            `).join('');
        }

        async function fetchBalance() {
            const res = await fetch(`${API_URL}/api/profile`, { headers: { authorization: token } });
            const data = await res.json();
            if (data.success) document.getElementById("balance").innerText = data.user.coins.toLocaleString();
        }

        setInterval(fetchState, 1000);
        fetchBalance();
    </script>
</body>
</html>
