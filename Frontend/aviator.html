<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator | 1win Style</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #d10214;
            --bg-dark: #121314;
            --panel-bg: #1b1c1d;
            --win-green: #28a745;
            --accent-blue: #34b4ff;
        }

        body {
            background-color: #000;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            background: #1b1c1d;
            border-bottom: 1px solid #333;
        }

        .balance-box {
            background: #101112;
            color: #28a745;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 14px;
            border: 1px solid #333;
        }

        .history-bar {
            background: #000;
            display: flex;
            gap: 8px;
            padding: 8px 15px;
            overflow-x: auto;
            border-bottom: 1px solid #222;
        }
        .hist-item {
            background: #212429;
            color: var(--accent-blue);
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            min-width: 45px;
            text-align: center;
            border: 1px solid rgba(52, 180, 255, 0.2);
        }

        .game-canvas-area {
            flex: 1;
            position: relative;
            background: radial-gradient(circle at bottom left, #1b1c1d 0%, #000 100%);
            margin: 8px;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .fun-mode-tag {
            position: absolute;
            top: 0; width: 100%;
            background: #f5a623;
            color: black;
            text-align: center;
            font-size: 10px;
            font-weight: 900;
            padding: 2px 0;
        }

        #multiplier {
            font-size: 64px;
            font-weight: 900;
            z-index: 10;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .plane-box {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 5;
            transition: transform 0.1s linear;
        }
        .plane-img {
            width: 110px;
            filter: drop-shadow(0 0 15px var(--primary-red));
        }

        .betting-section {
            padding: 10px;
            background: #1b1c1d;
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            border-radius: 20px 20px 0 0;
        }
        @media (min-width: 600px) { .betting-section { grid-template-columns: 1fr 1fr; } }

        .bet-card {
            background: #212429;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bet-input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .amount-selector {
            background: #000;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px;
            border: 1px solid #333;
        }
        .amount-selector button { background: #1b1c1d; border: none; color: white; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; }
        .amount-selector input { background: none; border: none; color: white; width: 60px; text-align: center; font-weight: bold; font-size: 18px; }

        .main-action-btn {
            height: 65px;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .btn-bet { background: var(--win-green); color: white; box-shadow: 0 4px 0 #1e7e34; }
        .btn-cancel { background: #d10214; color: white; box-shadow: 0 4px 0 #8a010d; }
        .btn-cashout { background: #f5a623; color: black; box-shadow: 0 4px 0 #b3791a; }
        .main-action-btn span { font-size: 11px; opacity: 0.8; margin-top: 2px; }

        .quick-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }
        .quick-grid button {
            background: #141516;
            border: 1px solid #333;
            color: white;
            font-size: 11px;
            padding: 6px 0;
            border-radius: 8px;
            cursor: pointer;
        }

        .result-popup {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            border-radius: 15px;
            font-weight: 900;
            font-size: 28px;
            z-index: 50;
            display: none;
            text-align: center;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        .win-bg { background: rgba(40, 167, 69, 0.95); color: white; }
        .loss-bg { background: rgba(209, 2, 20, 0.95); color: white; }

        .timer-info {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #888;
            font-size: 13px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">AVIATOR</div>
        <div style="font-size: 11px; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);">
            <i class="fas fa-users" style="color: #28a745;"></i> <span id="fakeUsers">245</span> Online
        </div>
        <div class="balance-box">₹ <span id="balance">0.00</span></div>
    </div>

    <div class="history-bar" id="historyBar"></div>

    <div class="game-canvas-area">
        <div class="fun-mode-tag">REAL MODE</div>
        <div id="multiplier">1.00x</div>

        <div class="plane-box" id="planeBox">
            <img src="image/aviator.png" class="plane-img" alt="plane">
        </div>

        <div class="result-popup" id="resPopup"></div>
        <div class="timer-info" id="timerInfo">Wait for next round...</div>
    </div>

    <div class="betting-section">
        <div style="width: 100%; max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px; margin-bottom: 10px; font-size: 11px;" id="allBets">
            <!-- Bets list -->
        </div>
        <!-- Panel 1 -->
        <div class="bet-card">
            <div class="bet-input-row">
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <div class="amount-selector">
                        <button onclick="changeAmt(1, -10)">-</button>
                        <input type="number" id="amt1" value="100">
                        <button onclick="changeAmt(1, 10)">+</button>
                    </div>
                    <div class="quick-grid">
                        <button onclick="setAmt(1, 100)">100</button>
                        <button onclick="setAmt(1, 200)">200</button>
                        <button onclick="setAmt(1, 500)">500</button>
                        <button onclick="setAmt(1, 1000)">1000</button>
                    </div>
                </div>
                <button id="btn1" class="main-action-btn btn-bet" onclick="handleBtn(1)">
                    BET
                    <span id="sub1">100.00 ₹</span>
                </button>
            </div>
        </div>

        <!-- Panel 2 -->
        <div class="bet-card">
             <div class="bet-input-row">
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <div class="amount-selector">
                        <button onclick="changeAmt(2, -10)">-</button>
                        <input type="number" id="amt2" value="200">
                        <button onclick="changeAmt(2, 10)">+</button>
                    </div>
                    <div class="quick-grid">
                        <button onclick="setAmt(2, 100)">100</button>
                        <button onclick="setAmt(2, 200)">200</button>
                        <button onclick="setAmt(2, 500)">500</button>
                        <button onclick="setAmt(2, 1000)">1000</button>
                    </div>
                </div>
                <button id="btn2" class="main-action-btn btn-bet" onclick="handleBtn(2)">
                    BET
                    <span id="sub2">200.00 ₹</span>
                </button>
            </div>
        </div>
    </div>

    <audio id="sndFly" src="https://assets.mixkit.co/active_storage/sfx/1070/1070-preview.mp3" loop></audio>
    <audio id="sndWin" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>
    <audio id="sndCrash" src="https://assets.mixkit.co/active_storage/sfx/1018/1018-preview.mp3"></audio>

    <script src="js/config.js"></script>
    <script>
        const token = localStorage.getItem("token");
        if (!token) location.href = "login.html";

        let isFlying = false;
        let activeBets = { 1: { placed: false, amount: 0 }, 2: { placed: false, amount: 0 } };
        let currentMult = 1.0;
        let startTime = null;
        let animFrame = null;

        const sndFly = document.getElementById("sndFly");
        const sndWin = document.getElementById("sndWin");
        const sndCrash = document.getElementById("sndCrash");

        async function fetchState() {
            try {
                const res = await fetch(`${API_URL}/api/game/aviator/state`, { headers: { authorization: token } });
                const data = await res.json();
                if (data.success) {
                    syncUI(data);
                }
            } catch (e) {}
        }

        function syncUI(data) {
            const timerInfo = document.getElementById("timerInfo");

            if (data.isFlying) {
                if (!isFlying) startFlight();
                timerInfo.innerText = "";
                updateButtonsFlying();
            } else {
                if (isFlying) endFlight();
                isFlying = false;
                timerInfo.innerText = `Wait for next round: ${data.timer}s`;
                updateButtonsWaiting(data.timer);
                document.getElementById("multiplier").innerText = "1.00x";
                document.getElementById("multiplier").style.color = "white";
                document.getElementById("planeBox").style.transform = "translate(0,0)";
            }
            renderHistory(data.history);
            renderBets(data.activeBets, data.fakeUsers);
        }

        function renderBets(real, fake) {
            const container = document.getElementById("allBets");
            if (!container) return;

            let html = "";
            // Real bets first
            real.forEach(b => {
                html += `<div class="bet-item">
                    <span>${b.name}</span>
                    <span style="color:var(--primary)">${b.betAmount} ₹</span>
                </div>`;
            });
            // Fake bets
            const isAdmin = localStorage.getItem("adminToken");
            if (!isAdmin) {
                (fake || []).forEach(b => {
                    html += `<div class="bet-item fake" style="opacity:0.6">
                        <span>${b.name}</span>
                        <span>${b.betAmount} ₹</span>
                    </div>`;
                });
            }
            container.innerHTML = html;
        }

        function startFlight() {
            isFlying = true;
            startTime = Date.now();
            sndFly.play().catch(e=>{});
            document.getElementById("resPopup").style.display = "none";
            animate();
        }

        function animate() {
            if (!isFlying) return;
            const elapsed = (Date.now() - startTime) / 1000;
            currentMult = Math.pow(1.1, elapsed);
            document.getElementById("multiplier").innerText = currentMult.toFixed(2) + "x";

            const x = Math.min(elapsed * 50, 300);
            const y = Math.min(Math.pow(elapsed, 1.4) * 15, 200);
            document.getElementById("planeBox").style.transform = `translate(${x}px, -${y}px)`;

            animFrame = requestAnimationFrame(animate);
        }

        function endFlight() {
            isFlying = false;
            cancelAnimationFrame(animFrame);
            sndFly.pause(); sndFly.currentTime = 0;
            sndCrash.play().catch(e=>{});
            document.getElementById("multiplier").style.color = "var(--primary-red)";

            for(let i=1; i<=2; i++) {
                if(activeBets[i].placed) {
                    showRes("FLEW AWAY!", false);
                    activeBets[i].placed = false;
                }
            }
        }

        function updateButtonsWaiting(t) {
            for(let i=1; i<=2; i++) {
                const btn = document.getElementById(`btn${i}`);
                if (!activeBets[i].placed) {
                    btn.className = "main-action-btn btn-bet";
                    btn.disabled = t < 5;
                    btn.innerHTML = t < 5 ? "STARTING..." : `BET<span>${document.getElementById(`amt${i}`).value}.00 ₹</span>`;
                } else {
                    btn.className = "main-action-btn btn-cancel";
                    btn.innerHTML = "CANCEL<span>Wait for Flight</span>";
                    btn.disabled = false;
                }
            }
        }

        function updateButtonsFlying() {
            for(let i=1; i<=2; i++) {
                const btn = document.getElementById(`btn${i}`);
                if (activeBets[i].placed) {
                    const win = (activeBets[i].amount * currentMult).toFixed(2);
                    btn.className = "main-action-btn btn-cashout";
                    btn.innerHTML = `CASHOUT<span>${win} ₹</span>`;
                    btn.disabled = false;
                } else {
                    btn.className = "main-action-btn btn-bet";
                    btn.innerText = "FLYING...";
                    btn.disabled = true;
                }
            }
        }

        async function handleBtn(i) {
            const btn = document.getElementById(`btn${i}`);
            const amount = parseInt(document.getElementById(`amt${i}`).value);

            if (btn.innerText.includes("BET")) {
                const res = await fetch(`${API_URL}/api/play/aviator`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", authorization: token },
                    body: JSON.stringify({ betAmount: amount, cashOutMultiplier: 100 })
                });
                const data = await res.json();
                if (data.success) { activeBets[i] = { placed: true, amount }; fetchBalance(); }
                else alert(data.message);
            } else if (btn.innerText.includes("CANCEL")) {
                const res = await fetch(`${API_URL}/api/game/aviator/cancel`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", authorization: token }
                });
                const data = await res.json();
                if (data.success) { activeBets[i].placed = false; fetchBalance(); }
            } else if (btn.innerText.includes("CASHOUT")) {
                const winAmt = (activeBets[i].amount * currentMult).toFixed(2);
                const res = await fetch(`${API_URL}/api/game/aviator/cashout`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", authorization: token },
                    body: JSON.stringify({ multiplier: currentMult.toFixed(2) })
                });
                const data = await res.json();
                if (data.success) {
                    activeBets[i].placed = false;
                    showRes(`WON ₹ ${winAmt}`, true);
                    sndWin.play().catch(e=>{});
                    fetchBalance();
                }
            }
        }

        function showRes(msg, win) {
            const p = document.getElementById("resPopup");
            p.innerText = msg;
            p.className = `result-popup ${win ? 'win-bg' : 'loss-bg'}`;
            p.style.display = "block";
            setTimeout(() => p.style.display = "none", 4000);
        }

        function renderHistory(h) {
            document.getElementById("historyBar").innerHTML = h.slice(0,15).map(x => `
                <div class="hist-item" style="color:${x.crash>2?'#9858f5':'#34b4ff'}">${x.crash.toFixed(2)}x</div>
            `).join('');
        }

        async function fetchBalance() {
            const res = await fetch(`${API_URL}/api/profile`, { headers: { authorization: token } });
            const data = await res.json();
            if (data.success) document.getElementById("balance").innerText = data.user.coins.toFixed(2);
        }

        function changeAmt(i, v) {
            const inp = document.getElementById(`amt${i}`);
            inp.value = Math.max(10, parseInt(inp.value) + v);
            if(!activeBets[i].placed) document.getElementById(`sub${i}`).innerText = inp.value + ".00 ₹";
        }
        function setAmt(i, v) {
            document.getElementById(`amt${i}`).value = v;
            if(!activeBets[i].placed) document.getElementById(`sub${i}`).innerText = v + ".00 ₹";
        }

        function updateFakeUsers() {
            if (localStorage.getItem("adminToken")) {
                // If an admin is viewing the page, show "REAL" players betting count if available
                // For now just show a "REAL" label or lower count to distinguish
                document.getElementById("fakeUsers").innerText = "Real Monitoring";
                return;
            }
            const base = 200 + Math.floor(Math.random() * 100);
            document.getElementById("fakeUsers").innerText = base;
        }
        setInterval(updateFakeUsers, 5000);
        updateFakeUsers();

        setInterval(fetchState, 1000);
        fetchBalance();
    </script>
</body>
</html>
