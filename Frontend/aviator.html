<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator | 1win Style</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #d10214;
            --bg-dark: #121314;
            --panel-bg: #1b1c1d;
            --win-green: #28a745;
            --accent-blue: #34b4ff;
            --multiplier-purple: #913ef8;
            --multiplier-pink: #c017b2;
            --font-main: 'Inter', sans-serif;
        }

        body {
            background-color: #2e0249;
            background-image: radial-gradient(circle at 50% 50%, #570a88 0%, #2e0249 100%);
            background-attachment: fixed;
            color: white;
            font-family: var(--font-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Header Styling */
        .header {
            position: sticky;
            top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(46, 2, 73, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #222;
            z-index: 100;
        }

        .header .logo {
            font-weight: 900;
            font-style: italic;
            color: var(--primary-red);
            font-size: 20px;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .balance-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .balance-box {
            color: #28a745;
            font-weight: 900;
            font-size: 16px;
        }

        .menu-icons {
            display: flex;
            gap: 15px;
            color: #ccc;
            font-size: 18px;
        }

        /* History Bar */
        .history-bar {
            background: #141516;
            display: flex;
            gap: 6px;
            padding: 8px 12px;
            overflow-x: auto;
            border-bottom: 1px solid #222;
            scrollbar-width: none;
        }
        .history-bar::-webkit-scrollbar { display: none; }

        .hist-item {
            background: #212429;
            padding: 3px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 800;
            min-width: 45px;
            text-align: center;
        }

        /* Game Area */
        .game-area {
            flex-shrink: 0;
            height: 300px;
            position: relative;
            background: #000;
            margin: 8px;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        @media (min-width: 768px) { .game-area { height: 400px; } }

        .sunburst {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 0% 100%, #1a1a1a 0%, #000000 80%);
            z-index: 1;
        }

        .sunburst::before {
            content: '';
            position: absolute;
            top: 15%; left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 40%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/d/d0/UFC_Logo.svg') no-repeat center;
            background-size: contain;
            opacity: 0.12;
            z-index: 1;
            filter: grayscale(1) invert(1);
        }

        .spribe-badge {
            position: absolute;
            top: 60%; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 5;
            opacity: 0.6;
        }
        .spribe-badge img { width: 14px; filter: invert(1); }
        .spribe-badge span { font-size: 10px; font-weight: 900; color: #fff; letter-spacing: 1px; }

        .sunburst::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: repeating-conic-gradient(from 0deg, rgba(255,255,255,0.015) 0deg 10deg, transparent 10deg 20deg);
            z-index: 0;
            animation: rotateSun 60s linear infinite;
        }

        @keyframes rotateSun {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .fun-mode-banner {
            position: relative;
            z-index: 10;
            background: #f5a623;
            color: #000;
            text-align: center;
            font-size: 12px;
            font-weight: 900;
            padding: 4px 0;
            text-transform: uppercase;
        }

        .canvas-container {
            flex: 1;
            position: relative;
            z-index: 2;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
        }

        #multiplier {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(60px, 20vw, 120px);
            font-weight: 950;
            z-index: 10;
            text-shadow: 0 0 30px rgba(0,0,0,0.8);
            color: white;
            letter-spacing: -3px;
        }

        .player-count-capsule {
            position: absolute;
            bottom: 40px;
            right: 20px;
            z-index: 10;
            background: rgba(0,0,0,0.7);
            padding: 5px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 800;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .avatar-stack {
            display: flex;
            align-items: center;
        }
        .avatar-img {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 1.5px solid #333;
            margin-left: -10px;
            object-fit: cover;
        }
        .avatar-img:first-child { margin-left: 0; }

        /* Betting Section */
        .betting-section {
            padding: 8px;
            background: #000;
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }
        @media (min-width: 768px) {
            .betting-section { grid-template-columns: 1fr 1fr; gap: 12px; padding: 8px 12px; }
        }

        .bet-card {
            background: #1b1c1d;
            padding: 10px;
            border-radius: 15px;
            border: 1px solid #282828;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .tab-row {
            display: flex;
            background: #141516;
            padding: 3px;
            border-radius: 25px;
            margin-bottom: 12px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        .tab {
            padding: 4px 20px;
            font-size: 12px;
            font-weight: 800;
            border-radius: 20px;
            color: #888;
            cursor: pointer;
        }
        .tab.active {
            background: #2c2d2e;
            color: #fff;
        }

        .bet-controls {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 8px;
            align-items: center;
        }

        .amount-input-box {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-stepper {
            display: flex;
            align-items: center;
            background: #000;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 4px;
        }
        .input-stepper button {
            background: #333;
            border: none;
            color: #fff;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
        }
        .input-stepper input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            text-align: center;
            font-size: 16px;
            font-weight: 900;
            width: 50px;
            outline: none;
        }

        .quick-amounts {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }
        .quick-amounts button {
            background: #141516;
            border: 1px solid #333;
            color: #fff;
            font-size: 11px;
            padding: 6px 0;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
        }

        .big-bet-btn {
            height: 60px;
            border: none;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }
        @media (min-width: 768px) { .big-bet-btn { height: 75px; } }
        .big-bet-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }

        .btn-green { background: linear-gradient(to bottom, #28a745, #1e7e34); color: #fff; }
        .btn-red { background: linear-gradient(to bottom, #d10214, #a0010f); color: #fff; }
        .btn-orange { background: linear-gradient(to bottom, #f5a623, #d4840b); color: #000; }

        .big-bet-btn .label { font-size: 16px; font-weight: 900; text-transform: uppercase; }
        .big-bet-btn .value { font-size: 12px; font-weight: 800; margin-top: 1px; }
        @media (min-width: 768px) {
            .big-bet-btn .label { font-size: 18px; }
            .big-bet-btn .value { font-size: 14px; }
        }

        .auto-cashout-row {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #282828;
            align-items: center;
        }
        .auto-cashout-row.show { display: grid; }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 20px;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .toggle-slider { background-color: var(--win-green); }
        input:checked + .toggle-slider:before { transform: translateX(20px); }

        .auto-input-box {
            display: flex;
            align-items: center;
            background: #000;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 4px;
        }
        .auto-input-box button {
            background: #333;
            border: none;
            color: #fff;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auto-input-box input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            text-align: center;
            font-size: 14px;
            font-weight: 800;
            width: 55px;
            outline: none;
        }
        /* Remove arrows from number input */
        .auto-input-box input::-webkit-outer-spin-button,
        .auto-input-box input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Stats Section */
        .stats-section {
            flex-shrink: 0;
            min-height: 400px;
            background: #1b1c1d;
            border-radius: 20px 20px 0 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-top: 1px solid #333;
        }

        .stats-tabs {
            display: flex;
            padding: 12px 15px;
            gap: 20px;
            background: #141516;
        }
        .stats-tab {
            font-size: 13px;
            font-weight: 800;
            color: #888;
            cursor: pointer;
            text-transform: uppercase;
        }
        .stats-tab.active { color: #fff; border-bottom: 2px solid var(--primary-red); padding-bottom: 2px; }

        .stats-summary {
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1b1c1d;
        }

        .bets-list-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            padding: 10px 15px;
            font-size: 11px;
            color: #555;
            font-weight: 900;
            text-transform: uppercase;
            border-bottom: 1px solid #222;
        }

        .bets-list {
            flex: 1;
            overflow-y: auto;
            padding: 5px;
        }

        .bet-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            padding: 12px 10px;
            font-size: 12px;
            align-items: center;
            background: rgba(0,0,0,0.25);
            margin-bottom: 4px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.02);
        }
        .bet-row.won { background: rgba(40, 167, 69, 0.12); border: 1px solid rgba(40, 167, 69, 0.2); }

        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-info img { width: 24px; height: 22px; border-radius: 50%; }

        .res-blue-badge {
            background: #212429;
            color: var(--accent-blue);
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 900;
            border: 1px solid rgba(52, 180, 255, 0.2);
        }

        /* Result Overlay */
        .result-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            pointer-events: none;
            text-align: center;
            display: none;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .result-overlay.show { display: block; }
        .result-card {
            background: rgba(0,0,0,0.85);
            padding: 20px 40px;
            border-radius: 20px;
            border: 2px solid;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        .result-card.win { border-color: var(--win-green); color: var(--win-green); }
        .result-card.lose { border-color: var(--primary-red); color: var(--primary-red); }
        .result-title { font-size: 24px; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; }
        .result-value { font-size: 36px; font-weight: 950; }
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="result-overlay" id="resultOverlay">
        <div class="result-card" id="resultCard">
            <div class="result-title" id="resultTitle">WIN</div>
            <div class="result-value" id="resultValue">₹0.00</div>
        </div>
    </div>
    <div class="header">
        <div class="logo">Aviator</div>
        <div class="balance-container">
            <div class="balance-box"><span id="balance">0.00</span> INR</div>
            <div class="menu-icons">
                <i class="fas fa-comment-dots"></i>
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </div>

    <div class="history-bar" id="historyBar"></div>

    <div class="game-area">
        <div class="fun-mode-banner">Fun Mode</div>
        <div class="sunburst"></div>
        <div class="spribe-badge">
            <i class="fas fa-certificate" style="color:#28a745; font-size:12px;"></i>
            <span>SPRIBE OFFICIAL GAME</span>
        </div>
        <div class="canvas-container">
            <canvas id="gameCanvas"></canvas>
            <div id="multiplier">1.00x</div>
            <div class="player-count-capsule">
                <div class="avatar-stack">
                    <img src="https://i.pravatar.cc/50?u=a1" class="avatar-img" alt="p1">
                    <img src="https://i.pravatar.cc/50?u=a2" class="avatar-img" alt="p2">
                    <img src="https://i.pravatar.cc/50?u=a3" class="avatar-img" alt="p3">
                </div>
                <span id="fakeUsers">232</span>
            </div>
        </div>
    </div>

    <div class="betting-section">
        <!-- Panel 1 -->
        <div class="bet-card">
            <div class="tab-row">
                <div class="tab active" onclick="switchBetTab(1, 'bet')">Bet</div>
                <div class="tab" onclick="switchBetTab(1, 'auto')">Auto</div>
            </div>
            <div class="bet-controls">
                <div class="amount-input-box">
                    <div class="input-stepper">
                        <button onclick="changeAmt(1, -1)">-</button>
                        <input type="number" id="amt1" value="10.00" min="10" aria-label="Amount 1">
                        <button onclick="changeAmt(1, 1)">+</button>
                    </div>
                    <div class="quick-amounts">
                        <button onclick="setAmt(1, 10)">10</button>
                        <button onclick="setAmt(1, 20)">20</button>
                        <button onclick="setAmt(1, 50)">50</button>
                        <button onclick="setAmt(1, 100)">100</button>
                    </div>
                </div>
                <button id="btn1" class="big-bet-btn btn-green" onclick="handleBtn(1)">
                    <span class="label">BET</span>
                    <span class="value" id="sub1">10.00 INR</span>
                </button>
            </div>
            <div id="autoRow1" class="auto-cashout-row">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="font-size: 11px; font-weight: 800; color: #888;">Auto Cash Out</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="autoEnabled1">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="auto-input-box">
                    <button onclick="changeAutoVal(1, -0.1)">-</button>
                    <input type="number" id="autoVal1" value="2.00" step="0.01" min="2" max="1000" aria-label="Auto Cash Out Value 1">
                    <button onclick="changeAutoVal(1, 0.1)">+</button>
                    <span style="color: #555; font-size: 10px; font-weight: 800; margin-left: 4px;">X</span>
                </div>
            </div>
        </div>

        <!-- Panel 2 -->
        <div class="bet-card">
            <div class="tab-row">
                <div class="tab active" onclick="switchBetTab(2, 'bet')">Bet</div>
                <div class="tab" onclick="switchBetTab(2, 'auto')">Auto</div>
            </div>
            <div class="bet-controls">
                <div class="amount-input-box">
                    <div class="input-stepper">
                        <button onclick="changeAmt(2, -1)">-</button>
                        <input type="number" id="amt2" value="10.00" min="10" aria-label="Amount 2">
                        <button onclick="changeAmt(2, 1)">+</button>
                    </div>
                    <div class="quick-amounts">
                        <button onclick="setAmt(2, 10)">10</button>
                        <button onclick="setAmt(2, 20)">20</button>
                        <button onclick="setAmt(2, 50)">50</button>
                        <button onclick="setAmt(2, 100)">100</button>
                    </div>
                </div>
                <button id="btn2" class="big-bet-btn btn-green" onclick="handleBtn(2)">
                    <span class="label">BET</span>
                    <span class="value" id="sub2">10.00 INR</span>
                </button>
            </div>
            <div id="autoRow2" class="auto-cashout-row">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="font-size: 11px; font-weight: 800; color: #888;">Auto Cash Out</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="autoEnabled2">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="auto-input-box">
                    <button onclick="changeAutoVal(2, -0.1)">-</button>
                    <input type="number" id="autoVal2" value="2.00" step="0.01" min="2" max="1000" aria-label="Auto Cash Out Value 2">
                    <button onclick="changeAutoVal(2, 0.1)">+</button>
                    <span style="color: #555; font-size: 10px; font-weight: 800; margin-left: 4px;">X</span>
                </div>
            </div>
        </div>
    </div>

    <div class="stats-section">
        <div class="stats-tabs">
            <div class="stats-tab active" onclick="switchStatsTab('all')">All Bets</div>
            <div class="stats-tab" onclick="switchStatsTab('prev')">Previous</div>
            <div class="stats-tab" onclick="switchStatsTab('top')">Top</div>
        </div>
        <div class="stats-summary">
             <div style="font-size: 11px; color: #888; font-weight: 800;">
                <span id="betCount">0</span>/<span id="maxBets">500</span> Bets
                <div style="width: 120px; height: 4px; background: #222; border-radius: 2px; margin-top: 6px;">
                    <div id="betProgress" style="width: 0%; height: 100%; background: #28a745; border-radius: 2px;"></div>
                </div>
             </div>
             <div style="text-align: right;">
                <div style="font-size: 16px; font-weight: 950; color: white;" id="totalWin">0.00</div>
                <div style="font-size: 10px; color: #666; font-weight: 900; text-transform: uppercase;">Total win INR</div>
             </div>
        </div>
        <div class="bets-list-header">
            <span>Player</span>
            <span>Bet INR</span>
            <span>X</span>
            <span>Win INR</span>
        </div>
        <div class="bets-list" id="allBets"></div>

        <div style="padding: 10px; text-align: center; border-top: 1px solid #222; background: #141516;">
            <div style="display: flex; justify-content: space-between; font-size: 10px; color: #555; font-weight: 900; text-transform: uppercase;">
                <span><i class="fas fa-shield-halved"></i> Provably Fair</span>
                <span>Powered by SPRIBE</span>
            </div>
        </div>
    </div>


    <audio id="sndFly" src="sound/fly.mp3" loop></audio>
    <audio id="sndWin" src="sound/win.mp3"></audio>
    <audio id="sndCrash" src="sound/crash.mp3"></audio>

    <script>
        const API_URL = window.location.origin;
        const token = localStorage.getItem("token");
        if (!token) location.href = "login.html";

        let isFlying = false;
        let isCrashed = false;
        let crashStartTime = 0;
        let lastElapsed = 0;
        let currentUser = null;
        let activeBets = { 1: { placed: false, amount: 0 }, 2: { placed: false, amount: 0 } };
        let currentMult = 1.0;
        let startTime = null;
        let animFrame = null;

        let currentStatsTab = 'all';
        let previousBets = [];
        let lastRoundId = null;
        let topBets = [
            { name: "Winner1", betAmount: 100, multiplier: 45.20, winAmount: 4520.00, cashedOut: true },
            { name: "SuperFly", betAmount: 50, multiplier: 88.10, winAmount: 4405.00, cashedOut: true },
            { name: "AviatorPro", betAmount: 200, multiplier: 15.50, winAmount: 3100.00, cashedOut: true },
            { name: "Richie", betAmount: 500, multiplier: 5.20, winAmount: 2600.00, cashedOut: true }
        ];

        function switchBetTab(p, t) {
            const card = document.querySelectorAll('.bet-card')[p-1];
            card.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            card.querySelector(`.tab:nth-child(${t === 'bet' ? 1 : 2})`).classList.add('active');
            document.getElementById(`autoRow${p}`).classList.toggle('show', t === 'auto');
        }

        function switchStatsTab(t) {
            currentStatsTab = t;
            document.querySelectorAll('.stats-tab').forEach(tab => {
                tab.classList.toggle('active', tab.innerText.toLowerCase().includes(t));
            });
            renderBets([], []); // Re-render current view
        }

        const sndFly = document.getElementById("sndFly");
        const sndWin = document.getElementById("sndWin");
        const sndCrash = document.getElementById("sndCrash");

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const planeImg = new Image();
        planeImg.src = 'image/aviator.png';
        planeImg.onload = () => drawGame(0); // Draw immediately when loaded
        planeImg.onerror = () => { console.error("Plane image failed to load at", planeImg.src); };

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        async function fetchState() {
            try {
                const res = await fetch(`${API_URL}/api/game/aviator/state`, { headers: { authorization: token } });
                if (!res.ok) throw new Error("State fetch failed");
                const data = await res.json();
                if (data.success) {
                    syncUI(data);
                }
            } catch (e) { console.error(e); }
        }

        function syncUI(data) {
            const banner = document.querySelector(".fun-mode-banner");

            if (data.roundId !== lastRoundId) {
                if (lastRoundId !== null && (window.lastBets && window.lastBets.length > 0)) {
                    previousBets = [...window.lastBets];
                }
                lastRoundId = data.roundId;
                if (!data.isFlying) {
                    isFlying = false;
                    isCrashed = false;
                    currentMult = 1.0;
                    document.getElementById("multiplier").style.color = "white";
                    document.getElementById("multiplier").innerText = "1.00x";
                }
            }

            if (currentUser && data.activeBets) {
                const myBets = data.activeBets.filter(b => b.userId === currentUser._id || b.userId === currentUser.id);
                if (myBets.length > 0) {
                    activeBets[1].placed = !myBets[0].cashedOut;
                    activeBets[1].amount = myBets[0].betAmount;
                    if (myBets.length > 1) {
                        activeBets[2].placed = !myBets[1].cashedOut;
                        activeBets[2].amount = myBets[1].betAmount;
                    }
                }
            }

            if (data.isFlying) {
                if (data.isCrashed) {
                    if (!isCrashed) {
                        endFlight();
                        // Sync final crash multiplier
                        lastElapsed = Math.log(data.crashMultiplier) / Math.log(1.1);
                        currentMult = data.crashMultiplier;
                        document.getElementById("multiplier").innerText = currentMult.toFixed(2) + "x";
                    }
                } else {
                    if (!isFlying) {
                        isFlying = true;
                        isCrashed = false;
                        document.getElementById("multiplier").style.color = "white";
                        const serverNow = data.serverTime || Date.now();
                        const clientNow = Date.now();
                        const offset = clientNow - serverNow;
                        startTime = (data.startTime || serverNow) + offset;

                        sndFly.play().catch(e=>{});
                        animate();
                    }
                    for (let i = 1; i <= 2; i++) {
                        if (activeBets[i].placed && document.getElementById(`autoEnabled${i}`).checked) {
                            const target = parseFloat(document.getElementById(`autoVal${i}`).value);
                            if (currentMult >= target) handleBtn(i);
                        }
                    }
                }
                banner.innerText = "";
                banner.style.background = "transparent";
                updateButtonsFlying();
            } else {
                if (isFlying) endFlight();
                isFlying = false;
                isCrashed = false;
                banner.innerText = `WAITING FOR NEXT ROUND IN ${data.timer}s`;
                banner.style.background = "#f5a623";
                updateButtonsWaiting(data.timer);
                if (!isCrashed) {
                    document.getElementById("multiplier").innerText = "1.00x";
                    document.getElementById("multiplier").style.color = "white";
                    currentMult = 1.0;
                    drawGame(0);
                }
            }
            renderHistory(data.history);
            renderBets(data.activeBets, data.fakeUsers);
            updateOnlineCount();
        }

        function updateOnlineCount() {
            const el = document.getElementById("fakeUsers");
            const current = parseInt(el.innerText);
            const change = Math.floor(Math.random() * 7) - 3; // -3 to +3
            el.innerText = Math.max(150, Math.min(600, current + change));
        }

        function renderBets(real, fake) {
            const container = document.getElementById("allBets");
            if (!container) return;

            let html = "";
            let totalWin = 0;
            let displayList = [];

            if (currentStatsTab === 'all') {
                const processedFake = (fake || []).map(f => {
                    const cashOutAt = parseFloat(f.cashOutAt);
                    if (currentMult >= cashOutAt) {
                        return { ...f, cashedOut: true, multiplier: cashOutAt, winAmount: f.betAmount * cashOutAt };
                    }
                    return f;
                });
                displayList = [...(real || []), ...processedFake].sort((a,b) => b.betAmount - a.betAmount);
                window.lastBets = displayList; // Store for 'previous' tab
            } else if (currentStatsTab === 'prev') {
                displayList = previousBets;
            } else if (currentStatsTab === 'top') {
                displayList = topBets;
            }

            displayList.forEach(b => {
                const isWin = b.cashedOut;
                if (isWin) totalWin += b.winAmount;

                const maskedName = b.name.length > 2 ?
                    `${b.name[0]}***${b.name[b.name.length-1]}` :
                    `${b.name}***`;

                html += `<div class="bet-row ${isWin ? 'won' : ''}">
                    <div class="user-info">
                        <img src="https://i.pravatar.cc/50?u=${b.name}" alt="avatar">
                        <span style="color:#eee; font-weight:700;">${maskedName}</span>
                    </div>
                    <div style="font-weight:700; color:#aaa;">${b.betAmount.toFixed(2)}</div>
                    <div>${isWin ? `<div class="res-blue-badge">${b.multiplier.toFixed(2)}x</div>` : ''}</div>
                    <div style="font-weight:900; color:${isWin?'#28a745':'#666'}">${isWin ? b.winAmount.toFixed(2) : '-'}</div>
                </div>`;
            });
            container.innerHTML = html;
            document.getElementById("totalWin").innerText = totalWin.toFixed(2);

            const currentCount = displayList.length;
            document.getElementById("betCount").innerText = currentCount;
            let max = parseInt(document.getElementById("maxBets").innerText);
            if (currentCount >= max) {
                max = currentCount + 20;
                document.getElementById("maxBets").innerText = max;
            }
            const progress = (currentCount / max) * 100;
            document.getElementById("betProgress").style.width = Math.min(100, progress) + "%";
        }


        function animate() {
            if (!isFlying && !isCrashed) {
                animFrame = null;
                return;
            }

            if (isFlying) {
                lastElapsed = Math.max(0, (Date.now() - startTime) / 1000);
                currentMult = Math.pow(1.1, lastElapsed);
                document.getElementById("multiplier").innerText = currentMult.toFixed(2) + "x";
                drawGame(lastElapsed);
            } else if (isCrashed) {
                document.getElementById("multiplier").style.color = "var(--primary-red)";
                // Let the plane fly away animation finish for a bit
                const crashElapsed = (Date.now() - crashStartTime) / 1000;
                drawGame(lastElapsed, crashElapsed);
            }

            animFrame = requestAnimationFrame(animate);
        }

        function drawGame(elapsed, crashElapsed = 0) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const margin = 40;
            const graphWidth = canvas.width - margin * 1.5;
            const graphHeight = canvas.height - margin * 1.5;

            // Adjusted scaling for steeper curve like screenshot
            const x = Math.min(elapsed * 60, graphWidth);
            const y = Math.min(Math.pow(elapsed, 1.6) * 20, graphHeight);

            const startX = margin;
            const startY = canvas.height - margin;
            let endX = margin + x;
            let endY = canvas.height - margin - y;

            // Draw Area under curve (Red Gradient)
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            // Cubic curve for smoother "Aviator" look
            ctx.bezierCurveTo(startX + x * 0.4, startY, startX + x * 0.7, startY + (endY - startY) * 0.1, endX, endY);
            ctx.lineTo(endX, startY);
            ctx.closePath();

            const grad = ctx.createLinearGradient(startX, endY, startX, startY);
            grad.addColorStop(0, 'rgba(209, 2, 20, 0.6)');
            grad.addColorStop(1, 'rgba(209, 2, 20, 0)');
            ctx.fillStyle = grad;
            ctx.fill();

            // Draw Path Line (Thick Red)
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.bezierCurveTo(startX + x * 0.4, startY, startX + x * 0.7, startY + (endY - startY) * 0.1, endX, endY);
            ctx.strokeStyle = '#d10214';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.stroke();

            if (crashElapsed > 0) {
                // Plane flies off screen
                endX += crashElapsed * 800;
                endY -= crashElapsed * 400;

                ctx.save();
                ctx.fillStyle = "rgba(209, 2, 20, " + Math.max(0, 1 - crashElapsed) + ")";
                ctx.font = "900 40px Inter";
                ctx.textAlign = "center";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "black";
                ctx.fillText("FLEW AWAY!", canvas.width/2, canvas.height/2 + 80);
                ctx.restore();
            }

            // Draw Plane
            if (planeImg.complete) {
                const pW = 120; // Slightly smaller plane for better scale
                const pH = 60;
                ctx.save();
                ctx.translate(endX, endY);

                // Rotation based on curve slope
                const rotation = elapsed > 0 ? -Math.atan2(y, x * 0.8) * 0.6 : 0;
                ctx.rotate(rotation);

                ctx.shadowBlur = 20;
                ctx.shadowColor = "#d10214";

                ctx.drawImage(planeImg, -pW/2, -pH/2, pW, pH);
                ctx.restore();
            }
        }

        function showResult(type, value) {
            const overlay = document.getElementById("resultOverlay");
            const card = document.getElementById("resultCard");
            const title = document.getElementById("resultTitle");
            const valEl = document.getElementById("resultValue");

            card.className = "result-card " + type;
            title.innerText = type === 'win' ? 'WIN' : 'LOSE';
            valEl.innerText = type === 'win' ? '₹' + value : 'BET LOST';

            overlay.classList.add("show");
            setTimeout(() => {
                overlay.classList.remove("show");
            }, 3000);
        }

        function endFlight() {
            isFlying = false;
            isCrashed = true;
            crashStartTime = Date.now();
            sndFly.pause(); sndFly.currentTime = 0;
            sndCrash.play().catch(e=>{});
            document.getElementById("multiplier").style.color = "var(--primary-red)";

            // Play lose sound ONLY if user had active bets and hasn't cashed out
            const hadActiveBet = (activeBets[1].placed || activeBets[2].placed);
            if (hadActiveBet) {
                new Audio('sound/lose.mp3').play().catch(e=>{});
                showResult('lose', 0);
            }

            activeBets[1].placed = false;
            activeBets[2].placed = false;
        }

        function updateButtonsWaiting(t) {
            for(let i=1; i<=2; i++) {
                const btn = document.getElementById(`btn${i}`);
                const sub = document.getElementById(`sub${i}`);
                if (!activeBets[i].placed) {
                    btn.className = "big-bet-btn btn-green";
                    btn.disabled = false;
                    btn.querySelector('.label').innerText = "BET";
                    sub.innerText = document.getElementById(`amt${i}`).value + " INR";
                } else {
                    btn.className = "big-bet-btn btn-red";
                    btn.querySelector('.label').innerText = "CANCEL";
                    btn.disabled = false;
                }
            }
        }

        function updateButtonsFlying() {
            for(let i=1; i<=2; i++) {
                const btn = document.getElementById(`btn${i}`);
                const sub = document.getElementById(`sub${i}`);
                if (activeBets[i].placed) {
                    const win = (activeBets[i].amount * currentMult).toFixed(2);
                    btn.className = "big-bet-btn btn-orange";
                    btn.querySelector('.label').innerText = "CASH OUT";
                    sub.innerText = win + " INR";
                    btn.disabled = false;
                } else {
                    btn.className = "big-bet-btn btn-green";
                    btn.querySelector('.label').innerText = "BET";
                    btn.disabled = true;
                }
            }
        }

        async function handleBtn(i) {
            const btn = document.getElementById(`btn${i}`);
            const amount = parseFloat(document.getElementById(`amt${i}`).value);
            const label = btn.querySelector('.label').innerText;
            const autoCashOut = parseFloat(document.getElementById(`autoVal${i}`).value);

            if (label === "BET") {
                // Optimistic UI for immediate feel
                activeBets[i] = { placed: true, amount };
                updateButtonsWaiting(0);

                const res = await fetch(`${API_URL}/api/play/aviator`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", authorization: token },
                    body: JSON.stringify({ betAmount: amount, cashOutMultiplier: 100, slot: i })
                });
                const data = await res.json();
                if (data.success) { fetchBalance(); }
                else {
                    activeBets[i].placed = false;
                    alert(data.message);
                    updateButtonsWaiting(0);
                }
            } else if (label === "CANCEL") {
                activeBets[i].placed = false;
                updateButtonsWaiting(0);

                const res = await fetch(`${API_URL}/api/game/aviator/cancel`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", authorization: token }
                });
                const data = await res.json();
                if (data.success) { fetchBalance(); }
                else {
                    activeBets[i].placed = true;
                    updateButtonsWaiting(0);
                }
            } else if (label === "CASH OUT") {
                const winAmt = (activeBets[i].amount * currentMult).toFixed(2);

                // Fast Cashout UI: Don't wait for server to play sound and update UI
                activeBets[i].placed = false;
                sndWin.play().catch(e=>{});
                updateButtonsFlying();
                showResult('win', winAmt);

                const res = await fetch(`${API_URL}/api/game/aviator/cashout`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", authorization: token },
                    body: JSON.stringify({ multiplier: currentMult.toFixed(2), slot: i })
                });
                const data = await res.json();
                if (data.success) {
                    fetchBalance();
                } else {
                    console.error("Cashout failed on server:", data.message);
                }
            }
        }

        function renderHistory(h) {
            document.getElementById("historyBar").innerHTML = h.slice(0,20).map(x => {
                let color = 'var(--accent-blue)';
                if (x.crash >= 10) color = 'var(--multiplier-pink)';
                else if (x.crash >= 2) color = 'var(--multiplier-purple)';

                return `<div class="hist-item" style="color:${color}">${x.crash.toFixed(2)}x</div>`;
            }).join('');
        }

        async function fetchBalance() {
            const res = await fetch(`${API_URL}/api/profile`, { headers: { authorization: token } });
            const data = await res.json();
            if (data.success) {
                currentUser = data.user;
                document.getElementById("balance").innerText = data.user.coins.toFixed(2);
            }
        }

        function changeAmt(i, v) {
            const inp = document.getElementById(`amt${i}`);
            inp.value = Math.max(10, parseFloat(inp.value) + v).toFixed(2);
            if(!activeBets[i].placed) document.getElementById(`sub${i}`).innerText = inp.value + " INR";
        }
        function setAmt(i, v) {
            document.getElementById(`amt${i}`).value = v.toFixed(2);
            if(!activeBets[i].placed) document.getElementById(`sub${i}`).innerText = v.toFixed(2) + " INR";
        }
        function changeAutoVal(i, v) {
            const inp = document.getElementById(`autoVal${i}`);
            let val = parseFloat(inp.value) + v;
            inp.value = Math.max(2, Math.min(1000, val)).toFixed(2);
        }

        setInterval(fetchState, 500);
        fetchBalance();
    </script>
</body>
</html>
