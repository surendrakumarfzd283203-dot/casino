<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator | Solo Casino</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #d10214;
            --bg-dark: #000;
            --panel-bg: #141516;
            --win-green: #28a745;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: #1b1c1d;
            border-bottom: 1px solid #333;
        }

        .balance-box {
            background: rgba(40, 167, 69, 0.1);
            color: #28a745;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        .game-area {
            flex: 1;
            position: relative;
            background: radial-gradient(circle at center, #1b1c1d 0%, #000 100%);
            margin: 10px;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #multiplier {
            font-size: 60px;
            font-weight: 900;
            z-index: 10;
        }

        .plane-box {
            position: absolute;
            bottom: 30px;
            left: 30px;
            transition: transform 0.1s linear;
        }
        .plane-img { width: 100px; filter: drop-shadow(0 0 10px var(--primary-red)); }

        .controls {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 15px 15px 0 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .bet-input-container {
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .bet-input-container button { background: #222; border: none; color: white; width: 30px; height: 30px; border-radius: 5px; cursor: pointer; }
        .bet-input-container input { background: none; border: none; color: white; width: 60px; text-align: center; font-weight: bold; font-size: 16px; }

        .btn-main {
            height: 50px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-bet { background: var(--win-green); color: white; }
        .btn-cancel { background: #444; color: white; }
        .btn-cashout { background: #f5a623; color: black; display: none; width: 100%; grid-column: span 2; }

        .result-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 20px;
            z-index: 20;
            display: none;
        }
        .res-win { background: rgba(40, 167, 69, 0.9); color: white; }
        .res-loss { background: rgba(209, 2, 20, 0.9); color: white; }

        .history-list {
            padding: 5px 10px;
            display: flex;
            gap: 5px;
            overflow-x: auto;
            background: #000;
        }
        .hist-item {
            background: #212429;
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-weight: 900; color: var(--primary-red);">AVIATOR</div>
        <div class="balance-box">₹ <span id="balance">0.00</span></div>
    </div>

    <div class="history-list" id="history"></div>

    <div class="game-area">
        <div id="multiplier">1.00x</div>
        <div class="plane-box" id="planeBox">
            <img src="image/aviator.png" class="plane-img" alt="plane">
        </div>
        <div class="result-overlay" id="resultMsg"></div>
    </div>

    <div class="controls">
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <div class="bet-input-container">
                <button onclick="updateBetAmount(-10)">-</button>
                <input type="number" id="betAmount" value="100">
                <button onclick="updateBetAmount(10)">+</button>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <button class="button-secondary" style="padding: 5px; font-size: 10px;" onclick="setBet(100)">100</button>
                <button class="button-secondary" style="padding: 5px; font-size: 10px;" onclick="setBet(500)">500</button>
            </div>
        </div>

        <button id="mainBtn" class="btn-main btn-bet" onclick="handleMainAction()">BET</button>
        <button id="cashoutBtn" class="btn-main btn-cashout" onclick="handleCashout()">CASHOUT</button>
    </div>

    <script src="js/config.js"></script>
    <script>
        const token = localStorage.getItem("token");
        if (!token) location.href = "login.html";

        let isFlying = false;
        let isBetPlaced = false;
        let currentMultiplier = 1.0;
        let startTime = null;
        let animationFrame = null;
        let betAmount = 0;

        async function fetchState() {
            try {
                const res = await fetch(`${API_URL}/api/game/aviator/state`, {
                    headers: { authorization: token }
                });
                const data = await res.json();
                if (data.success) {
                    updateUI(data);
                }
            } catch (e) {}
        }

        function updateUI(data) {
            const btn = document.getElementById("mainBtn");
            const cashoutBtn = document.getElementById("cashoutBtn");
            const resultMsg = document.getElementById("resultMsg");

            if (data.isFlying) {
                if (!isFlying) {
                    startAnimation();
                    resultMsg.style.display = "none";
                }
                if (isBetPlaced) {
                    btn.style.display = "none";
                    cashoutBtn.style.display = "block";
                    cashoutBtn.innerHTML = `CASHOUT<br>₹ ${(betAmount * currentMultiplier).toFixed(2)}`;
                } else {
                    btn.disabled = true;
                    btn.innerText = "FLYING...";
                }
            } else {
                if (isFlying) stopAnimation();
                isFlying = false;

                if (!isBetPlaced) {
                    btn.disabled = data.timer < 5;
                    btn.innerText = data.timer < 5 ? "STARTING..." : "BET";
                    btn.className = "btn-main btn-bet";
                    btn.style.display = "block";
                    cashoutBtn.style.display = "none";
                } else {
                    btn.innerText = "CANCEL";
                    btn.className = "btn-main btn-cancel";
                }

                document.getElementById("multiplier").innerText = "1.00x";
                document.getElementById("multiplier").style.color = "white";
                document.getElementById("planeBox").style.transform = `translate(0, 0)`;
            }

            renderHistory(data.history);
        }

        function startAnimation() {
            isFlying = true;
            startTime = Date.now();
            animate();
        }

        function animate() {
            if (!isFlying) return;
            const elapsed = (Date.now() - startTime) / 1000;
            currentMultiplier = Math.pow(1.1, elapsed);
            document.getElementById("multiplier").innerText = currentMultiplier.toFixed(2) + "x";

            const x = Math.min(elapsed * 40, 250);
            const y = Math.min(Math.pow(elapsed, 1.5) * 15, 200);
            document.getElementById("planeBox").style.transform = `translate(${x}px, -${y}px)`;

            animationFrame = requestAnimationFrame(animate);
        }

        function stopAnimation() {
            isFlying = false;
            cancelAnimationFrame(animationFrame);
            document.getElementById("multiplier").style.color = "var(--primary-red)";

            if (isBetPlaced) {
                showResult("LOST", false);
                isBetPlaced = false;
            }
        }

        async function handleMainAction() {
            const btn = document.getElementById("mainBtn");
            if (btn.innerText === "BET") {
                const amount = document.getElementById("betAmount").value;
                try {
                    const res = await fetch(`${API_URL}/api/play/aviator`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json", authorization: token },
                        body: JSON.stringify({ betAmount: amount, cashOutMultiplier: 100 })
                    });
                    const data = await res.json();
                    if (data.success) {
                        isBetPlaced = true;
                        betAmount = amount;
                        fetchBalance();
                    } else alert(data.message);
                } catch (e) {}
            } else if (btn.innerText === "CANCEL") {
                // In a real app, you'd call a cancel API. Here we just reset state
                isBetPlaced = false;
                alert("Bet Cancelled!");
                fetchBalance(); // Refresh balance (in a real app, coins would be returned)
            }
        }

        async function handleCashout() {
            if (!isFlying || !isBetPlaced) return;
            const winVal = (betAmount * currentMultiplier).toFixed(2);
            isBetPlaced = false;
            showResult(`WON ₹ ${winVal}`, true);

            // Call API to settle
            try {
                await fetch(`${API_URL}/api/profile`, { headers: { authorization: token } }); // Just refresh
                fetchBalance();
            } catch (e) {}
        }

        function showResult(msg, isWin) {
            const res = document.getElementById("resultMsg");
            res.innerText = msg;
            res.className = `result-overlay ${isWin ? 'res-win' : 'res-loss'}`;
            res.style.display = "block";
            setTimeout(() => res.style.display = "none", 3000);
        }

        function renderHistory(history) {
            document.getElementById("history").innerHTML = history.slice(0, 10).map(h => `
                <div class="hist-item" style="color: ${h.crash > 2 ? '#9858f5' : '#34b4ff'}">${h.crash.toFixed(2)}x</div>
            `).join('');
        }

        async function fetchBalance() {
            const res = await fetch(`${API_URL}/api/profile`, { headers: { authorization: token } });
            const data = await res.json();
            if (data.success) {
                document.getElementById("balance").innerText = data.user.coins.toFixed(2);
            }
        }

        function updateBetAmount(v) { document.getElementById("betAmount").value = Math.max(10, parseInt(document.getElementById("betAmount").value) + v); }
        function setBet(v) { document.getElementById("betAmount").value = v; }

        setInterval(fetchState, 1000);
        fetchBalance();
    </script>
</body>
</html>
