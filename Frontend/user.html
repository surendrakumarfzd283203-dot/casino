<div id="users"></div>

<script src="js/config.js"></script>
<script>

fetch(`${API_URL}/api/admin/users`)
.then(res=>res.json())
.then(data=>{

let html = "";

data.forEach(user=>{

html += `
<div>
    ${user.name}
    (${user.email})
    - ${user.coins} Coins
</div>
`;

});

document.getElementById("users").innerHTML = html;

});

</script>
