<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teen Patti Royale | Solo Casino</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #ffc107;
            --bg-dark: #020617;
            --poker-border: #422006;
            --primary: #15803d;
        }

        body {
            background: #064e3b url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=2000') no-repeat center center;
            background-size: cover;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* LOBBY / TABLE SELECTION */
        #lobby {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 5000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .lobby-title { font-size: 32px; font-weight: 950; color: var(--gold); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
        .table-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 600px;
        }
        .table-card {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .table-card:hover { border-color: var(--gold); transform: translateY(-5px); }

        /* GAME HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(0,0,0,0.6);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }

        /* TABLE AREA */
        .table-area {
            flex: 1;
            position: relative;
            perspective: 1200px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .poker-table {
            width: 90%;
            height: 55%;
            background: #4a2c1e url('https://www.transparenttextures.com/patterns/dark-wood.png');
            border: 10px solid #2a1810;
            border-radius: 180px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8), inset 0 0 80px rgba(0,0,0,0.6);
            position: relative;
            transform: rotateX(20deg);
        }

        .dealer-box {
            position: absolute;
            top: 2%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            text-align: center;
        }
        .dealer-img {
            width: 160px;
            height: 160px;
            object-fit: contain;
            filter: drop-shadow(0 10px 20px black);
            animation: breathe 4s ease-in-out infinite;
        }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* PLAYER SEATS */
        .player-seat {
            position: absolute;
            width: 100px;
            text-align: center;
            z-index: 100;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .seat-me { bottom: 2%; left: 50%; transform: translateX(-50%); }
        .seat-2 { left: 2%; bottom: 25%; }
        .seat-3 { left: 10%; top: 12%; }
        .seat-4 { right: 10%; top: 12%; }
        .seat-5 { right: 2%; bottom: 25%; }

        .avatar-wrap {
            width: 60px; height: 60px;
            margin: 0 auto;
            position: relative;
        }
        .avatar {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: #1e293b;
            border: 2px solid var(--gold);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .active-turn .avatar { border-color: #3b82f6; box-shadow: 0 0 25px #3b82f6; animation: glow 1.5s infinite; }
        @keyframes glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        .status-tag {
            background: rgba(0,0,0,0.8);
            color: var(--gold);
            font-size: 10px;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 10px;
            position: absolute;
            top: -10px; left: 50%; transform: translateX(-50%);
            white-space: nowrap;
            z-index: 10;
        }

        .name-tag {
            font-size: 11px;
            font-weight: 800;
            background: rgba(0,0,0,0.8);
            padding: 3px 8px;
            border-radius: 10px;
            margin-top: 5px;
            color: white;
            white-space: nowrap;
        }

        /* CARDS */
        .cards-hand {
            display: flex;
            justify-content: center;
            margin-top: 5px;
            height: 50px;
        }
        .card {
            width: 35px; height: 50px;
            background: white;
            border-radius: 4px;
            color: black;
            font-size: 14px;
            font-weight: 950;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            border: 1px solid #ddd;
            margin: 0 -10px; /* Overlap */
            position: relative;
            transition: 0.3s;
        }
        .card:nth-child(1) { transform: rotate(-10deg); }
        .card:nth-child(3) { transform: rotate(10deg); }

        .card.back {
            background: #be123c url('https://www.transparenttextures.com/patterns/poker-qr.png');
            border: 1.5px solid white;
            color: transparent;
        }

        /* POT */
        .pot-box {
            position: absolute;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--gold);
            z-index: 10;
        }
        .pot-amount { font-size: 24px; font-weight: 950; text-shadow: 0 2px 10px black; }

        /* CONTROLS */
        .controls-wrapper {
            background: rgba(15, 23, 42, 0.98);
            border-top: 2px solid #334155;
            padding: 15px 10px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .emoji-menu {
            position: fixed;
            bottom: 180px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            border: 1px solid var(--gold);
            border-radius: 15px;
            padding: 10px;
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            z-index: 2000;
        }
        .emoji-btn {
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .emoji-btn:active { transform: scale(1.2); }

        .game-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .timer-circle {
            width: 55px; height: 55px;
            border: 4px solid #ef4444;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 900;
            background: rgba(0,0,0,0.5);
            color: white;
        }

        .action-btns {
            display: flex;
            gap: 8px;
            flex: 1;
        }

        .btn-action {
            height: 50px;
            flex: 1;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
            transition: 0.1s;
            color: white;
        }
        .btn-action:active { transform: translateY(3px); box-shadow: none; }
        .btn-pack { background: #be123c; }
        .btn-see { background: #1d4ed8; }
        .btn-chaal { background: #15803d; }
        .btn-show { background: #f59e0b; }
        .btn-side { background: #a21caf; }

        .bet-stepper-container {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.4);
            border-radius: 30px;
            padding: 5px 20px;
            gap: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .step-ctrl {
            background: #334155;
            color: white;
            border: none;
            width: 40px; height: 40px;
            border-radius: 50%;
            font-size: 24px;
            font-weight: 900;
            cursor: pointer;
        }
        .bet-val-display {
            font-size: 20px;
            font-weight: 900;
            color: var(--gold);
            min-width: 80px;
            text-align: center;
        }

        /* RESULT */
        #resultOverlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 7000;
            display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .res-card {
            background: #1e293b;
            padding: 40px; border-radius: 30px;
            border: 3px solid var(--gold);
            text-align: center;
            width: 85%;
            max-width: 400px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .poker-table { height: 45%; width: 100%; border-radius: 100px; }
            .player-seat { width: 80px; }
            .avatar-wrap { width: 50px; height: 50px; }
            .pot-amount { font-size: 20px; }
            .btn-action { height: 45px; font-size: 12px; }
            .bet-val-display { font-size: 18px; }
        }

    </style>
</head>
<body>

    <div id="lobby">
        <div class="lobby-title">Teen Patti Royale</div>
        <div class="table-list">
            <div class="table-card" onclick="join(1)">
                <h3>Public T1</h3>
                <div style="font-size: 20px; font-weight: 900;">₹5</div>
            </div>
            <div class="table-card" onclick="join(2)">
                <h3>Public T2</h3>
                <div style="font-size: 20px; font-weight: 900;">₹10</div>
            </div>
            <div class="table-card" onclick="join(3)">
                <h3>High Roller</h3>
                <div style="font-size: 20px; font-weight: 900;">₹100</div>
            </div>
        </div>
    </div>

    <div class="header">
        <button onclick="location.href='dashboard.html'" style="background:none; border:none; color:white; font-size: 24px;"><i class="fas fa-arrow-left"></i></button>
        <div id="tableName" style="font-size: 16px; font-weight: 900;">TABLE #1</div>
        <div style="font-size: 16px; color: #22c55e; font-weight: 900;">₹<span id="balance">0</span></div>
    </div>

    <div class="table-area">
        <div class="dealer-box">
            <img src="https://i.postimg.cc/85zXmK2j/dealer.png" class="dealer-img" alt="dealer" onerror="this.src='https://i.ibb.co/L5pZ0vX/dealer-girl.png'">
        </div>
        <div class="poker-table"></div>
        <div class="pot-box">
            <div style="font-size: 10px; font-weight: 900; opacity: 0.6; color: white;">POT</div>
            <div class="pot-amount">₹<span id="potVal">0</span></div>
        </div>
        <div id="seatsContainer"></div>
    </div>

    <div class="emoji-menu" id="emojiMenu">
        <button class="emoji-btn" onclick="sendEmoji('🌹')">🌹</button>
        <button class="emoji-btn" onclick="sendEmoji('🥤')">🥤</button>
        <button class="emoji-btn" onclick="sendEmoji('❤️')">❤️</button>
        <button class="emoji-btn" onclick="sendEmoji('😂')">😂</button>
        <button class="emoji-btn" onclick="sendEmoji('🔥')">🔥</button>
        <button class="emoji-btn" onclick="sendEmoji('👍')">👍</button>
    </div>

    <div class="controls-wrapper" id="controls">
        <div class="bet-stepper-container">
            <button class="step-ctrl" onclick="adjustBet(-1)">-</button>
            <div class="bet-val-display" id="nextBetDisplay">₹0</div>
            <button class="step-ctrl" onclick="adjustBet(1)">+</button>
            <button class="emoji-btn" onclick="toggleEmojis()" style="margin-left: 10px;">😊</button>
        </div>

        <div class="game-controls">
            <div class="timer-circle" id="timer">0</div>
            <div class="action-btns">
                <button class="btn-action btn-pack" onclick="handleMove('PACK')">Pack</button>
                <button class="btn-action btn-see" id="seeBtn" onclick="handleMove('SEE')">See</button>
                <button class="btn-action btn-chaal" id="chaalBtn" onclick="handleMove('CHAAL')">Chaal</button>
                <button class="btn-action btn-show" id="showBtn" onclick="handleMove('SHOW')" style="display: none;">Show</button>
                <button class="btn-action btn-side" id="sideBtn" onclick="handleMove('SIDESHOW')" style="display: none;">Side</button>
            </div>
        </div>
    </div>

    <div id="resultOverlay">
        <div class="res-card">
            <h1 id="resTitle" style="margin-top:0;">YOU WIN!</h1>
            <div id="resHand" class="cards-hand" style="margin: 20px 0; height: 60px;"></div>
            <div id="resAmount" style="font-size: 32px; color: var(--gold); font-weight: 950; margin: 15px 0;">₹0</div>
            <button class="btn-action btn-chaal" style="width: 100%;" onclick="closeRes()">CONTINUE</button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const token = localStorage.getItem("token");
        let myId = "";
        let currentTable = null;
        let isFetching = false;
        let lastState = "";
        let nextBet = 0;

        async function join(id) {
            currentTable = id;
            document.getElementById("tableName").innerText = "TABLE #" + id;
            const res = await fetch(`${API_URL}/api/teenpatti/join`, {
                method: "POST",
                headers: { "Content-Type": "application/json", authorization: token },
                body: JSON.stringify({ tableId: id })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById("lobby").style.display = "none";
                setInterval(fetchState, 1500);
                fetchBalance();
            } else { alert(data.message); }
        }

        async function fetchState() {
            if(isFetching || !currentTable) return;
            isFetching = true;
            try {
                const res = await fetch(`${API_URL}/api/teenpatti/tables`, { headers: { authorization: token } });
                const data = await res.json();
                if (data.success) {
                    const table = data.tables.find(t => t.id == currentTable);
                    if (table) updateUI(table);
                }
            } catch (e) {}
            finally { isFetching = false; }
        }

        function updateUI(table) {
            document.getElementById("timer").innerText = table.timer;
            document.getElementById("potVal").innerText = table.pot;

            const container = document.getElementById("seatsContainer");
            container.innerHTML = "";

            const uids = Object.keys(table.players);
            const myIndex = uids.indexOf(myId);
            const totalPlayers = uids.length;

            uids.forEach((uid, idx) => {
                const p = table.players[uid];
                let seatPos = 1;
                if (uid === myId) seatPos = "me";
                else {
                    const relativeIdx = (idx - myIndex + totalPlayers) % totalPlayers;
                    seatPos = relativeIdx + 1;
                    if (seatPos > 5) seatPos = 5;
                }

                const seatDiv = document.createElement("div");
                seatDiv.className = `player-seat seat-${seatPos} ${table.currentTurn === uid ? 'active-turn' : ''}`;

                const statusTag = p.status === 'PACKED' ? '<div class="status-tag">PACKED</div>' :
                                  (!p.blind && table.state === 'PLAYING' ? `<div class="status-tag">${p.handRank || 'SEEN'}</div>` :
                                  (p.blind && table.state === 'PLAYING' ? '<div class="status-tag">BLIND</div>' : ''));

                const avatarIcon = p.isBot ? `https://i.pravatar.cc/100?u=${p.name}` : `https://i.pravatar.cc/100?u=${uid}`;

                seatDiv.innerHTML = `
                    <div class="avatar-wrap">
                        <div class="avatar"><img src="${avatarIcon}"></div>
                        ${statusTag}
                    </div>
                    <div class="name-tag">${p.name}</div>
                    <div class="cards-hand">${renderHandHtml(p.hand, p.blind && table.state !== 'SHOW')}</div>
                `;
                container.appendChild(seatDiv);

                if (uid === myId) {
                    const isMyTurn = table.currentTurn === myId && table.state === 'PLAYING';
                    document.getElementById("controls").style.opacity = isMyTurn ? "1" : "0.5";
                    document.getElementById("controls").style.pointerEvents = isMyTurn ? "auto" : "none";

                    if (isMyTurn) {
                        document.getElementById("seeBtn").style.display = p.blind ? "block" : "none";

                        const activePlayers = uids.filter(id => table.players[id].status === 'ACTIVE');
                        const activePlayersCount = activePlayers.length;

                        // Show button only if 2 players left
                        document.getElementById("showBtn").style.display = (activePlayersCount === 2) ? "block" : "none";

                        // Side Show button if > 2 players and I have seen and previous player has seen
                        const myIdxActive = activePlayers.indexOf(myId);
                        const prevPlayerId = activePlayers[(myIdxActive - 1 + activePlayers.length) % activePlayers.length];
                        const prevPlayerSeen = table.players[prevPlayerId] && !table.players[prevPlayerId].blind;
                        document.getElementById("sideBtn").style.display = (activePlayersCount > 2 && !p.blind && prevPlayerSeen) ? "block" : "none";

                        if (nextBet === 0 || nextBet < table.lastBet) nextBet = table.lastBet;
                        document.getElementById("nextBetDisplay").innerText = `₹${nextBet}`;

                        const betToPay = p.blind ? nextBet : nextBet * 2;
                        document.getElementById("chaalBtn").innerText = p.blind ? `BLIND ₹${betToPay}` : `CHAAL ₹${betToPay}`;
                        if (document.getElementById("showBtn").style.display === "block") {
                             document.getElementById("showBtn").innerText = `SHOW ₹${betToPay}`;
                        }
                    }
                }
            });

            if (table.state === 'SHOW' && lastState !== 'SHOW') showResult(table);
            lastState = table.state;
        }

        function renderHandHtml(hand, isHidden) {
            if (!hand || hand.length === 0) return '';
            return hand.map(c => {
                const rank = c.rank || '?';
                const suit = c.suit || '?';
                const color = (suit === '♥' || suit === '♦') ? '#ef4444' : '#000';

                return `
                    <div class="card ${isHidden ? 'back' : ''}" style="color: ${color}">
                        <div style="font-size:12px; font-weight:900; line-height:1">${isHidden ? '' : rank}</div>
                        <div style="font-size:18px; line-height:1">${isHidden ? '' : suit}</div>
                    </div>
                `;
            }).join('');
        }

        async function handleMove(move) {
            const res = await fetch(`${API_URL}/api/teenpatti/move`, {
                method: "POST",
                headers: { "Content-Type": "application/json", authorization: token },
                body: JSON.stringify({ tableId: currentTable, move, amount: nextBet })
            });
            fetchState();
            fetchBalance();
        }

        function adjustBet(val) {
            const step = 5;
            nextBet = Math.max(nextBet + (val * step), 5);
            document.getElementById("nextBetDisplay").innerText = `₹${nextBet}`;
            // fetchState(); // Removed to avoid UI flash
        }

        function toggleEmojis() {
            const menu = document.getElementById("emojiMenu");
            menu.style.display = menu.style.display === "grid" ? "none" : "grid";
        }

        function sendEmoji(e) {
            console.log("Emoji sent:", e);
            toggleEmojis();
        }

        function showResult(table) {
            const me = table.players[myId];
            if (!me) return;
            const overlay = document.getElementById("resultOverlay");
            overlay.style.display = "flex";

            const winner = Object.values(table.players).find(p => p.result === 'WIN');
            if (winner) {
                document.getElementById("resHand").innerHTML = renderHandHtml(winner.hand, false);
            }

            if (me.result === 'WIN') {
                document.getElementById("resTitle").innerText = "YOU WIN!";
                document.getElementById("resAmount").innerText = "₹" + me.winAmount;
                new Audio('sound/win.mp3').play().catch(e=>{});
            } else {
                document.getElementById("resTitle").innerText = "YOU LOSE";
                document.getElementById("resAmount").innerText = "Better luck next time!";
                new Audio('sound/lose.mp3').play().catch(e=>{});
            }
            fetchBalance();
        }

        function closeRes() { document.getElementById("resultOverlay").style.display = "none"; }

        async function fetchBalance() {
            const res = await fetch(`${API_URL}/api/profile`, { headers: { authorization: token } });
            const data = await res.json();
            if (data.success) {
                document.getElementById("balance").innerText = data.user.coins.toFixed(2);
                myId = data.user.id;
            }
        }
    </script>
</body>
</html>
