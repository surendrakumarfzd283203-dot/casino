<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teen Patti Live | Solo Casino</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --table-green: #1a4a1a;
            --table-border: #d4af37;
            --bg-dark: #0f172a;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .game-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            background: rgba(0,0,0,0.5);
            z-index: 10;
        }

        .table-area {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .poker-table {
            width: 85%;
            height: 60%;
            background: radial-gradient(circle, #2e7d32 0%, #1b5e20 100%);
            border: 12px solid #5d4037;
            border-radius: 150px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 50px rgba(0,0,0,0.5);
            position: relative;
            transform: rotateX(20deg);
        }

        .dealer-area {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 5;
        }

        .dealer-img {
            width: 150px;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        .player-seat {
            position: absolute;
            width: 80px;
            text-align: center;
            z-index: 10;
        }

        /* Positioning players around the table */
        .seat-1 { bottom: -40px; left: 50%; transform: translateX(-50%); }
        .seat-2 { bottom: 20px; left: 5%; }
        .seat-3 { top: 20px; left: 5%; }
        .seat-4 { top: 20px; right: 5%; }
        .seat-5 { bottom: 20px; right: 5%; }

        .player-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--table-border);
            background: #333;
            margin: 0 auto 5px;
            overflow: hidden;
        }

        .player-name { font-size: 10px; font-weight: bold; background: rgba(0,0,0,0.7); border-radius: 5px; padding: 2px; }
        .player-bet { font-size: 10px; color: var(--table-border); }

        .card-container {
            display: flex;
            gap: 2px;
            justify-content: center;
            margin-top: 5px;
        }

        .card {
            width: 25px;
            height: 35px;
            background: white;
            border-radius: 3px;
            color: black;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        .controls-area {
            padding: 15px;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .bet-input {
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            padding: 10px;
            border-radius: 10px;
            width: 80px;
            text-align: center;
        }

        .action-btn {
            padding: 12px 25px;
            border-radius: 15px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-pack { background: #ef4444; color: white; }
        .btn-chaal { background: #3b82f6; color: white; }
        .btn-show { background: #10b981; color: white; }

        .timer-circle {
            width: 60px;
            height: 60px;
            border: 4px solid #ef4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
        }

        .pot-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--table-border);
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <button onclick="location.href='dashboard.html'" style="background:none; border:none; color:white;"><i class="fas fa-chevron-left"></i> Back</button>
            <div>POT: <span id="totalPot">0</span></div>
            <div id="balance">Coins: 0</div>
        </div>

        <div class="table-area">
            <div class="dealer-area">
                <img src="https://i.ibb.co/L5pZ0vX/dealer-girl.png" class="dealer-img" alt="Dealer" onerror="this.src='image/aviator.png'">
                <div class="card-container" id="dealerCards">
                    <!-- Cards here -->
                </div>
            </div>

            <div class="poker-table">
                <div class="pot-area">
                    <img src="https://cdn-icons-png.flaticon.com/512/248/248927.png" width="30" alt="coins"><br>
                    TABLE POT
                </div>
            </div>

            <!-- Seat 1 (Me) -->
            <div class="player-seat seat-1">
                <div class="player-avatar" id="myAvatar"></div>
                <div class="player-name">YOU</div>
                <div class="player-bet" id="myBet">Bet: 0</div>
                <div class="card-container" id="myCards"></div>
            </div>

            <!-- Other Seats (Placeholders for other users) -->
            <div id="otherPlayers"></div>
        </div>

        <div class="controls-area">
            <div class="timer-circle" id="timer">20</div>
            <input type="number" id="betAmount" class="bet-input" value="10" step="10">
            <button class="action-btn btn-chaal" onclick="placeBet()">Place Bet</button>
            <button class="action-btn btn-show" onclick="location.href='teenpatti.html'">Join Next</button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const token = localStorage.getItem("token");
        if (!token) location.href = "login.html";

        let currentTable = 1;

        async function fetchState() {
            try {
                const res = await fetch(`${API_URL}/api/teenpatti/tables`, {
                    headers: { authorization: token }
                });
                const data = await res.json();
                if (data.success) {
                    updateUI(data.tables.find(t => t.id == currentTable));
                }
            } catch (e) { console.error(e); }
        }

        function updateUI(table) {
            if (!table) return;
            document.getElementById("timer").innerText = table.timer;

            // Update Pots and Info
            let totalPot = 0;
            const otherPlayersContainer = document.getElementById("otherPlayers");
            otherPlayersContainer.innerHTML = "";

            let seatIndex = 2;
            for (let userId in table.players) {
                const player = table.players[userId];
                totalPot += player.betAmount;

                // If it's me
                if (userId === localStorage.getItem("userId")) {
                    document.getElementById("myBet").innerText = `Bet: ${player.betAmount}`;
                    renderCards("myCards", player.hand);
                } else {
                    // It's someone else
                    const seat = document.createElement("div");
                    seat.className = `player-seat seat-${seatIndex++}`;
                    seat.innerHTML = `
                        <div class="player-avatar"></div>
                        <div class="player-name">${player.name}</div>
                        <div class="player-bet">Bet: ${player.betAmount}</div>
                        <div class="card-container">${renderCardsHtml(player.hand)}</div>
                    `;
                    otherPlayersContainer.appendChild(seat);
                }
            }
            document.getElementById("totalPot").innerText = totalPot;

            if (table.state === 'RESOLVING') {
                renderCards("dealerCards", table.dealerHand);
            } else {
                document.getElementById("dealerCards").innerHTML = "";
            }
        }

        function renderCards(id, hand) {
            const container = document.getElementById(id);
            if (!hand || hand.length === 0) {
                container.innerHTML = "";
                return;
            }
            container.innerHTML = hand.map(c => `
                <div class="card" style="color: ${['♥','♦'].includes(c.suit) ? 'red' : 'black'}">
                    ${c.rank}${c.suit}
                </div>
            `).join('');
        }

        function renderCardsHtml(hand) {
            if (!hand || hand.length === 0) return "";
            return hand.map(c => `
                <div class="card" style="color: ${['♥','♦'].includes(c.suit) ? 'red' : 'black'}">
                    ${c.rank}${c.suit}
                </div>
            `).join('');
        }

        async function placeBet() {
            const amount = document.getElementById("betAmount").value;
            try {
                const res = await fetch(`${API_URL}/api/teenpatti/bet`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", authorization: token },
                    body: JSON.stringify({ tableId: currentTable, betAmount: amount })
                });
                const data = await res.json();
                if (data.success) {
                    alert("Bet Placed!");
                    fetchBalance();
                } else {
                    alert(data.message);
                }
            } catch (e) { console.error(e); }
        }

        async function fetchBalance() {
            const res = await fetch(`${API_URL}/api/profile`, { headers: { authorization: token } });
            const data = await res.json();
            if (data.success) {
                document.getElementById("balance").innerText = `Coins: ${data.user.coins.toLocaleString()}`;
                localStorage.setItem("userId", data.user.id);
            }
        }

        setInterval(fetchState, 1000);
        fetchBalance();
    </script>
</body>
</html>
