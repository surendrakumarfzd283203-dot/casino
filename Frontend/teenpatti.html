<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teen Patti Solo | Solo Casino</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffc107; --bg: #2a0a0a; --poker-blue: #24589e; --action-red: #ef4444; --action-green: #22c55e; }
        body { background: #0e0202; color: white; font-family: 'Roboto', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; user-select: none; }

        /* LOBBY */
        #lobby { position: fixed; inset: 0; background: radial-gradient(circle, #4a0d0d, #0e0202); z-index: 5000; display: flex; flex-direction: column; padding: 15px; overflow: hidden; }
        .lobby-header { text-align: center; margin: 20px 0; }
        .lobby-title { font-size: 32px; font-weight: 900; color: var(--gold); text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 15px rgba(255,193,7,0.5); }

        .table-grid {
            display: flex;
            gap: 20px;
            padding: 20px 40px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .table-grid::-webkit-scrollbar { display: none; }

        .table-card {
            flex: 0 0 220px;
            background: linear-gradient(145deg, #7c1c1c, #3d0a0a);
            border: 2px solid #b91c1c;
            border-radius: 25px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
            scroll-snap-align: center;
        }
        .table-card h3 { margin: 0; font-size: 16px; color: #fca5a5; text-transform: uppercase; }
        .table-card .boot { font-size: 36px; font-weight: 900; color: var(--gold); margin: 20px 0; text-shadow: 0 0 10px rgba(255,193,7,0.4); }
        .table-card button {
            background: linear-gradient(to bottom, #22c55e, #15803d);
            color: white;
            border: none;
            padding: 15px 0;
            border-radius: 50px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            font-size: 18px;
            box-shadow: 0 6px 0 #064e3b, 0 10px 20px rgba(0,0,0,0.3);
            transition: 0.1s;
        }
        .table-card button:active { transform: translateY(3px); box-shadow: 0 3px 0 #064e3b; }

        /* HEADER */
        .game-header { position: absolute; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; box-sizing: border-box; z-index: 1000; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .circle-btn { width: 36px; height: 36px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; cursor: pointer; }
        .wallet-display { background: rgba(0,0,0,0.7); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--gold); display: flex; align-items: center; gap: 6px; font-weight: 900; color: #22c55e; font-size: 14px; }

        /* GAME AREA */
        .game-area {
            flex: 1;
            position: relative;
            background: radial-gradient(circle, #5c1414, #1a0505);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding-bottom: 220px; /* Increased padding to push table up */
            perspective: 1000px;
        }

        .poker-table {
            width: 94%;
            height: 55%; /* Reduced height to keep it compact */
            background: var(--poker-blue);
            border-radius: 150px;
            position: relative;
            box-shadow:
                inset 0 0 100px rgba(0,0,0,0.8),
                0 30px 60px rgba(0,0,0,0.8);
            border: 6px solid #fcc419;
            outline: 12px solid #1e293b;
            transform: rotateX(20deg);
            z-index: 10;
        }

        .dealer-box {
            position: absolute;
            top: 2%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            pointer-events: none;
        }
        .dealer-img {
            width: 150px; /* Smaller dealer to save space */
            filter: drop-shadow(0 10px 20px black);
        }
        .poker-table::after {
            content: "";
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 40px;
            background: #1e293b;
            border-radius: 0 0 100px 100px;
            z-index: 6;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .pot-container {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            padding: 5px 20px;
            border-radius: 25px;
            border: 1px solid var(--gold);
            z-index: 20;
        }
        .pot-amount { font-size: 22px; font-weight: 900; color: var(--gold); }

        .round-timer-box { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; text-align: center; }
        .round-timer { font-size: 64px; font-weight: 900; color: #fff; text-shadow: 0 0 20px #f00, 0 0 40px #f00; display: none; }
        .wait-msg { font-size: 24px; font-weight: 900; color: var(--gold); text-transform: uppercase; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 15px; display: none; }

        /* SEATS */
        .player-seat {
            position: absolute;
            width: 100px;
            text-align: center;
            z-index: 100;
            transition: 0.5s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .seat-me { bottom: 15%; left: 50%; transform: translateX(-50%) scale(1.2); z-index: 200; }
        .seat-2 { left: 5%; bottom: 35%; }
        .seat-3 { left: 15%; top: 15%; transform: scale(0.9); }
        .seat-4 { right: 15%; top: 15%; transform: scale(0.9); }
        .seat-5 { right: 5%; bottom: 35%; }

        .avatar-group { position: relative; width: 60px; height: 60px; margin-top: 5px; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--gold); overflow: hidden; background: #333; box-shadow: 0 5px 15px rgba(0,0,0,0.6); position: relative; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .active-turn-ring { position: absolute; inset: -5px; border: 4px solid #fde047; border-radius: 50%; opacity: 0; z-index: 1; pointer-events: none; }
        .active-turn .active-turn-ring { opacity: 1; animation: ring-spin 2s linear infinite; }
        @keyframes ring-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .p-name-plate { background: rgba(0,0,0,0.85); border-radius: 12px; padding: 2px 10px; border: 1px solid var(--gold); width: 85px; margin-top: 2px; }
        .p-name { font-size: 10px; font-weight: 900; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* CARDS */
        .cards-status { width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 2px; position: relative; }
        .status-tag { background: #000; color: white; font-size: 8px; font-weight: 900; padding: 1px 6px; border-radius: 4px; border: 1px solid var(--gold); text-transform: uppercase; margin-bottom: 2px; z-index: 10; }
        .rank-tag { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: var(--gold); font-size: 10px; font-weight: 900; padding: 2px 8px; border-radius: 10px; border: 1px solid var(--gold); white-space: nowrap; z-index: 20; }
        .packed-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
            border-radius: 8px;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 950;
            color: #ef4444;
            text-transform: uppercase;
            border: 2px solid #ef4444;
        }

        .mini-cards { display: flex; justify-content: center; transition: 0.3s; }
        .m-card {
            width: 25px; height: 35px;
            background: white; border: 1px solid #999; border-radius: 3px;
            margin: 0 -8px; box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            font-size: 10px; font-weight: 950;
        }
        .m-card.back { background: #b91c1c url('https://www.transparenttextures.com/patterns/poker-qr.png'); border-color: #fff; }
        .packed .m-card { opacity: 0.5; filter: grayscale(1); }
        .packed .status-tag { background: #ef4444; border-color: #fff; }

        /* MY HAND (Special styling for grouped view) */
        .my-hand-grouped { display: flex; justify-content: center; align-items: center; position: relative; }
        .card-big {
            width: 70px; height: 100px;
            background: white; border-radius: 8px;
            color: black; font-weight: 950;
            display: flex; flex-direction: column;
            margin: 0 -15px; box-shadow: 0 10px 20px rgba(0,0,0,0.8);
            border: 2px solid #ccc; position: relative;
            pointer-events: auto;
            padding: 5px;
            box-sizing: border-box;
            transition: 0.3s;
        }
        .card-big.back { background: #b91c1c url('https://www.transparenttextures.com/patterns/poker-qr.png'); border-color: #fff; }
        .packed .card-big { opacity: 0.5; filter: grayscale(1); }

        .c-corner { position: absolute; font-size: 14px; line-height: 1; }
        .c-top { top: 4px; left: 4px; text-align: center; }
        .c-bot { bottom: 4px; right: 4px; transform: rotate(180deg); text-align: center; }
        .c-mid { margin: auto; font-size: 32px; }

        .rank-label { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: var(--gold); padding: 4px 15px; border-radius: 15px; font-size: 14px; font-weight: 950; border: 1.5px solid var(--gold); white-space: nowrap; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 310; }
        .see-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(to bottom, #3b82f6, #1d4ed8); color: #fff; padding: 8px 20px; border-radius: 20px; font-weight: 900; font-size: 14px; border: 1.5px solid #fff; pointer-events: auto; cursor: pointer; z-index: 320; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        .rank-label { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: var(--gold); padding: 4px 15px; border-radius: 15px; font-size: 14px; font-weight: 950; border: 1.5px solid var(--gold); white-space: nowrap; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 310; }
        .see-btn { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(to bottom, #3b82f6, #1d4ed8); color: #fff; padding: 6px 18px; border-radius: 20px; font-weight: 900; font-size: 14px; border: 1.5px solid #fff; pointer-events: auto; cursor: pointer; z-index: 320; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* ACTION CONTROLS */
        .controls-wrapper {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0.8));
            border-top: 1.5px solid rgba(255,255,255,0.1);
            z-index: 1000;
            padding: 5px 0;
            height: 95px;
        }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 10px; height: 100%; }
        .btn-col { display: flex; flex-direction: column; gap: 4px; }

        .btn-act { flex: 1; min-height: 40px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); font-weight: 950; font-size: 11px; color: white; text-transform: uppercase; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.1s; background: rgba(255,255,255,0.1); }
        .btn-act:active { transform: scale(0.96); background: rgba(255,255,255,0.2); }

        .btn-pack { border-color: #ef4444; color: #ef4444; }
        .btn-side { border-color: #64748b; color: #cbd5e1; }
        .btn-chaal { border-color: #22c55e; color: #22c55e; background: rgba(34,197,94,0.1); }
        .btn-show { border-color: #3b82f6; color: #3b82f6; background: rgba(59,130,246,0.1); }
        .btn-sub { font-size: 9px; opacity: 0.9; margin-top: 1px; font-weight: 900; }

        .bet-stepper-side { position: absolute; right: 15px; bottom: 110px; display: flex; flex-direction: column; align-items: center; gap: 6px; z-index: 1000; }
        .step-btn { width: 36px; height: 36px; border-radius: 50%; background: #334155; border: 1.5px solid var(--gold); color: white; font-size: 18px; font-weight: 900; cursor: pointer; box-shadow: 0 3px 0 #1e293b; display: flex; align-items: center; justify-content: center; }
        .bet-val-box { background: rgba(0,0,0,0.8); border: 1.5px solid var(--gold); border-radius: 10px; padding: 4px 12px; min-width: 70px; text-align: center; box-shadow: 0 0 10px rgba(255,193,7,0.3); }
        .bet-val { font-size: 14px; font-weight: 900; color: var(--gold); }

        /* AVATAR SELECTOR */
        #avatarSelector { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px; }
        .av-opt { width: 60px; height: 60px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 30px; background: #222; }
        .av-opt.selected { border-color: var(--gold); }

        /* DEALING CARD */
        .dealing-card { position: absolute; width: 25px; height: 35px; background: #b91c1c url('https://www.transparenttextures.com/patterns/poker-qr.png'); border: 1px solid white; border-radius: 3px; z-index: 1000; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); top: 10%; left: 50%; transform: translate(-50%, -50%); }

        /* EMOJI MENU */
        #emojiPopup { position: fixed; bottom: 150px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); border: 2px solid var(--gold); border-radius: 15px; padding: 15px; display: none; grid-template-columns: repeat(3, 1fr); gap: 15px; z-index: 8000; }
        .emoji-item { font-size: 28px; cursor: pointer; transition: 0.2s; }
        .emoji-item:active { transform: scale(1.2); }

        /* SIDESHOW OVERLAY */
        #sideShowOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 8000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .side-card { background: #1e293b; padding: 25px; border-radius: 20px; border: 2px solid var(--gold); text-align: center; width: 85%; }

        /* SHOWDOWN LABELS */
        .showdown-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; font-weight: 900; text-transform: uppercase; text-shadow: 0 0 10px rgba(0,0,0,0.8); z-index: 500; padding: 5px 15px; border-radius: 10px; border: 2px solid #fff; }
        .label-win { background: #22c55e; box-shadow: 0 0 20px #22c55e; }
        .label-lose { background: #ef4444; opacity: 0.8; }

        /* SIDESHOW OVERLAY */
        #sideShowOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 8000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .side-card { background: #1e293b; padding: 25px; border-radius: 20px; border: 2px solid var(--gold); text-align: center; width: 85%; }

        /* SHOWDOWN LABELS */
        .showdown-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; font-weight: 900; text-transform: uppercase; text-shadow: 0 0 10px rgba(0,0,0,0.8); z-index: 500; padding: 5px 15px; border-radius: 10px; border: 2px solid #fff; }
        .label-win { background: #22c55e; box-shadow: 0 0 20px #22c55e; }
        .label-lose { background: #ef4444; opacity: 0.8; }

        /* RESULT */
        #resultOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 7000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .res-card { background: radial-gradient(circle, #7c2d12, #1a0505); padding: 40px; border-radius: 30px; border: 3px solid var(--gold); text-align: center; width: 85%; max-width: 450px; box-shadow: 0 0 60px rgba(251,191,36,0.3); }

        @media (max-width: 600px) {
            .poker-table { height: 60%; width: 100%; border-radius: 100px; }
            .card-big { width: 65px; height: 95px; font-size: 18px; }
            .btn-act { font-size: 11px; height: 45px; }
            .bet-stepper-side { bottom: 120px; }
        }
    </style>
</head>
<body>

    <audio id="snd-bg" src="sound/teenpatti.mp3" loop></audio>
    <audio id="snd-bet" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>
    <audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
    <audio id="snd-lose" src="https://assets.mixkit.co/active_storage/sfx/2564/2564-preview.mp3"></audio>
    <audio id="snd-turn" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="snd-tick" src="https://assets.mixkit.co/active_storage/sfx/2564/2564-preview.mp3"></audio>
    <audio id="snd-show" src="https://assets.mixkit.co/active_storage/sfx/1103/1103-preview.mp3"></audio>

    <div id="lobby">
        <div class="lobby-header">
            <div class="lobby-title">Teen Patti Solo</div>
            <p style="color: #fca5a5; font-weight: 700;">Select Stakes to Join</p>
        </div>
        <div class="table-grid">
            <div class="table-card"><h3>Bronze</h3><div class="boot">₹1</div><button onclick="joinByBoot(1)">JOIN NOW</button></div>
            <div class="table-card"><h3>Silver</h3><div class="boot">₹5</div><button onclick="joinByBoot(5)">JOIN NOW</button></div>
            <div class="table-card"><h3>Gold</h3><div class="boot">₹10</div><button onclick="joinByBoot(10)">JOIN NOW</button></div>
            <div class="table-card"><h3>Platinum</h3><div class="boot">₹50</div><button onclick="joinByBoot(50)">JOIN NOW</button></div>
            <div class="table-card"><h3>Diamond</h3><div class="boot">₹100</div><button onclick="joinByBoot(100)">JOIN NOW</button></div>
        </div>
    </div>

    <div class="game-header">
        <div class="circle-btn" onclick="exitTable()"><i class="fas fa-sign-out-alt"></i></div>
        <div class="wallet-display">
            <i class="fas fa-coins" style="color:var(--gold)"></i>
            ₹<span id="balance">0.00</span>
        </div>
        <div style="display:flex; gap:10px;">
            <div class="circle-btn" onclick="switchTable()"><i class="fas fa-random"></i></div>
            <div class="circle-btn" onclick="openAv()"><i class="fas fa-ellipsis-v"></i></div>
        </div>
    </div>

    <div class="game-area">
        <div class="dealer-box">
            <img src="image/deelar.jpg" class="dealer-img" alt="dealer">
        </div>

        <div class="poker-table"></div>
        <div id="dealingContainer"></div>

        <div class="pot-container">
            <img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png" width="20">
            <div class="pot-amount">₹<span id="potVal">0</span></div>
        </div>

        <div class="round-timer-box">
            <div class="round-timer" id="roundTimer">7</div>
            <div class="wait-msg" id="waitMsg">Wait for next round...</div>
        </div>

        <div id="seatsContainer"></div>
    </div>

    <div class="controls-wrapper" id="controls" style="opacity: 0.5; pointer-events: none;">
        <div class="action-btns">
            <div class="btn-col">
                <button class="btn-act btn-pack" onclick="handleMove('PACK')">Pack</button>
                <button class="btn-act btn-side" onclick="handleMove('SIDESHOW')">Side Show</button>
            </div>
            <div class="btn-col">
                <button class="btn-act btn-chaal" id="chaalBtn" onclick="handleMove('CHAAL')">
                    <span>Chaal</span><span class="btn-sub" id="chaalAmt">₹0</span>
                </button>
                <button class="btn-act btn-chaal" id="plusBtn" onclick="handlePlusMove()" style="background: linear-gradient(to bottom, #eab308, #a16207);">
                    <span>Raise 2x</span><span class="btn-sub" id="plusAmt">₹0</span>
                </button>
            </div>
            <button class="btn-act btn-show" id="showBtn" onclick="handleMove('SHOW')" style="display: none;">
                <span>Show</span><span class="btn-sub" id="showAmt">₹0</span>
            </button>
        </div>
    </div>

    <div id="emojiPopup">
        <div class="emoji-item" onclick="sendEmojiTo('🌹')">🌹</div>
        <div class="emoji-item" onclick="sendEmojiTo('😂')">😂</div>
        <div class="emoji-item" onclick="sendEmojiTo('❤️')">❤️</div>
        <div class="emoji-item" onclick="sendEmojiTo('🔥')">🔥</div>
        <div class="emoji-item" onclick="sendEmojiTo('🥤')">🥤</div>
        <div class="emoji-item" onclick="sendEmojiTo('👍')">👍</div>
    </div>

    <div id="sideShowOverlay">
        <div class="side-card">
            <h3 id="sideRequesterName">Player wants a Side Show</h3>
            <div style="display:flex; gap:15px; justify-content:center; margin-top:20px;">
                <button class="btn-act btn-chaal" onclick="respondSideShow(true)">ACCEPT</button>
                <button class="btn-act btn-pack" onclick="respondSideShow(false)">REJECT</button>
            </div>
        </div>
    </div>

    <div id="resultOverlay">
        <div class="res-card">
            <h1 id="resTitle" style="margin: 0; color: var(--gold); font-size: 36px;">YOU WIN!</h1>
            <div id="resHand" style="display: flex; justify-content: center; gap: 8px; margin: 25px 0;"></div>
            <div id="resAmount" style="font-size: 32px; color: #22c55e; font-weight: 900; margin-bottom: 25px;">+₹0</div>
            <button class="btn-act btn-chaal" style="width: 100%; font-size: 18px;" onclick="closeRes()">CONTINUE</button>
        </div>
    </div>

    <div id="avatarSelector">
        <h2 style="color:var(--gold)">Select Avatar</h2>
        <div class="avatar-grid" id="avGrid"></div>
        <button class="btn-act btn-pack" style="width:200px; height:40px;" onclick="closeAv()">CLOSE</button>
    </div>

    <script src="js/config.js"></script>
    <script>
        const token = localStorage.getItem("token");
        let myId = "", currentTable = null, isFetching = false, lastState = "", lastTurn = "", nextBet = 0, maxBetUnit = 0, selectedTargetId = null;

        async function init() {
            if (!token) { alert("Please login first"); location.href = "login.html"; return; }
            try {
                const res = await fetch(`${API_URL}/api/profile`, { headers: { authorization: token } });
                const data = await res.json();
                if (data.success) {
                    myId = data.user.id;
                    document.getElementById("balance").innerText = data.user.coins.toFixed(2);
                }
            } catch(e) { console.error("Init Error:", e); }
        }
        init();

        async function joinByBoot(boot) {
            if (!myId) await init(); if (!myId) return;
            try {
                // Play BG music on first interaction
                document.getElementById('snd-bg').play().catch(e=>{});

                const res = await fetch(`${API_URL}/api/teenpatti/join`, {
                    method: "POST", headers: { "Content-Type": "application/json", authorization: token },
                    body: JSON.stringify({ bootAmount: boot })
                });
                const data = await res.json();
                if (data.success) {
                    currentTable = data.tableId;
                    document.getElementById("lobby").style.display = "none";
                    if(!window.stateInterval) window.stateInterval = setInterval(fetchState, 1200);
                } else alert(data.message);
            } catch(e) { alert("Connection Error"); }
        }

        async function switchTable() {
            if(!confirm("Switch table?")) return;
            const boot = currentTable ? Number(currentTable.split('_')[0]) : 1;

            // 1. Leave current
            await fetch(`${API_URL}/api/teenpatti/leave`, { method: "POST", headers: { authorization: token } });

            // 2. Join new table with same boot
            const res = await fetch(`${API_URL}/api/teenpatti/join`, {
                method: "POST", headers: { "Content-Type": "application/json", authorization: token },
                body: JSON.stringify({ bootAmount: boot })
            });
            const data = await res.json();
            if (data.success) {
                currentTable = data.tableId;
                fetchState();
            }
        }

        async function exitTable() {
            if(!confirm("Are you sure you want to leave?")) return;
            await fetch(`${API_URL}/api/teenpatti/leave`, { method: "POST", headers: { authorization: token } });
            location.href = "dashboard.html";
        }

        // Remove from table when browser closes/backs
        window.addEventListener('beforeunload', () => {
            if (currentTable) {
                navigator.sendBeacon(`${API_URL}/api/teenpatti/leave?token=${token}`);
            }
        });

        async function fetchState() {
            if(isFetching || !currentTable) return; isFetching = true;
            try {
                const res = await fetch(`${API_URL}/api/teenpatti/tables`, { headers: { authorization: token } });
                const data = await res.json();
                if (data.success) {
                    const t = data.tables.find(x => x.id == currentTable);
                    if (t) updateUI(t);
                }
            } catch(e) {} finally { isFetching = false; }
        }

        function updateUI(t) {
            if (!myId) return;
            document.getElementById("potVal").innerText = t.pot;

            const rt = document.getElementById("roundTimer");
            const waitMsg = document.getElementById("waitMsg");
            const me = t.players[myId];

            if (t.state === 'WAITING' || t.state === 'STARTING') {
                rt.style.display = "block";
                rt.innerText = t.timer;
                waitMsg.style.display = "none";
                if (t.timer > 0) document.getElementById('snd-tick').play().catch(e=>{});
            } else if (me && me.status === 'WAITING' && t.state !== 'PLAYING') {
                rt.style.display = "none";
                waitMsg.style.display = "block";
            } else {
                rt.style.display = "none";
                waitMsg.style.display = "none";
            }

            if (t.state === 'DEALING' && lastState !== 'DEALING') animateDealing(t);
            if (t.currentTurn === myId && lastTurn !== myId) document.getElementById('snd-turn').play().catch(e=>{});
            lastTurn = t.currentTurn;
            maxBetUnit = t.maxBet;

            const ssOverlay = document.getElementById("sideShowOverlay");
            if (t.sideShowTarget === myId) {
                ssOverlay.style.display = "flex";
                const req = t.players[t.sideShowRequester];
                document.getElementById("sideRequesterName").innerText = `${req.name} wants a Side Show`;
            } else { ssOverlay.style.display = "none"; }

            const container = document.getElementById("seatsContainer");
            container.innerHTML = "";
            const uids = Object.keys(t.players);
            const myIdx = uids.indexOf(myId);

            uids.forEach((uid, idx) => {
                const p = t.players[uid];
                let pos = (idx - myIdx + uids.length) % uids.length + 1;
                if (uid === myId) pos = "me"; else if (pos > 5) pos = 5;

                const seat = document.createElement("div");
                seat.className = `player-seat seat-${pos} ${t.currentTurn === uid ? 'active-turn' : ''}`;

                // Clicking avatar opens selector, name opens emoji popup
                const avatarGroup = document.createElement("div");
                avatarGroup.className = "avatar-group";
                avatarGroup.onclick = (e) => { e.stopPropagation(); if (uid === myId) openAv(); };

                const namePlate = document.createElement("div");
                namePlate.className = "p-name-plate";
                namePlate.onclick = (e) => { e.stopPropagation(); if (uid !== myId) openEmojiPopup(uid); };

                const isShowdown = t.state === 'SHOW';
                const status = p.status === 'PACKED' ? 'PACKED' : (p.blind && !isShowdown ? 'BLIND' : 'SEEN');
                const showCardsOnTable = p.status !== 'WAITING' && p.status !== 'PACKED';

                const seatClasses = [
                    'player-seat',
                    `seat-${pos}`,
                    t.currentTurn === uid ? 'active-turn' : '',
                    p.status === 'PACKED' ? 'packed' : ''
                ].join(' ');

                let resultLabel = "";
                if (isShowdown && p.result) {
                    resultLabel = `<div class="showdown-label label-${p.result.toLowerCase()}">${p.result}</div>`;
                }

                let avatarHtml = "";
                if (p.avatar && (p.avatar.length < 5 || !p.avatar.includes('.'))) {
                    avatarHtml = `<div class="avatar-emoji">${p.avatar}</div>`;
                } else {
                    const avatarUrl = p.avatar ? (p.avatar.startsWith('http') ? p.avatar : `${API_URL}/${p.avatar}`) : `https://i.pravatar.cc/100?u=${uid}`;
                    avatarHtml = `<img src="${avatarUrl}">`;
                }

                const packedOverlay = p.status === 'PACKED' ? '<div class="packed-overlay">PACKED</div>' : '';

                if (pos !== "me") {
                    seat.className = seatClasses;
                    seat.innerHTML = `
                        ${resultLabel}
                        <div class="cards-status">
                            ${packedOverlay}
                            ${isShowdown && p.handRank ? `<div class="rank-tag">${p.handRank}</div>` : ''}
                            ${showCardsOnTable ? `<div class="status-tag" style="background:${status==='BLIND'?'#000':'#15803d'}">${status}</div>` : ''}
                            ${p.status === 'PACKED' ? `<div class="status-tag">PACKED</div>` : ''}
                            <div class="mini-cards">
                                ${isShowdown ? renderHandIcons(p.hand) : (showCardsOnTable ? '<div class="m-card back"></div><div class="m-card back"></div><div class="m-card back"></div>' : '')}
                            </div>
                        </div>
                    `;
                    avatarGroup.innerHTML = `
                        ${t.currentTurn === uid ? `<div class="turn-timer-text">${t.timer}</div>` : ''}
                        <div class="active-turn-ring"></div>
                        <div class="avatar">${avatarHtml}</div>
                    `;
                    namePlate.innerHTML = `<div class="p-name">${p.name}</div>`;
                    seat.appendChild(avatarGroup);
                    seat.appendChild(namePlate);
                } else {
                    const isTurn = t.currentTurn === myId && t.state === 'PLAYING' && p.status === 'ACTIVE';
                    seat.className = seatClasses;
                    seat.innerHTML = `
                        ${resultLabel}
                        <div class="my-hand-grouped">
                            ${packedOverlay}
                            ${renderBigCards(p.hand, p.blind && t.state !== 'SHOW')}
                            ${(!p.blind || isShowdown) && p.handRank ? `<div class="rank-label">${p.handRank}</div>` : ''}
                            ${(p.blind && (t.state === 'PLAYING' || t.state === 'DEALING')) ? `<div class="see-btn" onclick="event.stopPropagation(); handleMove('SEE')">SEE</div>` : ''}
                        </div>
                    `;
                    avatarGroup.innerHTML = `
                        ${t.currentTurn === uid ? `<div class="turn-timer-text">${t.timer}</div>` : ''}
                        <div class="active-turn-ring"></div>
                        <div class="avatar">${avatarHtml}</div>
                    `;
                    namePlate.innerHTML = `<div class="p-name">${p.name}</div>`;
                    seat.appendChild(avatarGroup);
                    seat.appendChild(namePlate);

                    const ctrl = document.getElementById("controls");
                    ctrl.style.opacity = isTurn ? "1" : "0.5";
                    ctrl.style.pointerEvents = isTurn ? "auto" : "none";

                    if (isTurn) {
                        const activeCount = Object.keys(t.players).filter(id => t.players[id].status === 'ACTIVE').length;
                        const showBtn = document.getElementById("showBtn");
                        const sideshowBtn = document.querySelector(".btn-side");

                        showBtn.style.display = activeCount === 2 ? "block" : "none";
                        sideshowBtn.style.display = activeCount >= 3 ? "block" : "none";

                        if (nextBet < t.lastBet) nextBet = t.lastBet;
                        // document.getElementById("nextBetDisplay").innerText = `₹${nextBet}`; // bet stepper removed from UI but keeping logic

                        const cost = p.blind ? nextBet : nextBet * 2;
                        document.getElementById("chaalAmt").innerText = `₹${cost}`;
                        document.getElementById("showAmt").innerText = `₹${cost}`;

                        // Show Raise 2x amount
                        const raiseCost = p.blind ? (nextBet * 2) : (nextBet * 2 * 2);
                        document.getElementById("plusAmt").innerText = `₹${raiseCost}`;
                    }
                }
                container.appendChild(seat);
            });

            if (t.state === 'SHOW' && lastState !== 'SHOW') {
                document.getElementById('snd-show').play().catch(e=>{});
                setTimeout(() => showResult(t), 1000);
            }
            lastState = t.state;
        }

        function animateDealing(t) {
            const container = document.getElementById("dealingContainer");
            const activeUids = Object.keys(t.players).filter(id => t.players[id].status === 'ACTIVE');
            activeUids.forEach((uid, pIdx) => {
                for(let i=0; i<3; i++) {
                    setTimeout(() => {
                        const card = document.createElement('div');
                        card.className = 'dealing-card';
                        container.appendChild(card);
                        setTimeout(() => card.remove(), 600);
                    }, (pIdx * 400) + (i * 150));
                }
            });
        }

        function renderBigCards(hand, hidden) {
            if (!hand || hand.length === 0) return Array(3).fill('<div class="card-big back"></div>').join('');
            return hand.map(c => {
                const color = (c.suit==='♥'||c.suit==='♦') ? '#ef4444' : 'black';
                if (hidden) return '<div class="card-big back"></div>';
                return `
                    <div class="card-big" style="color:${color}">
                        <div class="c-corner c-top"><div>${c.rank}</div><div style="font-size:10px">${c.suit}</div></div>
                        <div class="c-mid">${c.suit}</div>
                        <div class="c-corner c-bot"><div>${c.rank}</div><div style="font-size:10px">${c.suit}</div></div>
                    </div>`;
            }).join('');
        }

        function renderHandIcons(hand) {
            if (!hand || hand.length === 0) return '';
            return hand.map(c => {
                const color = (c.suit==='♥'||c.suit==='♦') ? '#ef4444' : 'black';
                return `
                    <div class="m-card" style="color:${color}">
                        <div style="line-height:1">${c.rank}</div>
                        <div style="font-size:12px; line-height:1">${c.suit}</div>
                    </div>`;
            }).join('');
        }

        function adjustBet(val) {
            if (val > 0) {
                nextBet = nextBet * 2;
            } else {
                nextBet = Math.max(nextBet / 2, 5);
            }
            nextBet = Math.min(nextBet, maxBetUnit);
            document.getElementById("nextBetDisplay").innerText = `₹${nextBet}`;
        }

        async function handleMove(move) {
            if (move === 'CHAAL' || move === 'SHOW' || move === 'SIDESHOW' || move === 'PLUS') document.getElementById('snd-bet').play().catch(e=>{});

            let amountToBet = nextBet;
            if (move === 'PLUS') {
                amountToBet = nextBet * 2;
                move = 'CHAAL';
            }

            const res = await fetch(`${API_URL}/api/teenpatti/move`, {
                method: "POST", headers: { "Content-Type": "application/json", authorization: token },
                body: JSON.stringify({ tableId: currentTable, move, amount: amountToBet })
            });
            const data = await res.json();

            if (!data.success && data.message === "Insufficient coins") {
                if (confirm("Insufficient Coins! Want to add cash to continue your turn?")) {
                    location.href = "wallet.html";
                }
            }
            fetchState();
        }

        async function handlePlusMove() {
            handleMove('PLUS');
        }

        async function respondSideShow(accepted) {
            await fetch(`${API_URL}/api/teenpatti/sideshow-response`, {
                method: "POST", headers: { "Content-Type": "application/json", authorization: token },
                body: JSON.stringify({ tableId: currentTable, accepted })
            });
            fetchState();
        }

        function openEmojiPopup(targetUid) {
            selectedTargetId = targetUid;
            document.getElementById("emojiPopup").style.display = "grid";
        }
        function sendEmojiTo(e) {
            console.log(`Emoji ${e} sent to ${selectedTargetId}`);
            document.getElementById("emojiPopup").style.display = "none";
            alert(`Sent ${e} to player!`);
        }

        function showResult(t) {
            const overlay = document.getElementById("resultOverlay");
            overlay.style.display = "flex";
            const me = t.players[myId];

            document.getElementById("resTitle").innerText = me.result === 'WIN' ? "YOU WIN!" : "YOU LOSE";
            document.getElementById("resAmount").innerText = me.result === 'WIN' ? `+₹${me.winAmount}` : "Better luck next time!";

            // Show hands face to face (Winner vs Runner-up/Loser)
            let handsHtml = "";
            const winners = Object.keys(t.players).filter(uid => t.players[uid].result === 'WIN');
            const losers = Object.keys(t.players).filter(uid => t.players[uid].result === 'LOSE' && t.players[uid].hand && t.players[uid].hand.length > 0);

            // Only take top 2 for face-to-face
            const displayUids = [...winners, ...losers].slice(0, 2);

            displayUids.forEach((uid, idx) => {
                const p = t.players[uid];
                const vsText = idx === 1 ? '<div style="font-size:24px; color:#fff; margin: 10px 0;">VS</div>' : '';
                handsHtml += `
                    ${vsText}
                    <div style="margin: 5px 0; display: flex; flex-direction: column; align-items: center;">
                        <div style="font-size:14px; color:var(--gold); font-weight:900; margin-bottom:5px;">${p.name} ${p.result === 'WIN' ? '🏆' : ''}</div>
                        <div style="display:flex; justify-content:center; gap:5px;">${renderBigCards(p.hand, false)}</div>
                        <div style="font-size:12px; color:#fff; margin-top:3px; font-weight:700;">${p.handRank || ''}</div>
                    </div>
                `;
            });

            document.getElementById("resHand").innerHTML = handsHtml;
            document.getElementById("resHand").style.display = "flex";
            document.getElementById("resHand").style.flexDirection = "column";
            document.getElementById("resHand").style.alignItems = "center";
            document.getElementById("resHand").style.maxHeight = "400px";
            document.getElementById("resHand").style.overflowY = "auto";

            if (me.result === 'WIN') document.getElementById('snd-win').play().catch(e=>{});
            else document.getElementById('snd-lose').play().catch(e=>{});

            fetchBalance();
        }
        function closeRes() { document.getElementById("resultOverlay").style.display = "none"; }
        async function fetchBalance() {
            const res = await fetch(`${API_URL}/api/profile`, { headers: { authorization: token } });
            const data = await res.json();
            if (data.success) {
                document.getElementById("balance").innerText = data.user.coins.toFixed(2);
                window.currentUser = data.user;
            }
        }

        const emojis = ["😎", "🤠", "🤑", "🤡", "🤖", "👻", "🔥", "💎", "🃏", "🎴", "🦁", "🐉", "🤴", "👸", "🦸", "🥷"];
        function openAv() {
            const grid = document.getElementById("avGrid");
            grid.innerHTML = emojis.map(e => `<div class="av-opt" onclick="setAv('${e}')">${e}</div>`).join('');
            document.getElementById("avatarSelector").style.display = "flex";
        }
        function closeAv() { document.getElementById("avatarSelector").style.display = "none"; }
        async function setAv(emoji) {
            try {
                const res = await fetch(`${API_URL}/api/profile/update`, {
                    method: "POST", headers: { "Content-Type": "application/json", authorization: token },
                    body: JSON.stringify({ avatar: emoji })
                });
                const data = await res.json();
                if (data.success) {
                    alert("Avatar updated!");
                    closeAv();
                    fetchState();
                }
            } catch(e) { console.error(e); }
        }
    </script>
</body>
</html>
