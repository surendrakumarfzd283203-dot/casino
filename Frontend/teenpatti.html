<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teen Patti Royale | Solo Casino</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #ffc107;
            --bg-dark: #020617;
            --poker-border: #422006;
        }

        body {
            background: #064e3b url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=2000') no-repeat center center;
            background-size: cover;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* LOBBY / TABLE SELECTION */
        #lobby {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 5000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .lobby-title { font-size: 32px; font-weight: 950; color: var(--gold); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
        .table-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 600px;
        }
        .table-card {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .table-card:hover { border-color: var(--gold); transform: translateY(-5px); }

        /* GAME HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(0,0,0,0.6);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }

        /* TABLE AREA */
        .table-area {
            flex: 1;
            position: relative;
            perspective: 1200px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .poker-table {
            width: 90%;
            height: 55%;
            background: #4a2c1e url('https://www.transparenttextures.com/patterns/dark-wood.png');
            border: 10px solid #2a1810;
            border-radius: 180px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8), inset 0 0 80px rgba(0,0,0,0.6);
            position: relative;
            transform: rotateX(20deg);
        }

        .dealer-box {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            text-align: center;
        }
        .dealer-img {
            width: 150px;
            filter: drop-shadow(0 10px 20px black);
            animation: breathe 4s ease-in-out infinite;
        }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* PLAYER SEATS */
        .player-seat {
            position: absolute;
            width: 90px;
            text-align: center;
            z-index: 100;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .seat-me { bottom: 2%; left: 50%; transform: translateX(-50%); }
        .seat-2 { left: 2%; bottom: 25%; }
        .seat-3 { left: 10%; top: 12%; }
        .seat-4 { right: 10%; top: 12%; }
        .seat-5 { right: 2%; bottom: 25%; }

        .avatar-wrap {
            width: 60px; height: 60px;
            margin: 0 auto;
            position: relative;
        }
        .avatar {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: #1e293b;
            border: 2px solid var(--gold);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .active-turn .avatar { border-color: #3b82f6; box-shadow: 0 0 25px #3b82f6; animation: glow 1.5s infinite; }
        @keyframes glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        .status-tag {
            background: rgba(0,0,0,0.8);
            color: var(--gold);
            font-size: 10px;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 10px;
            position: absolute;
            top: -10px; left: 50%; transform: translateX(-50%);
            white-space: nowrap;
        }

        .name-tag {
            font-size: 10px;
            font-weight: 800;
            background: rgba(0,0,0,0.8);
            padding: 3px 6px;
            border-radius: 10px;
            margin-top: 3px;
            color: white;
            white-space: nowrap;
        }

        /* CARDS */
        .cards-hand {
            display: flex;
            justify-content: center;
            margin-top: 5px;
            height: 45px;
        }
        .card {
            width: 30px; height: 44px;
            background: white;
            border-radius: 4px;
            color: black;
            font-size: 12px;
            font-weight: 950;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            border: 1px solid #ddd;
            margin: 0 -8px; /* Overlap */
            position: relative;
            transition: 0.3s;
        }
        .card:nth-child(1) { transform: rotate(-10deg); }
        .card:nth-child(3) { transform: rotate(10deg); }

        .card.back {
            background: #be123c url('https://www.transparenttextures.com/patterns/poker-qr.png');
            border: 1.5px solid white;
            color: transparent;
        }

        .trail-badge {
            background: #ef4444; color: white;
            font-size: 8px; font-weight: 950;
            padding: 1px 4px; border-radius: 3px;
            position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            z-index: 10;
        }

        /* POT */
        .pot-box {
            position: absolute;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--gold);
            z-index: 10;
        }
        .pot-amount { font-size: 20px; font-weight: 950; text-shadow: 0 2px 10px black; }

        /* CONTROLS */
        .controls-wrapper {
            background: rgba(15, 23, 42, 0.95);
            border-top: 2px solid #334155;
            padding: 10px;
            z-index: 1000;
        }

        .gifts-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .gift-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            font-size: 20px;
            border-radius: 50%;
            width: 40px; height: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .gift-btn:active { transform: scale(0.9); }

        .game-controls {
            display: grid;
            grid-template-columns: 60px 1fr 1.5fr 1.2fr;
            gap: 8px;
            align-items: center;
        }
        .timer-circle {
            width: 50px; height: 50px;
            border: 4px solid #ef4444;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 900;
            background: rgba(0,0,0,0.3);
        }
        .chaal-control {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .chaal-stepper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 2px 5px;
        }
        .step-btn {
            background: none; border: none; color: white; font-weight: 950; font-size: 16px; cursor: pointer;
        }
        .btn-action {
            height: 44px;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
            transition: 0.1s;
            padding: 0 10px;
        }
        .btn-action:active { transform: translateY(3px); box-shadow: none; }
        .btn-pack { background: #be123c; color: white; }
        .btn-see { background: #1d4ed8; color: white; }
        .btn-chaal { background: #15803d; color: white; }
        .btn-side { background: #a21caf; color: white; }
        .btn-show { background: #f59e0b; color: white; }

        .game-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        .control-group {
            display: flex;
            gap: 8px;
        }

        /* RESULT */
        #resultOverlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 7000;
            display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .res-card {
            background: #1e293b;
            padding: 40px; border-radius: 30px;
            border: 3px solid var(--gold);
            text-align: center;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .poker-table { height: 40%; width: 98%; border-radius: 100px; }
            .player-seat { width: 75px; }
            .avatar-wrap { width: 45px; height: 45px; }
            .game-controls { flex-direction: column; gap: 5px; }
            .timer-circle { margin-bottom: 5px; }
            .btn-action { height: 40px; font-size: 11px; padding: 0 8px; }
        }

    </style>
</head>
<body>

    <div id="lobby">
        <div class="lobby-title">Teen Patti Royale</div>
        <div class="table-list">
            <div class="table-card" onclick="join(1)">
                <h3>Public T1</h3>
                <div style="font-size: 20px; font-weight: 900;">₹5</div>
            </div>
            <div class="table-card" onclick="join(2)">
                <h3>Public T2</h3>
                <div style="font-size: 20px; font-weight: 900;">₹10</div>
            </div>
            <div class="table-card" onclick="join(3)">
                <h3>High Roller</h3>
                <div style="font-size: 20px; font-weight: 900;">₹100</div>
            </div>
        </div>
    </div>

    <div class="header">
        <button onclick="location.href='dashboard.html'" style="background:none; border:none; color:white; font-size: 24px;"><i class="fas fa-arrow-left"></i></button>
        <div style="text-align: center;">
            <div id="tableName" style="font-size: 16px; font-weight: 900;">T#1</div>
        </div>
        <div style="text-align: right;">
            <div style="font-size: 16px; color: #22c55e; font-weight: 900;">₹<span id="balance">0</span></div>
        </div>
    </div>

    <div class="table-area">
        <div class="dealer-box">
            <img src="https://i.ibb.co/L5pZ0vX/dealer-girl.png" class="dealer-img" alt="dealer">
        </div>
        <div class="poker-table"></div>
        <div class="pot-box">
            <div style="font-size: 10px; font-weight: 900; opacity: 0.6;">POT</div>
            <div class="pot-amount">₹<span id="potVal">0</span></div>
        </div>
        <div id="seatsContainer"></div>
    </div>

    <div class="controls-wrapper">
        <div class="gifts-row">
            <button class="gift-btn" onclick="sendEmoji('🌹')">🌹</button>
            <button class="gift-btn" onclick="sendEmoji('🥤')">🥤</button>
            <button class="gift-btn" onclick="sendEmoji('❤️')">❤️</button>
            <button class="gift-btn" onclick="sendEmoji('😂')">😂</button>
            <button class="gift-btn" onclick="sendEmoji('🔥')">🔥</button>
        </div>
        <div class="game-controls">
            <div class="timer-circle" id="timer">0</div>
            <div class="control-group">
                <button class="btn-action btn-pack" onclick="handleMove('PACK')">Pack</button>
                <button class="btn-action btn-see" id="seeBtn" onclick="handleMove('SEE')">See</button>
                <button class="btn-action btn-side" id="sideBtn" onclick="handleMove('SIDESHOW')" style="display: none;">Side Show</button>
                <button class="btn-action btn-show" id="showBtn" onclick="handleMove('SHOW')" style="display: none;">Show</button>
            </div>
            <div class="chaal-control">
                <div class="chaal-stepper">
                    <button class="step-btn" onclick="adjustBet(-1)">-</button>
                    <span id="nextBetDisplay" style="font-size: 10px; font-weight: 800;">₹0</span>
                    <button class="step-btn" onclick="adjustBet(1)">+</button>
                </div>
                <button class="btn-action btn-chaal" id="chaalBtn" onclick="handleMove('CHAAL')">Chaal</button>
            </div>
        </div>
    </div>

    <div id="resultOverlay">
        <div class="res-card">
            <h1 id="resTitle">YOU WIN!</h1>
            <div id="resHand" class="cards-hand" style="margin: 20px 0; height: 60px;"></div>
            <div id="resAmount" style="font-size: 32px; color: var(--gold); font-weight: 950; margin: 15px 0;">₹0</div>
            <button class="btn-action btn-chaal" style="width: 200px;" onclick="closeRes()">CONTINUE</button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const token = localStorage.getItem("token");
        let myId = "";
        let currentTable = null;
        let isFetching = false;
        let lastState = "";
        let nextBet = 0;

        async function join(id) {
            currentTable = id;
            document.getElementById("tableName").innerText = "TABLE #" + id;
            const res = await fetch(`${API_URL}/api/teenpatti/join`, {
                method: "POST",
                headers: { "Content-Type": "application/json", authorization: token },
                body: JSON.stringify({ tableId: id })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById("lobby").style.display = "none";
                setInterval(fetchState, 1500);
                fetchBalance();
            } else { alert(data.message); }
        }

        async function fetchState() {
            if(isFetching || !currentTable) return;
            isFetching = true;
            try {
                const res = await fetch(`${API_URL}/api/teenpatti/tables`, { headers: { authorization: token } });
                const data = await res.json();
                if (data.success) {
                    const table = data.tables.find(t => t.id == currentTable);
                    if (table) updateUI(table);
                }
            } catch (e) {}
            finally { isFetching = false; }
        }

        function updateUI(table) {
            document.getElementById("timer").innerText = table.timer;
            document.getElementById("potVal").innerText = table.pot;

            const container = document.getElementById("seatsContainer");
            container.innerHTML = "";

            const uids = Object.keys(table.players);
            const myIndex = uids.indexOf(myId);
            const totalPlayers = uids.length;

            uids.forEach((uid, idx) => {
                const p = table.players[uid];
                let seatPos = 1;
                if (uid === myId) seatPos = "me";
                else {
                    const relativeIdx = (idx - myIndex + totalPlayers) % totalPlayers;
                    seatPos = relativeIdx + 1;
                    if (seatPos > 5) seatPos = 5;
                }

                const seatDiv = document.createElement("div");
                seatDiv.className = `player-seat seat-${seatPos} ${table.currentTurn === uid ? 'active-turn' : ''}`;

                const statusTag = p.status === 'PACKED' ? '<div class="status-tag">PACKED</div>' :
                                  (!p.blind && table.state === 'PLAYING' ? `<div class="status-tag">${p.handRank || 'SEEN'}</div>` :
                                  (p.blind && table.state === 'PLAYING' ? '<div class="status-tag">BLIND</div>' : ''));

                const avatarIcon = p.isBot ? `https://i.pravatar.cc/100?u=${p.name}` : `https://i.pravatar.cc/100?u=${uid}`;

                seatDiv.innerHTML = `
                    <div class="avatar-wrap">
                        <div class="avatar"><img src="${avatarIcon}"></div>
                        ${statusTag}
                    </div>
                    <div class="name-tag">${p.name}</div>
                    <div class="cards-hand">${renderHandHtml(p.hand, p.blind && table.state !== 'SHOW')}</div>
                `;
                container.appendChild(seatDiv);

                if (uid === myId && table.state === 'PLAYING' && table.currentTurn === myId) {
                    document.querySelector(".game-controls").style.opacity = "1";
                    document.querySelector(".game-controls").style.pointerEvents = "auto";

                    document.getElementById("seeBtn").style.display = p.blind ? "block" : "none";

                    const activePlayers = uids.filter(id => table.players[id].status === 'ACTIVE');
                    const activePlayersCount = activePlayers.length;

                    // Show button only if 2 players left
                    document.getElementById("showBtn").style.display = (activePlayersCount === 2) ? "block" : "none";

                    // Side Show button if > 2 players and I have seen and previous player has seen
                    const myIdxActive = activePlayers.indexOf(myId);
                    const prevPlayerId = activePlayers[(myIdxActive - 1 + activePlayers.length) % activePlayers.length];
                    const prevPlayerSeen = table.players[prevPlayerId] && !table.players[prevPlayerId].blind;

                    document.getElementById("sideBtn").style.display = (activePlayersCount > 2 && !p.blind && prevPlayerSeen) ? "block" : "none";

                    if (nextBet === 0 || nextBet < table.lastBet) nextBet = table.lastBet;
                    document.getElementById("nextBetDisplay").innerText = `₹${nextBet}`;

                    const betToPay = p.blind ? nextBet : nextBet * 2;
                    document.getElementById("chaalBtn").innerText = p.blind ? `BLIND ₹${betToPay}` : `CHAAL ₹${betToPay}`;
                    document.getElementById("showBtn").innerText = `SHOW ₹${betToPay}`;
                } else if (uid === myId) {
                    document.querySelector(".game-controls").style.opacity = "0.5";
                    document.querySelector(".game-controls").style.pointerEvents = "none";
                }
            });

            if (table.state === 'SHOW' && lastState !== 'SHOW') showResult(table);
            lastState = table.state;
        }

        function renderHandHtml(hand, isHidden) {
            if (!hand || hand.length === 0) return '';
            return hand.map(c => {
                const rank = c.rank || '?';
                const suit = c.suit || '?';
                const color = (suit === '♥' || suit === '♦') ? '#ef4444' : '#000';

                return `
                    <div class="card ${isHidden ? 'back' : ''}" style="color: ${color}">
                        <div style="font-size:12px; font-weight:900; line-height:1">${isHidden ? '' : rank}</div>
                        <div style="font-size:18px; line-height:1">${isHidden ? '' : suit}</div>
                    </div>
                `;
            }).join('');
        }

        async function handleMove(move) {
            const res = await fetch(`${API_URL}/api/teenpatti/move`, {
                method: "POST",
                headers: { "Content-Type": "application/json", authorization: token },
                body: JSON.stringify({ tableId: currentTable, move, amount: nextBet })
            });
            fetchState();
            fetchBalance();
        }

        function adjustBet(val) {
            const step = 5;
            nextBet = Math.max(nextBet + (val * step), 5);
            document.getElementById("nextBetDisplay").innerText = `₹${nextBet}`;
            fetchState();
        }

        function showResult(table) {
            const me = table.players[myId];
            if (!me) return;
            const overlay = document.getElementById("resultOverlay");
            overlay.style.display = "flex";

            const winner = Object.values(table.players).find(p => p.result === 'WIN');
            if (winner) {
                document.getElementById("resHand").innerHTML = renderHandHtml(winner.hand, false);
            }

            if (me.result === 'WIN') {
                document.getElementById("resTitle").innerText = "YOU WIN!";
                document.getElementById("resAmount").innerText = "₹" + me.winAmount;
                new Audio('sound/win.mp3').play().catch(e=>{});
            } else {
                document.getElementById("resTitle").innerText = "YOU LOSE";
                document.getElementById("resAmount").innerText = "Better luck next time!";
                new Audio('sound/lose.mp3').play().catch(e=>{});
            }
            fetchBalance();
        }

        function closeRes() { document.getElementById("resultOverlay").style.display = "none"; }

        async function fetchBalance() {
            const res = await fetch(`${API_URL}/api/profile`, { headers: { authorization: token } });
            const data = await res.json();
            if (data.success) {
                document.getElementById("balance").innerText = data.user.coins.toFixed(2);
                myId = data.user.id;
            }
        }

        function sendEmoji(e) {
            // Simulated for now
            console.log("Emoji sent:", e);
        }
    </script>
</body>
</html>
