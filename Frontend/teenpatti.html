<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teen Patti Gold | Solo Casino</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffc107; --bg: #020617; }
        body { background: var(--bg); color: white; font-family: 'Roboto', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; user-select: none; }

        #lobby { position: fixed; inset: 0; background: radial-gradient(circle, #1e293b, #020617); z-index: 5000; display: flex; flex-direction: column; padding: 15px; overflow-y: auto; }
        .lobby-header { text-align: center; margin-bottom: 20px; }
        .lobby-title { font-size: 28px; font-weight: 900; color: var(--gold); text-transform: uppercase; }
        .tab-container { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tab { padding: 8px 15px; background: #1e293b; border-radius: 15px; font-weight: 900; cursor: pointer; white-space: nowrap; border: 1px solid transparent; }
        .tab.active { background: var(--gold); color: black; }
        .table-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .table-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid #334155; border-radius: 15px; padding: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .table-card h3 { margin: 0; font-size: 14px; color: #94a3b8; }
        .table-card .boot { font-size: 20px; font-weight: 900; color: var(--gold); margin: 5px 0; }
        .table-card button { background: #15803d; color: white; border: none; padding: 5px 15px; border-radius: 10px; font-weight: 900; cursor: pointer; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 8px 15px; background: rgba(0,0,0,0.8); z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .game-area { flex: 1; position: relative; background: radial-gradient(circle, #14532d, #064e3b, #022c22); display: flex; justify-content: center; align-items: center; }
        .poker-table { width: 96%; height: 50%; background: #065f46; border: 8px solid #4a2c1e; border-radius: 150px; position: relative; box-shadow: inset 0 0 80px rgba(0,0,0,0.8); transform: perspective(800px) rotateX(20deg); }

        .pot-box { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 20; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--gold); }
        .pot-amount { font-size: 20px; font-weight: 900; color: var(--gold); }

        .player-seat { position: absolute; width: 80px; text-align: center; z-index: 100; }
        .seat-me { bottom: 8%; left: 50%; transform: translateX(-50%); }
        .seat-2 { left: 4%; bottom: 30%; }
        .seat-3 { left: 15%; top: 12%; }
        .seat-4 { right: 15%; top: 12%; }
        .seat-5 { right: 4%; bottom: 30%; }

        .avatar-wrap { width: 50px; height: 50px; margin: 0 auto; position: relative; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; background: #1e293b; border: 2px solid var(--gold); overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .active-turn .avatar { border-color: #3b82f6; box-shadow: 0 0 15px #3b82f6; }

        .status-badge { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #000; color: var(--gold); font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 8px; border: 1px solid var(--gold); white-space: nowrap; }
        .rank-badge { background: #1d4ed8; color: white; font-size: 8px; font-weight: 900; padding: 1px 5px; border-radius: 5px; margin-top: 2px; display: inline-block; }
        .user-name { font-size: 10px; font-weight: 800; background: rgba(0,0,0,0.7); padding: 2px 5px; border-radius: 5px; margin-top: 3px; }

        .cards-hand { display: flex; justify-content: center; margin-top: 5px; height: 40px; position: relative; }
        .card { width: 28px; height: 40px; background: white; border-radius: 3px; color: black; font-size: 11px; font-weight: 900; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 -8px; box-shadow: 1px 1px 3px rgba(0,0,0,0.5); border: 1px solid #ddd; }
        .card.back { background: #be123c url('https://www.transparenttextures.com/patterns/poker-qr.png'); border: 1px solid white; }
        .see-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: var(--gold); border: 1px solid var(--gold); padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: 900; z-index: 30; }

        .controls { position: absolute; bottom: 0; width: 100%; padding: 10px; box-sizing: border-box; background: rgba(0,0,0,0.4); }
        .bet-row { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .step-btn { background: #334155; color: white; border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 20px; font-weight: 900; }
        .bet-display { font-size: 18px; font-weight: 900; color: var(--gold); min-width: 70px; text-align: center; }

        .action-row { display: flex; gap: 8px; align-items: center; }
        .timer-box { width: 45px; height: 45px; border-radius: 50%; border: 3px solid #ef4444; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; background: rgba(0,0,0,0.6); }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; flex: 1; }
        .btn { height: 45px; border: none; border-radius: 8px; font-weight: 900; font-size: 12px; text-transform: uppercase; color: white; box-shadow: 0 3px 0 rgba(0,0,0,0.3); }
        .btn:active { transform: translateY(2px); box-shadow: none; }
        .btn-pack { background: #be123c; }
        .btn-chaal { background: #15803d; }
        .btn-show { background: #f59e0b; }
        .btn-side { background: #a21caf; }

        #resultOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 7000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .res-card { background: #1e293b; padding: 25px; border-radius: 20px; border: 2px solid var(--gold); text-align: center; width: 90%; max-width: 350px; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <div id="lobby">
        <div class="lobby-header">
            <div class="lobby-title">Teen Patti Lobby</div>
        </div>
        <div class="tab-container" id="tabContainer">
            <div class="tab active" onclick="showTab(1)">₹1</div>
            <div class="tab" onclick="showTab(5)">₹5</div>
            <div class="tab" onclick="showTab(10)">₹10</div>
            <div class="tab" onclick="showTab(50)">₹50</div>
            <div class="tab" onclick="showTab(100)">₹100</div>
        </div>
        <div id="tab-1" class="tab-content active"><div class="table-grid" id="grid-1"></div></div>
        <div id="tab-5" class="tab-content"><div class="table-grid" id="grid-5"></div></div>
        <div id="tab-10" class="tab-content"><div class="table-grid" id="grid-10"></div></div>
        <div id="tab-50" class="tab-content"><div class="table-grid" id="grid-50"></div></div>
        <div id="tab-100" class="tab-content"><div class="table-grid" id="grid-100"></div></div>
    </div>

    <div class="header">
        <button onclick="location.reload()" style="background:none; border:none; color:white; font-size: 20px;"><i class="fas fa-arrow-left"></i></button>
        <div id="tableName" style="font-weight: 900;">Table</div>
        <div style="color: #22c55e; font-weight: 900;">₹<span id="balance">0</span></div>
    </div>

    <div class="game-area">
        <div class="poker-table"></div>
        <div class="pot-box">
            <div style="font-size: 8px; opacity: 0.7;">POT</div>
            <div class="pot-amount">₹<span id="potVal">0</span></div>
        </div>
        <div id="seatsContainer"></div>

        <div class="controls" id="controls" style="opacity: 0.5; pointer-events: none;">
            <div class="bet-row">
                <button class="step-btn" onclick="adjustBet(-1)">-</button>
                <div class="bet-display" id="nextBetDisplay">₹0</div>
                <button class="step-btn" onclick="adjustBet(1)">+</button>
            </div>
            <div class="action-row">
                <div class="timer-box" id="timer">0</div>
                <div class="btn-grid">
                    <button class="btn btn-pack" onclick="handleMove('PACK')">Pack</button>
                    <button class="btn btn-chaal" id="chaalBtn" onclick="handleMove('CHAAL')">Chaal</button>
                    <button class="btn btn-show" id="showBtn" onclick="handleMove('SHOW')" style="display: none;">Show</button>
                    <button class="btn btn-side" onclick="alert('Sideshow soon')">Side</button>
                </div>
            </div>
        </div>
    </div>

    <div id="resultOverlay">
        <div class="res-card">
            <h1 id="resTitle" style="margin: 0;">WIN!</h1>
            <div id="resHand" class="cards-hand" style="margin: 15px 0;"></div>
            <div id="resAmount" style="font-size: 24px; color: var(--gold); font-weight: 900; margin-bottom: 15px;">₹0</div>
            <button class="btn btn-chaal" style="width: 100%;" onclick="closeRes()">OK</button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const token = localStorage.getItem("token");
        let myId = "", currentTable = null, isFetching = false, lastState = "", nextBet = 0, maxBet = 0;

        async function init() {
            const res = await fetch(`${API_URL}/api/profile`, { headers: { authorization: token } });
            const data = await res.json();
            if (data.success) { myId = data.user.id; document.getElementById("balance").innerText = data.user.coins.toFixed(2); }
            renderLobby();
        }
        init();

        function renderLobby() {
            const boots = [1, 5, 10, 50, 100];
            boots.forEach(b => {
                const grid = document.getElementById(`grid-${b}`);
                grid.innerHTML = "";
                for(let i=1; i<=5; i++) {
                    const tid = `${b}_${i}`;
                    const card = document.createElement("div");
                    card.className = "table-card";
                    card.innerHTML = `<h3>Table ${i}</h3><div class="boot">₹${b}</div><button onclick="join('${tid}')">JOIN</button>`;
                    grid.appendChild(card);
                }
            });
        }

        function showTab(b) {
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            event.target.classList.add("active");
            document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
            document.getElementById(`tab-${b}`).classList.add("active");
        }

        async function join(id) {
            currentTable = id;
            const res = await fetch(`${API_URL}/api/teenpatti/join`, {
                method: "POST", headers: { "Content-Type": "application/json", authorization: token },
                body: JSON.stringify({ tableId: id })
            });
            const data = await res.json();
            if (data.success) { document.getElementById("lobby").style.display = "none"; setInterval(fetchState, 1500); }
            else alert(data.message);
        }

        async function fetchState() {
            if(isFetching || !currentTable) return; isFetching = true;
            try {
                const res = await fetch(`${API_URL}/api/teenpatti/tables`, { headers: { authorization: token } });
                const data = await res.json();
                if (data.success) { const t = data.tables.find(x => x.id == currentTable); if (t) updateUI(t); }
            } catch(e) {} finally { isFetching = false; }
        }

        function updateUI(t) {
            document.getElementById("timer").innerText = t.timer;
            document.getElementById("potVal").innerText = t.pot;
            maxBet = t.maxBet;
            const container = document.getElementById("seatsContainer");
            container.innerHTML = "";
            const uids = Object.keys(t.players);
            const myIdx = uids.indexOf(myId);

            uids.forEach((uid, idx) => {
                const p = t.players[uid];
                let pos = (idx - myIdx + uids.length) % uids.length + 1;
                if (uid === myId) pos = "me"; else if (pos > 5) pos = 5;

                const seat = document.createElement("div");
                seat.className = `player-seat seat-${pos} ${t.currentTurn === uid ? 'active-turn' : ''}`;
                const status = p.status === 'PACKED' ? '<div class="status-badge" style="color:red">PACKED</div>' : (p.blind && t.state==='PLAYING' ? '<div class="status-badge">BLIND</div>' : '');
                const rank = p.handRank ? `<div class="rank-badge">${p.handRank}</div>` : '';

                seat.innerHTML = `
                    <div class="avatar-wrap"><div class="avatar"><img src="https://i.pravatar.cc/100?u=${uid}"></div>${status}</div>
                    <div class="user-name">${p.name}</div>
                    <div class="cards-hand">
                        ${renderCards(p.hand, p.blind && t.state !== 'SHOW')}
                        ${(uid === myId && p.blind && t.state === 'PLAYING') ? `<button class="see-btn" onclick="handleMove('SEE')">SEE</button>` : ''}
                        ${rank}
                    </div>
                `;
                container.appendChild(seat);

                if (uid === myId) {
                    const isTurn = t.currentTurn === myId && t.state === 'PLAYING';
                    const ctrl = document.getElementById("controls");
                    ctrl.style.opacity = isTurn ? "1" : "0.5";
                    ctrl.style.pointerEvents = isTurn ? "auto" : "none";
                    if (isTurn) {
                        const active = uids.filter(id => t.players[id].status === 'ACTIVE').length;
                        document.getElementById("showBtn").style.display = active === 2 ? "block" : "none";
                        if (nextBet < t.lastBet) nextBet = t.lastBet;
                        document.getElementById("nextBetDisplay").innerText = `₹${nextBet}`;
                        const cost = p.blind ? nextBet : nextBet * 2;
                        document.getElementById("chaalBtn").innerText = `${p.blind?'BLIND':'CHAAL'} ₹${cost}`;
                    }
                }
            });
            if (t.state === 'SHOW' && lastState !== 'SHOW') showRes(t);
            lastState = t.state;
        }

        function renderCards(hand, hidden) {
            if (!hand || hand.length === 0) return Array(3).fill('<div class="card back"></div>').join('');
            return hand.map(c => `<div class="card ${hidden?'back':''}" style="color:${(c.suit==='♥'||c.suit==='♦')?'red':'black'}"><div>${hidden?'':c.rank}</div><div>${hidden?'':c.suit}</div></div>`).join('');
        }

        async function handleMove(move) {
            await fetch(`${API_URL}/api/teenpatti/move`, {
                method: "POST", headers: { "Content-Type": "application/json", authorization: token },
                body: JSON.stringify({ tableId: currentTable, move, amount: nextBet })
            });
            fetchState(); fetchBalance();
        }

        function adjustBet(v) { nextBet = Math.min(Math.max(nextBet + (v*5), 5), maxBet); document.getElementById("nextBetDisplay").innerText = `₹${nextBet}`; }

        function showRes(t) {
            const overlay = document.getElementById("resultOverlay"); overlay.style.display = "flex";
            const me = t.players[myId], win = Object.values(t.players).find(p => p.result === 'WIN');
            document.getElementById("resTitle").innerText = me.result === 'WIN' ? "YOU WIN!" : "YOU LOSE";
            document.getElementById("resAmount").innerText = me.result === 'WIN' ? `₹${me.winAmount}` : "Better luck next time!";
            if(win) document.getElementById("resHand").innerHTML = renderCards(win.hand, false);
            fetchBalance();
        }
        function closeRes() { document.getElementById("resultOverlay").style.display = "none"; }
        async function fetchBalance() {
            const res = await fetch(`${API_URL}/api/profile`, { headers: { authorization: token } });
            const data = await res.json(); if(data.success) document.getElementById("balance").innerText = data.user.coins.toFixed(2);
        }
    </script>
</body>
</html>
