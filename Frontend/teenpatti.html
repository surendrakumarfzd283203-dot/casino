<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teen Patti | Solo Casino</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .table-area {
            background: radial-gradient(circle, #1a4a1a 0%, #0d2a0d 100%);
            border: 15px solid #5d4037;
            border-radius: 150px;
            padding: 60px;
            margin: 40px auto;
            max-width: 1000px;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            position: relative;
        }

        .dealer-pos { position: absolute; top: 40px; text-align: center; }

        /* 6 Player Positions */
        .player-pos {
            position: absolute;
            width: 120px;
            text-align: center;
        }
        .p1 { bottom: 20px; left: 50%; transform: translateX(-50%); }
        .p2 { bottom: 100px; right: 80px; }
        .p3 { top: 150px; right: 40px; }
        .p4 { top: 150px; left: 40px; }
        .p5 { bottom: 100px; left: 80px; }
        .p6 { top: 40px; right: 150px; } /* Adjusting for dealer */

        .hand {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 5px;
        }
        .card-item {
            width: 40px;
            height: 60px;
            background: white;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4px;
            color: black;
            font-weight: bold;
            font-size: 10px;
            box-shadow: 1px 2px 5px rgba(0,0,0,0.3);
        }
        .card-item.hidden {
            background: repeating-linear-gradient(45deg, #b71c1c, #b71c1c 5px, #880e4f 5px, #880e4f 10px);
            color: transparent;
        }
        .suit-icon { font-size: 14px; align-self: flex-end; }
        .red { color: #f44336; }

        .player-info {
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            color: white;
            font-size: 12px;
            min-width: 100px;
        }
        .player-info.active { border-color: var(--primary); box-shadow: 0 0 10px var(--primary); }

        .timer-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            font-weight: 800;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            z-index: 10;
        }

        .table-switcher {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .tab-btn {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: var(--primary);
            color: black;
            font-weight: bold;
        }

        .controls {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 20px;">
            <h1 onclick="location.href='dashboard.html'" style="cursor: pointer; color: var(--primary);">SOLO CASINO</h1>
            <div id="balanceDisplay" style="background: rgba(255,152,0,0.1); color: var(--primary); padding: 5px 15px; border-radius: 20px; font-weight: bold;">
                0 Coins
            </div>
        </div>
    </header>

    <div class="table-switcher">
        <button class="tab-btn active" onclick="switchTable(1)">Table 1</button>
        <button class="tab-btn" onclick="switchTable(2)">Table 2</button>
        <button class="tab-btn" onclick="switchTable(3)">Table 3</button>
    </div>

    <div class="table-area">
        <div class="timer-overlay" id="mainTimer">--</div>

        <div class="dealer-pos">
            <div class="player-info">DEALER</div>
            <div class="hand" id="dealerHand"></div>
        </div>

        <!-- 6 Slots for players -->
        <div class="player-pos p1" id="slot-0"></div>
        <div class="player-pos p2" id="slot-1"></div>
        <div class="player-pos p3" id="slot-2"></div>
        <div class="player-pos p4" id="slot-3"></div>
        <div class="player-pos p5" id="slot-4"></div>
        <div class="player-pos p6" id="slot-5"></div>
    </div>

    <div class="controls" style="max-width: 600px; margin: 0 auto;">
        <div class="input-group">
            <label style="font-size: 12px; color: var(--text-dim);">BET AMOUNT</label>
            <input type="number" id="betAmount" value="100" min="10" style="margin-bottom: 0;">
        </div>
        <button class="button-primary" id="placeBetBtn" onclick="placeBet()" style="padding: 15px 40px; margin-top: 15px;">PLACE BET</button>
    </div>

    <script>
        const token = localStorage.getItem("token");
        const userId = JSON.parse(atob(token.split('.')[1])).id;
        if (!token) location.href = "login.html";

        let currentTableId = 1;
        let gameState = null;

        async function fetchBalance() {
            const res = await fetch("http://localhost:5000/api/profile", { headers: { authorization: token } });
            const data = await res.json();
            if (data.success) {
                document.getElementById("balanceDisplay").innerText = data.user.coins.toLocaleString() + " Coins";
            }
        }

        function switchTable(id) {
            currentTableId = id;
            document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', idx + 1 === id);
            });
            fetchGameState();
        }

        async function fetchGameState() {
            try {
                const res = await fetch("http://localhost:5000/api/teenpatti/tables", { headers: { authorization: token } });
                const data = await res.json();
                if (data.success) {
                    gameState = data.tables.find(t => t.id === currentTableId);
                    renderTable();
                }
            } catch (e) { console.error(e); }
        }

        function renderCard(card) {
            if (!card || !card.suit) return '<div class="card-item hidden">?</div>';
            const isRed = card.suit === '♥' || card.suit === '♦';
            return `
                <div class="card-item ${isRed ? 'red' : ''}">
                    <div>${card.rank}</div>
                    <div class="suit-icon">${card.suit}</div>
                </div>
            `;
        }

        function renderTable() {
            if (!gameState) return;

            const timerEl = document.getElementById("mainTimer");
            if (gameState.state === 'BETTING') {
                timerEl.innerText = gameState.timer;
                timerEl.style.color = "var(--primary)";
            } else if (gameState.state === 'RESOLVING') {
                timerEl.innerText = "RESULTS";
                timerEl.style.color = "var(--accent-green)";
            } else {
                timerEl.innerText = "DEALING...";
                timerEl.style.color = "white";
            }

            // Dealer Hand
            const dHand = document.getElementById("dealerHand");
            if (gameState.dealerHand && gameState.dealerHand.length > 0) {
                dHand.innerHTML = gameState.dealerHand.map(renderCard).join('');
            } else {
                dHand.innerHTML = '<div class="card-item hidden">?</div>'.repeat(3);
            }

            // Players
            const players = Object.values(gameState.players);
            for (let i = 0; i < 6; i++) {
                const slot = document.getElementById(`slot-${i}`);
                const player = players[i];

                if (player) {
                    const isMe = gameState.players[userId] === player;
                    slot.innerHTML = `
                        <div class="player-info ${isMe ? 'active' : ''}">
                            <div style="font-weight: bold; overflow: hidden; text-overflow: ellipsis;">${player.name}</div>
                            <div style="color: var(--primary); font-size: 10px;">Bet: ${player.betAmount}</div>
                            ${player.result ? `<div style="color: ${player.result === 'WIN' ? 'var(--accent-green)' : 'var(--accent-red)'}; font-weight: bold;">${player.result}</div>` : ''}
                        </div>
                        <div class="hand">
                            ${player.hand && player.hand.length > 0 ? player.hand.map(renderCard).join('') : '<div class="card-item hidden">?</div>'.repeat(3)}
                        </div>
                    `;
                } else {
                    slot.innerHTML = `<div class="player-info" style="opacity: 0.3; border-style: dashed;">EMPTY</div>`;
                }
            }

            // UI Control
            const betBtn = document.getElementById("placeBetBtn");
            const hasBet = gameState.players[userId];
            if (hasBet || gameState.state !== 'BETTING') {
                betBtn.disabled = true;
                betBtn.innerText = hasBet ? "BET PLACED" : "WAITING...";
            } else {
                betBtn.disabled = false;
                betBtn.innerText = "PLACE BET";
            }
        }

        async function placeBet() {
            const amount = document.getElementById("betAmount").value;
            const res = await fetch("http://localhost:5000/api/teenpatti/bet", {
                method: "POST",
                headers: { "Content-Type": "application/json", authorization: token },
                body: JSON.stringify({ tableId: currentTableId, betAmount: amount })
            });
            const data = await res.json();
            if (data.success) {
                fetchGameState();
                fetchBalance();
            } else {
                alert(data.message);
            }
        }

        setInterval(fetchGameState, 1000);
        setInterval(fetchBalance, 5000);
        fetchGameState();
        fetchBalance();
    </script>
</body>
</html>
