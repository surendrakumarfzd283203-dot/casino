<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teen Patti Royale | Solo Casino</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --table-green: radial-gradient(circle, #2e7d32 0%, #1b5e20 100%);
            --gold: #ffc107;
            --bg-dark: #0f172a;
        }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0,0,0,0.8);
            border-bottom: 2px solid #334155;
            z-index: 1000;
        }

        .table-area {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1500px;
            padding-bottom: 100px;
        }

        .poker-table {
            width: 95%;
            height: 70%;
            background: var(--table-green);
            border: 15px solid #5d4037;
            border-radius: 200px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9), inset 0 0 100px rgba(0,0,0,0.6);
            position: relative;
            transform: rotateX(20deg);
        }

        .dealer-box {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
        }
        .dealer-img { width: 160px; filter: drop-shadow(0 10px 20px black); }

        .player-seat {
            position: absolute;
            width: 100px;
            text-align: center;
            z-index: 100;
            transition: all 0.3s;
        }
        .seat-me { bottom: -10px; left: 50%; transform: translateX(-50%); }
        .seat-2 { bottom: 80px; left: 5%; }
        .seat-3 { top: 80px; left: 10%; }
        .seat-4 { top: 80px; right: 10%; }
        .seat-5 { bottom: 80px; right: 5%; }

        .avatar {
            width: 70px; height: 70px;
            border-radius: 50%;
            border: 4px solid var(--gold);
            background: #222;
            margin: 0 auto;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .avatar.active-turn { border-color: #34b4ff; box-shadow: 0 0 25px #34b4ff; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .name-tag {
            font-size: 12px;
            font-weight: 800;
            background: rgba(0,0,0,0.9);
            border-radius: 6px;
            padding: 4px 8px;
            margin-top: 6px;
            color: var(--gold);
            border: 1px solid #444;
        }

        .cards-hand {
            display: flex;
            gap: 4px;
            justify-content: center;
            margin-top: 8px;
            height: 50px;
        }
        .card {
            width: 35px; height: 50px;
            background: white;
            border-radius: 5px;
            color: black;
            font-size: 14px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.5);
            border: 1px solid #ccc;
        }
        .card.back {
            background: #d10214;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(255,255,255,0.1) 5px, rgba(255,255,255,0.1) 10px);
            border: 2px solid white;
            color: transparent;
        }

        .pot-box {
            position: absolute;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--gold);
            font-weight: 900;
            text-shadow: 2px 2px 5px black;
            font-size: 20px;
        }

        .controls {
            background: #1e293b;
            padding: 15px 20px;
            display: grid;
            grid-template-columns: 80px 1fr 1fr;
            gap: 15px;
            align-items: center;
            border-top: 2px solid #334155;
            position: relative;
            z-index: 1000;
        }

        .action-btn {
            height: 60px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
            transition: 0.1s;
        }
        .action-btn:active { transform: translateY(3px); box-shadow: none; }
        .btn-chaal { background: #3b82f6; color: white; }
        .btn-pack { background: #ef4444; color: white; }
        .btn-see { background: #10b981; color: white; }

        .timer-box {
            width: 60px; height: 60px;
            border: 4px solid #ef4444;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 900; margin: 0 auto;
            background: rgba(0,0,0,0.3);
        }

        .table-switcher {
            position: absolute;
            top: 70px;
            left: 20px;
            display: flex;
            gap: 8px;
            z-index: 100;
        }
        .table-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--gold);
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
        }
        .table-btn.active { background: var(--gold); color: black; }

        .result-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 30px 50px;
            background: rgba(0,0,0,0.95);
            border: 3px solid var(--gold);
            border-radius: 30px;
            z-index: 2000;
            display: none;
            text-align: center;
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="location.href='dashboard.html'" style="background:none; border:none; color:white; font-size: 24px;"><i class="fas fa-arrow-left"></i></button>
        <div style="text-align: center;">
            <div style="font-size: 12px; color: var(--gold); font-weight: bold;">POT</div>
            <div style="font-size: 24px; font-weight: 900;">₹ <span id="potVal">0</span></div>
        </div>
        <div style="text-align: right;">
            <div style="font-size: 12px; color: #aaa;">BALANCE</div>
            <div style="font-size: 18px; color: var(--accent-green); font-weight: 900;">₹ <span id="balance">0</span></div>
        </div>
    </div>

    <div class="table-switcher" id="tableSwitcher">
        <button class="table-btn active" onclick="switchTable(1)">T1</button>
        <button class="table-btn" onclick="switchTable(2)">T2</button>
        <button class="table-btn" onclick="switchTable(3)">T3</button>
        <button class="table-btn" onclick="switchTable(4)">T4</button>
        <button class="table-btn" onclick="switchTable(5)">T5</button>
    </div>

    <div class="table-area">
        <div class="dealer-box">
            <img src="https://i.ibb.co/L5pZ0vX/dealer-girl.png" class="dealer-img" alt="dealer">
        </div>

        <div class="poker-table"></div>

        <div class="pot-box">
            <i class="fas fa-coins" style="color: gold;"></i><br>
            <span id="centerPot">0</span>
        </div>

        <!-- Result -->
        <div class="result-overlay" id="resultOverlay">
            <h1 id="resultTitle" style="color: var(--gold); margin: 0; font-size: 40px;">YOU WIN!</h1>
            <p id="resultBody" style="font-size: 24px; margin: 20px 0;"></p>
            <button class="button-primary" style="width: 100%;" onclick="closeResult()">PLAY AGAIN</button>
        </div>

        <!-- My Seat -->
        <div class="player-seat seat-me">
            <div class="avatar" id="avatar-me"><i class="fas fa-user"></i></div>
            <div class="name-tag">YOU</div>
            <div class="cards-hand" id="cards-me"></div>
        </div>

        <div id="otherSeats"></div>
    </div>

    <div class="controls" id="gameControls">
        <div class="timer-box" id="timer">0</div>

        <div id="actionArea" style="display: contents;">
             <button class="action-btn btn-pack" onclick="handleMove('PACK')">PACK</button>
             <div style="display: flex; flex-direction: column; gap: 5px;">
                <button class="action-btn btn-see" id="seeBtn" onclick="handleMove('SEE')">SEE</button>
                <button class="action-btn btn-chaal" id="chaalBtn" onclick="handleMove('CHAAL')">CHAAL</button>
             </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const token = localStorage.getItem("token");
        let myId = "";
        let currentTable = 1;
        let lastState = "";

        async function fetchState() {
            try {
                const res = await fetch(`${API_URL}/api/teenpatti/tables`, { headers: { authorization: token } });
                const data = await res.json();
                if (data.success) {
                    const table = data.tables.find(t => t.id == currentTable);
                    if (table) updateUI(table);
                }
            } catch (e) {}
        }

        function updateUI(table) {
            document.getElementById("timer").innerText = table.timer;
            document.getElementById("potVal").innerText = table.pot;
            document.getElementById("centerPot").innerText = table.pot;

            const me = table.players[myId];
            if (me) {
                // User ONLY sees their own cards if seen or if state is SHOW
                renderHand("cards-me", me.hand, me.blind && table.state !== 'SHOW');
                document.getElementById("seeBtn").style.display = (me.blind && table.state === 'PLAYING' && me.status === 'ACTIVE') ? "block" : "none";
                document.getElementById("chaalBtn").innerHTML = me.blind ? `BLIND (₹${table.lastBet})` : `CHAAL (₹${table.lastBet*2})`;

                if (table.currentTurn === myId) {
                    document.getElementById("avatar-me").classList.add("active-turn");
                    document.getElementById("actionArea").style.opacity = "1";
                    document.getElementById("actionArea").style.pointerEvents = "auto";
                } else {
                    document.getElementById("avatar-me").classList.remove("active-turn");
                    document.getElementById("actionArea").style.opacity = "0.5";
                    document.getElementById("actionArea").style.pointerEvents = "none";
                }
            }

            // Other Players
            const otherDiv = document.getElementById("otherSeats");
            otherDiv.innerHTML = "";
            let seatIdx = 2;
            Object.keys(table.players).forEach(uid => {
                if (uid === myId) return;
                const p = table.players[uid];
                const seat = document.createElement("div");
                seat.className = `player-seat seat-${seatIdx++}`;
                // OTHER players cards are ALWAYS hidden unless state is SHOW
                const isHidden = table.state !== 'SHOW';
                seat.innerHTML = `
                    <div class="avatar ${table.currentTurn === uid ? 'active-turn' : ''}">
                        <i class="fas ${p.isBot ? 'fa-robot' : 'fa-user'}"></i>
                    </div>
                    <div class="name-tag">${p.name}</div>
                    <div class="cards-hand">${renderHandHtml(p.hand, isHidden)}</div>
                `;
                otherDiv.appendChild(seat);
            });

            if (table.state === 'SHOW' && lastState !== 'SHOW') showResult(table);
            lastState = table.state;
        }

        async function handleMove(move) {
            const res = await fetch(`${API_URL}/api/teenpatti/move`, {
                method: "POST",
                headers: { "Content-Type": "application/json", authorization: token },
                body: JSON.stringify({ tableId: currentTable, move })
            });
            fetchBalance();
            fetchState();
        }

        function renderHand(id, hand, blind) {
            document.getElementById(id).innerHTML = renderHandHtml(hand, blind);
        }

        function renderHandHtml(hand, blind) {
            if (!hand || hand.length === 0) return `
                <div class="card back"></div>
                <div class="card back"></div>
                <div class="card back"></div>
            `;
            return hand.map(c => `
                <div class="card ${blind ? 'back' : ''}" style="color: ${['♥','♦'].includes(c.suit) ? 'red' : 'black'}">
                    ${blind ? '' : c.rank + '<br>' + c.suit}
                </div>
            `).join('');
        }

        function showResult(table) {
            const me = table.players[myId];
            const overlay = document.getElementById("resultOverlay");
            overlay.style.display = "block";
            if (me && me.result === 'WIN') {
                document.getElementById("resultTitle").innerText = "YOU WIN!";
                document.getElementById("resultBody").innerText = `Won ₹ ${me.winAmount}`;
                new Audio('sound/win.mp3').play().catch(e=>{});
            } else {
                const winner = Object.values(table.players).find(p => p.result === 'WIN');
                document.getElementById("resultTitle").innerText = "YOU LOSE";
                document.getElementById("resultBody").innerText = winner ? `${winner.name} won the pot!` : "Better luck next time!";
                new Audio('sound/lose.mp3').play().catch(e=>{});
            }
            fetchBalance();
        }

        function closeResult() { document.getElementById("resultOverlay").style.display = "none"; }

        async function switchTable(id) {
            currentTable = id;
            document.querySelectorAll('.table-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            await joinGame();
        }

        async function joinGame() {
            await fetch(`${API_URL}/api/teenpatti/join`, {
                method: "POST",
                headers: { "Content-Type": "application/json", authorization: token },
                body: JSON.stringify({ tableId: currentTable })
            });
            fetchState();
        }

        async function fetchBalance() {
            const res = await fetch(`${API_URL}/api/profile`, { headers: { authorization: token } });
            const data = await res.json();
            if (data.success) {
                document.getElementById("balance").innerText = data.user.coins.toFixed(2);
                myId = data.user.id;
            }
        }

        joinGame();
        setInterval(fetchState, 1500);
        fetchBalance();
    </script>
</body>
</html>
