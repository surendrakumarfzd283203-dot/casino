<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teen Patti | Solo Casino</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --table-green: #1a4a1a;
            --gold: #d4af37;
            --win-green: #28a745;
            --win-red: #ef4444;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(0,0,0,0.5);
            z-index: 100;
        }

        .balance-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 20px;
            color: var(--gold);
            font-weight: bold;
        }

        .table-area {
            height: calc(100vh - 150px);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .oval-table {
            width: 85%;
            height: 65%;
            background: radial-gradient(circle, #2e7d32 0%, #1b5e20 100%);
            border: 10px solid #5d4037;
            border-radius: 150px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 50px rgba(0,0,0,0.5);
            position: relative;
            transform: rotateX(20deg);
        }

        .dealer-area {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 50;
        }
        .dealer-img { width: 120px; }

        .player-seat {
            position: absolute;
            width: 80px;
            text-align: center;
            z-index: 60;
        }
        .seat-me { bottom: -30px; left: 50%; transform: translateX(-50%); }
        .seat-2 { bottom: 20px; left: 5%; }
        .seat-3 { top: 20px; left: 5%; }
        .seat-4 { top: 20px; right: 5%; }
        .seat-5 { bottom: 20px; right: 5%; }

        .player-avatar {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            background: #333;
            margin: 0 auto;
            overflow: hidden;
        }
        .player-name { font-size: 10px; font-weight: bold; background: rgba(0,0,0,0.7); border-radius: 5px; margin-top: 2px; }

        .cards-row {
            display: flex;
            gap: 2px;
            justify-content: center;
            margin-top: 5px;
        }
        .card {
            width: 25px; height: 35px;
            background: white; border-radius: 3px;
            color: black; font-size: 10px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        .controls {
            height: 80px;
            background: #1e293b;
            padding: 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .timer-circle {
            width: 50px; height: 50px;
            border: 3px solid var(--win-red);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 18px;
        }

        .btn-bet { background: var(--win-green); color: white; padding: 12px 25px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-cancel { background: #444; color: white; padding: 12px 25px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; display: none; }

        .result-box {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            z-index: 200;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="location.href='dashboard.html'" style="background:none; border:none; color:white;"><i class="fas fa-arrow-left"></i></button>
        <div id="pot">POT: ₹ 0</div>
        <div class="balance-box">₹ <span id="balance">0.00</span></div>
    </div>

    <div class="table-area">
        <div class="dealer-area">
            <img src="https://i.ibb.co/L5pZ0vX/dealer-girl.png" class="dealer-img" alt="dealer">
            <div class="cards-row" id="dealerCards"></div>
        </div>

        <div class="oval-table"></div>

        <div class="result-box" id="resultMsg"></div>

        <!-- Me -->
        <div class="player-seat seat-me">
            <div class="player-avatar"></div>
            <div class="player-name">YOU</div>
            <div class="cards-row" id="myCards"></div>
        </div>

        <div id="otherPlayers"></div>
    </div>

    <div class="controls">
        <div class="timer-circle" id="timer">20</div>
        <input type="number" id="betAmount" value="100" style="background:#000; border:1px solid #334155; color:white; padding:10px; width:80px; text-align:center; border-radius:8px;">
        <button id="cancelBtn" class="btn-cancel" onclick="cancelBet()">CANCEL</button>
        <button id="confirmBtn" class="btn-bet" onclick="placeBet()">PLACE BET</button>
    </div>

    <script src="js/config.js"></script>
    <script>
        const token = localStorage.getItem("token");
        let isBetPlaced = false;
        let currentTable = 1;
        let lastState = null;

        async function fetchState() {
            try {
                const res = await fetch(`${API_URL}/api/teenpatti/tables`, { headers: { authorization: token } });
                const data = await res.json();
                if (data.success) {
                    const table = data.tables.find(t => t.id == currentTable);
                    updateUI(table);
                }
            } catch (e) {}
        }

        function updateUI(table) {
            if (!table) return;
            document.getElementById("timer").innerText = table.timer;

            const confirmBtn = document.getElementById("confirmBtn");
            const cancelBtn = document.getElementById("cancelBtn");

            if (table.state === 'BETTING') {
                if (!isBetPlaced) {
                    confirmBtn.disabled = table.timer < 5;
                    confirmBtn.innerText = "PLACE BET";
                    cancelBtn.style.display = "none";
                }
                document.getElementById("dealerCards").innerHTML = "";
            } else {
                confirmBtn.disabled = true;
                confirmBtn.innerText = "WAITING...";
                cancelBtn.style.display = "none";
            }

            // Update Players
            let totalPot = 0;
            const otherContainer = document.getElementById("otherPlayers");
            otherContainer.innerHTML = "";
            let seatIdx = 2;

            for (let uid in table.players) {
                const p = table.players[uid];
                totalPot += p.betAmount;

                if (uid === localStorage.getItem("userId")) {
                    renderCards("myCards", p.hand);
                } else {
                    const seat = document.createElement("div");
                    seat.className = `player-seat seat-${seatIdx++}`;
                    seat.innerHTML = `
                        <div class="player-avatar"></div>
                        <div class="player-name">${p.name}</div>
                        <div class="cards-row">${renderCardsHtml(p.hand)}</div>
                    `;
                    otherContainer.appendChild(seat);
                }
            }
            document.getElementById("pot").innerText = `POT: ₹ ${totalPot}`;

            if (table.state === 'RESOLVING') {
                renderCards("dealerCards", table.dealerHand);
                if (isBetPlaced && lastState !== 'RESOLVING') {
                    showResult(table);
                }
            }
            lastState = table.state;
        }

        async function placeBet() {
            const amount = document.getElementById("betAmount").value;
            try {
                const res = await fetch(`${API_URL}/api/teenpatti/bet`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", authorization: token },
                    body: JSON.stringify({ tableId: currentTable, betAmount: amount })
                });
                const data = await res.json();
                if (data.success) {
                    isBetPlaced = true;
                    document.getElementById("confirmBtn").innerText = "BET PLACED";
                    document.getElementById("confirmBtn").disabled = true;
                    document.getElementById("cancelBtn").style.display = "block";
                    fetchBalance();
                } else alert(data.message);
            } catch (e) {}
        }

        function cancelBet() {
            isBetPlaced = false;
            document.getElementById("confirmBtn").disabled = false;
            document.getElementById("confirmBtn").innerText = "PLACE BET";
            document.getElementById("cancelBtn").style.display = "none";
            alert("Bet Cancelled!");
            fetchBalance();
        }

        function showResult(table) {
            const myUid = localStorage.getItem("userId");
            const me = table.players[myUid];
            if (!me) return;

            const resBox = document.getElementById("resultMsg");
            resBox.style.display = "block";
            if (me.result === 'WIN') {
                resBox.innerText = `YOU WON! ₹ ${me.winAmount}`;
                resBox.style.background = "var(--win-green)";
            } else {
                resBox.innerText = "YOU LOST!";
                resBox.style.background = "var(--win-red)";
            }
            isBetPlaced = false;
            setTimeout(() => resBox.style.display = "none", 5000);
            fetchBalance();
        }

        function renderCards(id, hand) {
            const container = document.getElementById(id);
            container.innerHTML = renderCardsHtml(hand);
        }

        function renderCardsHtml(hand) {
            if (!hand || hand.length === 0) return "";
            return hand.map(c => `
                <div class="card" style="color: ${['♥','♦'].includes(c.suit) ? 'red' : 'black'}">
                    ${c.rank}${c.suit}
                </div>
            `).join('');
        }

        async function fetchBalance() {
            const res = await fetch(`${API_URL}/api/profile`, { headers: { authorization: token } });
            const data = await res.json();
            if (data.success) {
                document.getElementById("balance").innerText = data.user.coins.toFixed(2);
                localStorage.setItem("userId", data.user.id);
            }
        }

        setInterval(fetchState, 1000);
        fetchBalance();
    </script>
</body>
</html>
