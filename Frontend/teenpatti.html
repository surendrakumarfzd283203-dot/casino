<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teen Patti Solo | Solo Casino</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffc107; --bg: #2a0a0a; --poker-blue: #24589e; }
        body { background: #0e0202; color: white; font-family: 'Roboto', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; user-select: none; }

        /* LOBBY */
        #lobby { position: fixed; inset: 0; background: radial-gradient(circle, #4a0d0d, #0e0202); z-index: 5000; display: flex; flex-direction: column; padding: 15px; overflow-y: auto; }
        .lobby-header { text-align: center; margin: 20px 0; }
        .lobby-title { font-size: 32px; font-weight: 900; color: var(--gold); text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 15px rgba(255,193,7,0.5); }
        .table-grid { display: grid; grid-template-columns: 1fr; gap: 15px; max-width: 350px; margin: 0 auto; padding-bottom: 50px; }
        .table-card { background: linear-gradient(145deg, #7c1c1c, #3d0a0a); border: 2px solid #b91c1c; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.6); }
        .table-card h3 { margin: 0; font-size: 14px; color: #fca5a5; text-transform: uppercase; }
        .table-card .boot { font-size: 28px; font-weight: 900; color: var(--gold); margin: 10px 0; }
        .table-card button { background: linear-gradient(to bottom, #34d399, #059669); color: white; border: none; padding: 12px 0; border-radius: 15px; font-weight: 900; cursor: pointer; width: 100%; font-size: 16px; box-shadow: 0 4px 0 #064e3b; }
        .table-card button:active { transform: translateY(2px); box-shadow: 0 2px 0 #064e3b; }

        /* GAME HEADER */
        .game-header { position: absolute; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; box-sizing: border-box; z-index: 1000; background: rgba(0,0,0,0.3); }
        .circle-btn { width: 40px; height: 40px; background: rgba(0,0,0,0.7); border: 1.5px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; cursor: pointer; }
        .wallet-display { background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--gold); display: flex; align-items: center; gap: 8px; font-weight: 900; color: #22c55e; }

        /* GAME AREA */
        .game-area { flex: 1; position: relative; background: radial-gradient(circle, #5c1414, #1a0505); display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .poker-table { width: 94%; height: 60%; background: var(--poker-blue); border-radius: 180px; position: relative; box-shadow: inset 0 0 120px rgba(0,0,0,0.8), 0 30px 60px rgba(0,0,0,0.8); border: 4px solid #fcc419; outline: 10px solid #1e293b; }

        .dealer-box { position: absolute; top: 4%; left: 50%; transform: translateX(-50%); z-index: 10; }
        .dealer-img { width: 140px; filter: drop-shadow(0 10px 20px black); }

        .pot-container { position: absolute; top: 38%; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.5); padding: 4px 20px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.2); z-index: 20; }
        .pot-amount { font-size: 24px; font-weight: 900; color: var(--gold); }

        /* SEATS */
        .player-seat { position: absolute; width: 100px; text-align: center; z-index: 100; }
        .seat-me { bottom: 2%; left: 50%; transform: translateX(-50%); }
        .seat-2 { left: 4%; bottom: 30%; }
        .seat-3 { left: 16%; top: 18%; }
        .seat-4 { right: 16%; top: 18%; }
        .seat-5 { right: 4%; bottom: 30%; }

        .avatar-group { position: relative; width: 70px; height: 70px; margin: 0 auto; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--gold); overflow: hidden; background: #333; box-shadow: 0 5px 15px rgba(0,0,0,0.6); position: relative; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .timer-overlay { position: absolute; inset: 0; border: 4px solid #fde047; border-radius: 50%; opacity: 0; z-index: 10; pointer-events: none; }
        .active-turn .timer-overlay { opacity: 1; animation: timer-spin 15s linear forwards; }
        @keyframes timer-spin { from { clip-path: inset(0 0 0 0); } to { clip-path: inset(100% 0 0 0); } }

        .p-name-plate { position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); border-radius: 12px; padding: 2px 10px; border: 1px solid rgba(255,255,255,0.2); width: 80px; }
        .p-name { font-size: 9px; font-weight: 900; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* CARDS ON TABLE */
        .cards-status { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); width: 60px; height: 40px; }
        .status-tag { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); background: #b91c1c; color: white; font-size: 8px; font-weight: 900; padding: 1px 5px; border-radius: 4px; border: 1px solid white; text-transform: uppercase; z-index: 20; }
        .mini-cards { display: flex; justify-content: center; }
        .m-card { width: 22px; height: 32px; background: #b91c1c url('https://www.transparenttextures.com/patterns/poker-qr.png'); border: 1px solid #fff; border-radius: 3px; margin: 0 -6px; box-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .m-card:nth-child(1) { transform: rotate(-10deg); }
        .m-card:nth-child(3) { transform: rotate(10deg); }

        /* MY HAND (LARGER) */
        .my-hand-container { position: absolute; bottom: 95px; left: 50%; transform: translateX(-50%); z-index: 300; pointer-events: none; }
        .my-hand { display: flex; justify-content: center; align-items: center; }
        .card-big { width: 80px; height: 110px; background: white; border-radius: 8px; color: black; font-size: 24px; font-weight: 900; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 -20px; box-shadow: 0 10px 20px rgba(0,0,0,0.7); border: 2px solid #fff; position: relative; transition: 0.2s; }
        .card-big.back { background: #b91c1c url('https://www.transparenttextures.com/patterns/poker-qr.png'); border-color: #fff; }
        .card-big:nth-child(1) { transform: rotate(-8deg) translateY(5px); }
        .card-big:nth-child(3) { transform: rotate(8deg) translateY(5px); }

        .rank-label { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: var(--gold); padding: 5px 20px; border-radius: 20px; font-size: 16px; font-weight: 900; border: 1.5px solid var(--gold); white-space: nowrap; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 310; }
        .see-now-btn { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(to bottom, #3b82f6, #1d4ed8); color: #fff; padding: 10px 30px; border-radius: 25px; font-weight: 950; font-size: 18px; border: 2px solid #fff; pointer-events: auto; cursor: pointer; box-shadow: 0 6px 12px rgba(0,0,0,0.5); z-index: 320; }

        /* CONTROLS */
        .game-controls { position: absolute; bottom: 0; width: 100%; padding: 10px 15px; display: flex; gap: 8px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); box-sizing: border-box; z-index: 1000; }
        .btn-game { flex: 1; height: 55px; border-radius: 12px; border: none; font-weight: 950; font-size: 16px; color: white; text-transform: uppercase; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.5); transition: 0.1s; display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1.1; }
        .btn-game:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.5); }
        .btn-p { background: linear-gradient(to bottom, #ef4444, #991b1b); }
        .btn-s { background: linear-gradient(to bottom, #64748b, #334155); }
        .btn-c { background: linear-gradient(to bottom, #22c55e, #065f46); }
        .btn-sub { font-size: 12px; font-weight: 800; opacity: 0.9; margin-top: 2px; }

        /* RESULT */
        #resultOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 7000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .res-card { background: radial-gradient(circle, #7c2d12, #1a0505); padding: 40px; border-radius: 30px; border: 3px solid var(--gold); text-align: center; width: 85%; max-width: 450px; box-shadow: 0 0 60px rgba(251,191,36,0.3); }

        @media (max-width: 600px) {
            .table-card { padding: 15px; }
            .lobby-title { font-size: 26px; }
            .btn-game { font-size: 14px; height: 50px; }
            .card-big { width: 65px; height: 90px; font-size: 20px; }
        }
    </style>
</head>
<body>

    <audio id="snd-bet" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>
    <audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
    <audio id="snd-turn" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <div id="lobby">
        <div class="lobby-header">
            <div class="lobby-title">Teen Patti Solo</div>
            <p style="color: #fca5a5; font-weight: 700;">Select Stakes to Join</p>
        </div>
        <div class="table-grid">
            <div class="table-card">
                <h3>Bronze</h3>
                <div class="boot">₹1</div>
                <button onclick="joinByBoot(1)">JOIN NOW</button>
            </div>
            <div class="table-card">
                <h3>Silver</h3>
                <div class="boot">₹5</div>
                <button onclick="joinByBoot(5)">JOIN NOW</button>
            </div>
            <div class="table-card">
                <h3>Gold</h3>
                <div class="boot">₹10</div>
                <button onclick="joinByBoot(10)">JOIN NOW</button>
            </div>
            <div class="table-card">
                <h3>Platinum</h3>
                <div class="boot">₹50</div>
                <button onclick="joinByBoot(50)">JOIN NOW</button>
            </div>
            <div class="table-card">
                <h3>Diamond</h3>
                <div class="boot">₹100</div>
                <button onclick="joinByBoot(100)">JOIN NOW</button>
            </div>
        </div>
    </div>

    <div class="game-header">
        <div class="circle-btn" onclick="location.reload()"><i class="fas fa-arrow-left"></i></div>
        <div class="wallet-display">
            <i class="fas fa-coins" style="color:var(--gold)"></i>
            ₹<span id="balance">0.00</span>
        </div>
        <div class="circle-btn" onclick="switchTable()" title="Switch Table"><i class="fas fa-random"></i></div>
    </div>

    <div class="game-area">
        <div class="dealer-box">
            <img src="https://i.ibb.co/L5pZ0vX/dealer-girl.png" class="dealer-img" alt="dealer">
        </div>
        <div class="poker-table"></div>

        <div class="pot-container">
            <img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png" width="28">
            <div class="pot-amount">₹<span id="potVal">0</span></div>
        </div>

        <div id="seatsContainer"></div>

        <div class="my-hand-container">
            <div class="my-hand" id="myHandArea"></div>
        </div>
    </div>

    <div class="game-controls" id="controls" style="opacity: 0.5; pointer-events: none;">
        <button class="btn-game btn-p" onclick="handleMove('PACK')">Pack</button>
        <button class="btn-game btn-s" onclick="alert('Sideshow soon')">Side Show</button>
        <button class="btn-game btn-c" id="chaalBtn" onclick="handleMove('CHAAL')">
            <span>Chaal</span>
            <span class="btn-sub" id="chaalAmt">₹0</span>
        </button>
        <button class="btn-game btn-c" id="showBtn" onclick="handleMove('SHOW')" style="display: none; background: linear-gradient(to bottom, #f59e0b, #b45309);">
            <span>Show</span>
            <span class="btn-sub" id="showAmt">₹0</span>
        </button>
    </div>

    <div id="resultOverlay">
        <div class="res-card">
            <h1 id="resTitle" style="margin: 0; color: var(--gold); font-size: 40px;">YOU WIN!</h1>
            <div id="resHand" style="display: flex; justify-content: center; gap: 8px; margin: 30px 0;"></div>
            <div id="resAmount" style="font-size: 36px; color: #34d399; font-weight: 900; margin-bottom: 30px;">+₹0</div>
            <button class="btn-game btn-c" style="width: 100%; font-size: 20px;" onclick="closeRes()">CONTINUE</button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const token = localStorage.getItem("token");
        let myId = "", currentTable = null, isFetching = false, lastState = "", lastTurn = "";

        async function init() {
            if (!token) { alert("Please login first"); location.href = "login.html"; return; }
            try {
                const res = await fetch(`${API_URL}/api/profile`, { headers: { authorization: token } });
                const data = await res.json();
                if (data.success) {
                    myId = data.user.id;
                    document.getElementById("balance").innerText = data.user.coins.toFixed(2);
                }
            } catch(e) { console.error("Init Error:", e); }
        }
        init();

        let lastBootAmount = 1;
        async function joinByBoot(boot) {
            if (!myId) await init();
            if (!myId) return;

            lastBootAmount = boot;
            try {
                const res = await fetch(`${API_URL}/api/teenpatti/join`, {
                    method: "POST", headers: { "Content-Type": "application/json", authorization: token },
                    body: JSON.stringify({ bootAmount: boot })
                });
                const data = await res.json();
                if (data.success) {
                    currentTable = data.tableId;
                    document.getElementById("lobby").style.display = "none";
                    if(!window.stateInterval) window.stateInterval = setInterval(fetchState, 1500);
                } else alert(data.message);
            } catch(e) { alert("Connection Error"); }
        }

        async function switchTable() {
            if(!confirm("Switch table?")) return;
            joinByBoot(lastBootAmount);
        }

        async function fetchState() {
            if(isFetching || !currentTable) return; isFetching = true;
            try {
                const res = await fetch(`${API_URL}/api/teenpatti/tables`, { headers: { authorization: token } });
                const data = await res.json();
                if (data.success) {
                    const t = data.tables.find(x => x.id == currentTable);
                    if (t) updateUI(t);
                }
            } catch(e) {} finally { isFetching = false; }
        }

        function updateUI(t) {
            if (!myId) return;
            document.getElementById("potVal").innerText = t.pot;
            if (t.currentTurn === myId && lastTurn !== myId) {
                 document.getElementById('snd-turn').play().catch(e=>{});
            }
            lastTurn = t.currentTurn;

            const container = document.getElementById("seatsContainer");
            container.innerHTML = "";
            const uids = Object.keys(t.players);
            const myIdx = uids.indexOf(myId);

            uids.forEach((uid, idx) => {
                const p = t.players[uid];
                let pos = (idx - myIdx + uids.length) % uids.length + 1;
                if (uid === myId) pos = "me"; else if (pos > 5) pos = 5;

                const seat = document.createElement("div");
                seat.className = `player-seat seat-${pos} ${t.currentTurn === uid ? 'active-turn' : ''}`;
                const status = p.status === 'PACKED' ? 'PACKED' : (p.blind && t.state==='PLAYING' ? 'BLIND' : 'SEEN');
                const showCards = p.status !== 'WAITING' && p.status !== 'PACKED';

                if (pos !== "me") {
                    seat.innerHTML = `
                        <div class="cards-status">
                            ${showCards ? `<div class="status-tag" style="background:${status==='BLIND'?'#000':'#15803d'}">${status}</div>` : ''}
                            ${p.status === 'PACKED' ? `<div class="status-tag">PACKED</div>` : ''}
                            <div class="mini-cards">
                                <div class="m-card"></div><div class="m-card"></div><div class="m-card"></div>
                            </div>
                        </div>
                        <div class="avatar-group">
                            <div class="timer-overlay"></div>
                            <div class="avatar"><img src="https://i.pravatar.cc/100?u=${uid}"></div>
                            <div class="p-name-plate"><div class="p-name">${p.name}</div></div>
                        </div>
                    `;
                    container.appendChild(seat);
                } else {
                    // My Hand
                    const myHandArea = document.getElementById("myHandArea");
                    myHandArea.innerHTML = `
                        <div style="display:flex;">${renderBigCards(p.hand, p.blind && t.state !== 'SHOW')}</div>
                        ${p.handRank ? `<div class="rank-label">${p.handRank}</div>` : ''}
                        ${(p.blind && t.state === 'PLAYING' && p.status === 'ACTIVE') ? `<div class="see-now-btn" onclick="handleMove('SEE')">SEE</div>` : ''}
                    `;

                    const myAvatarGroup = document.createElement('div');
                    myAvatarGroup.className = 'avatar-group';
                    myAvatarGroup.innerHTML = `
                        <div class="timer-overlay"></div>
                        <div class="avatar"><img src="https://i.pravatar.cc/100?u=${myId}"></div>
                        <div class="p-name-plate"><div class="p-name">${p.name}</div></div>
                    `;
                    seat.appendChild(myAvatarGroup);
                    container.appendChild(seat);

                    const isTurn = t.currentTurn === myId && t.state === 'PLAYING' && p.status === 'ACTIVE';
                    const ctrl = document.getElementById("controls");
                    ctrl.style.opacity = isTurn ? "1" : "0.5";
                    ctrl.style.pointerEvents = isTurn ? "auto" : "none";
                    if (isTurn) {
                        const active = uids.filter(id => t.players[id].status === 'ACTIVE').length;
                        document.getElementById("showBtn").style.display = active === 2 ? "block" : "none";
                        const cost = p.blind ? t.lastBet : t.lastBet * 2;
                        document.getElementById("chaalAmt").innerText = `₹${cost}`;
                        document.getElementById("showAmt").innerText = `₹${cost}`;
                    }
                }
            });

            if (t.state === 'SHOW' && lastState !== 'SHOW') {
                document.getElementById('snd-win').play().catch(e=>{});
                showResult(t);
            }
            lastState = t.state;
        }

        function renderBigCards(hand, hidden) {
            if (!hand || hand.length === 0) return Array(3).fill('<div class="card-big back"></div>').join('');
            return hand.map(c => `<div class="card-big ${hidden?'back':''}" style="color:${(c.suit==='♥'||c.suit==='♦')?'#b91c1c':'black'}"><div>${hidden?'':c.rank}</div><div>${hidden?'':c.suit}</div></div>`).join('');
        }

        async function handleMove(move) {
            if (move === 'CHAAL' || move === 'SHOW') document.getElementById('snd-bet').play().catch(e=>{});
            await fetch(`${API_URL}/api/teenpatti/move`, {
                method: "POST", headers: { "Content-Type": "application/json", authorization: token },
                body: JSON.stringify({ tableId: currentTable, move, amount: 0 })
            });
            fetchState();
        }

        function showResult(t) {
            const overlay = document.getElementById("resultOverlay"); overlay.style.display = "flex";
            const me = t.players[myId], win = Object.values(t.players).find(p => p.result === 'WIN');
            document.getElementById("resTitle").innerText = me.result === 'WIN' ? "YOU WIN!" : "YOU LOSE";
            document.getElementById("resAmount").innerText = me.result === 'WIN' ? `+₹${me.winAmount}` : "Better luck next time!";
            if(win) document.getElementById("resHand").innerHTML = renderBigCards(win.hand, false);
            fetchBalance();
        }
        function closeRes() { document.getElementById("resultOverlay").style.display = "none"; }
        async function fetchBalance() {
            const res = await fetch(`${API_URL}/api/profile`, { headers: { authorization: token } });
            const data = await res.json();
            if (data.success) document.getElementById("balance").innerText = data.user.coins.toFixed(2);
        }
    </script>
</body>
</html>
