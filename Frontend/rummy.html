<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rummy | Solo Games</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            background-color: #2e0249;
            background-image: radial-gradient(circle at 50% 50%, #570a88 0%, #2e0249 100%);
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; overflow: hidden;
        }
        .coming-soon-card {
            background: rgba(0,0,0,0.6);
            padding: 40px;
            border-radius: 30px;
            border: 2px solid #f1c40f;
            text-align: center;
            box-shadow: 0 0 50px rgba(241, 196, 15, 0.2);
            backdrop-filter: blur(10px);
        }
        .icon { font-size: 80px; color: #f1c40f; margin-bottom: 20px; animation: pulse 2s infinite; }
        h1 { font-size: 42px; margin: 0; font-weight: 900; letter-spacing: 2px; }
        p { font-size: 18px; color: #ccc; margin: 15px 0 30px; }
        .btn-back {
            background: #f1c40f; color: #000; border: none; padding: 12px 30px;
            border-radius: 50px; font-weight: 900; cursor: pointer; text-decoration: none;
            transition: 0.3s;
        }
        .btn-back:hover { transform: scale(1.1); box-shadow: 0 0 20px #f1c40f; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="coming-soon-card">
        <div class="icon"><i class="fas fa-cards"></i></div>
        <h1>COMING SOON</h1>
        <p>We are working hard to bring you the best Rummy experience!</p>
        <a href="dashboard.html" class="btn-back">BACK TO LOBBY</a>
    </div>
</body>
</html>
