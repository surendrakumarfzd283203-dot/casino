<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard | BlockBet Casino</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-green: #00ff6a;
            --dark-bg: #0b0e11;
            --card-bg: #1e2329;
            --text-gray: #929aa5;
            --gold: #f0b90b;
        }

        body {
            background-color: var(--dark-bg);
            background-image:
                radial-gradient(circle at top right, rgba(0, 255, 106, 0.05), transparent 400px),
                radial-gradient(circle at bottom left, rgba(0, 255, 106, 0.03), transparent 400px);
            color: white;
            margin: 0;
            padding-bottom: 80px;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden;
        }

        /* Top Bar */
        .top-bar {
            background: rgba(11, 14, 17, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo-box { font-weight: 900; font-size: 20px; color: white; display: flex; align-items: center; gap: 8px; }
        .logo-box span { color: var(--neon-green); }

        .top-actions { display: flex; gap: 15px; align-items: center; }
        .balance-pill {
            background: rgba(0, 255, 106, 0.1);
            border: 1px solid rgba(0, 255, 106, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 800;
            color: var(--neon-green);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Banner Section */
        .promo-slider {
            margin: 15px;
            height: 160px;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            background: linear-gradient(45deg, #004d26, #000);
            border: 1px solid rgba(0, 255, 106, 0.1);
        }
        .promo-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }
        .promo-content h2 { margin: 0; font-size: 20px; color: var(--neon-green); font-weight: 900; line-height: 1.2; }
        .promo-content p { margin: 8px 0 0; font-size: 12px; color: #aaa; font-weight: 600; }
        .promo-img {
            position: absolute;
            right: -10px;
            bottom: -10px;
            height: 120%;
            opacity: 0.8;
        }

        /* Categories */
        .category-row {
            display: flex;
            gap: 10px;
            padding: 0 15px;
            margin-bottom: 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .category-row::-webkit-scrollbar { display: none; }
        .cat-item {
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: fit-content;
            font-weight: 700;
            font-size: 13px;
            color: var(--text-gray);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .cat-item.active { background: rgba(0, 255, 106, 0.1); color: var(--neon-green); border-color: rgba(0, 255, 106, 0.2); }
        .cat-item i { font-size: 16px; }

        /* Game Sections */
        .section-group { margin-bottom: 25px; }
        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            margin-bottom: 12px;
        }
        .section-head h3 { margin: 0; font-size: 16px; font-weight: 800; letter-spacing: 0.5px; }
        .section-head a { font-size: 12px; color: var(--neon-green); text-decoration: none; font-weight: 700; }

        .game-grid-v2 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 0 15px;
        }

        .game-tile {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 0.75;
            background: #2b3139;
            transition: transform 0.2s;
        }
        .game-tile:active { transform: scale(0.96); }
        .game-tile img { width: 100%; height: 100%; object-fit: cover; }

        .tile-info {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 8px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            font-size: 11px;
            font-weight: 700;
            text-align: center;
        }

        /* Bottom Navbar */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: #181a20;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 25px;
            border-top: 1px solid #2b3139;
            z-index: 2000;
        }
        .nav-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 10px;
            font-weight: 600;
        }
        .nav-link.active { color: var(--neon-green); }
        .nav-link i { font-size: 22px; }

        /* Wallet Section in Banner */
        .wallet-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }
        .btn-mini {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: none;
            font-weight: 800;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-deposit { background: var(--neon-green); color: #000; }
        .btn-withdraw { background: rgba(255,255,255,0.1); color: #fff; }

    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo-box">BLOCK<span>BET</span></div>
        <div class="top-actions">
            <div class="balance-pill">
                <i class="fas fa-coins"></i> <span id="coins">0.00</span>
            </div>
            <i class="fas fa-bell" style="font-size: 18px; color: var(--text-gray);"></i>
        </div>
    </div>

    <div class="promo-slider">
        <div class="promo-content">
            <h2>VIP TRANSFERS<br>NOW LIVE</h2>
            <p>Get exclusive rewards & higher limits</p>
            <div class="wallet-actions">
                <button onclick="location.href='wallet.html'" class="btn-mini btn-deposit">DEPOSIT</button>
                <button onclick="location.href='wallet.html'" class="btn-mini btn-withdraw">WITHDRAW</button>
            </div>
        </div>
        <img src="https://img.freepik.com/free-vector/golden-crown-with-diamonds_1284-18181.jpg" class="promo-img" alt="Crown">
    </div>

    <div class="category-row">
        <div class="cat-item active"><i class="fas fa-gamepad"></i> Casino</div>
        <div class="cat-item"><i class="fas fa-basketball"></i> Sports</div>
        <div class="cat-item"><i class="fas fa-ticket-alt"></i> Lottery</div>
        <div class="cat-item"><i class="fas fa-user-friends"></i> Referral</div>
    </div>

    <div class="section-group">
        <div class="section-head">
            <h3>Crash Games</h3>
            <a href="#">View All</a>
        </div>
        <div class="game-grid-v2">
            <div class="game-tile" onclick="location.href='aviator.html'">
                <img src="https://img.freepik.com/free-vector/airplane-flying-red-sky_1308-30693.jpg" alt="Aviator">
                <div class="tile-info">AVIATOR</div>
            </div>
            <div class="game-tile" onclick="location.href='colorgame.html'">
                <img src="https://img.freepik.com/free-vector/gradient-dynamic-blue-lines-background_23-2148995756.jpg" alt="Color Game">
                <div class="tile-info">WIN GO</div>
            </div>
            <div class="game-tile" onclick="location.href='bigsmall.html'">
                <img src="https://img.freepik.com/free-photo/casino-dice-table_23-2148281350.jpg" alt="Big Small">
                <div class="tile-info">DICE</div>
            </div>
        </div>
    </div>

    <div class="section-group">
        <div class="section-head">
            <h3>Popular Slots</h3>
            <a href="#">View All</a>
        </div>
        <div class="game-grid-v2">
            <div class="game-tile" onclick="location.href='luckydraw.html'">
                <img src="https://img.freepik.com/free-vector/lucky-seven-slot-machine-with-golden-coins_23-2148006263.jpg" alt="Lucky">
                <div class="tile-info">777 SLOTS</div>
            </div>
            <div class="game-tile" onclick="location.href='spin.html'">
                <img src="https://img.freepik.com/free-vector/fortune-wheel-concept-flat-design_23-2148644310.jpg" alt="Spin">
                <div class="tile-info">WHEEL</div>
            </div>
            <div class="game-tile" onclick="location.href='rummy.html'">
                <img src="https://img.freepik.com/free-photo/set-playing-cards-table_1232-1596.jpg" alt="Rummy">
                <div class="tile-info">RUMMY</div>
            </div>
        </div>
    </div>

    <div class="section-group" style="padding-bottom: 20px;">
        <div class="section-head">
            <h3>Live Casino</h3>
            <a href="#">View All</a>
        </div>
        <div class="game-grid-v2">
            <div class="game-tile" onclick="location.href='teenpatti.html'">
                <img src="https://img.freepik.com/free-vector/poker-background-with-aces-chips_1284-18182.jpg" alt="Teen Patti">
                <div class="tile-info">TEEN PATTI</div>
            </div>
            <div class="game-tile">
                <img src="https://img.freepik.com/free-photo/blackjack-card-game_23-2148281345.jpg" alt="Blackjack">
                <div class="tile-info">BLACKJACK</div>
            </div>
            <div class="game-tile">
                <img src="https://img.freepik.com/free-photo/roulette-table-casino_23-2148281335.jpg" alt="Roulette">
                <div class="tile-info">ROULETTE</div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-link active">
            <i class="fas fa-th-large"></i>
            <span>Lobby</span>
        </a>
        <a href="wallet.html" class="nav-link">
            <i class="fas fa-wallet"></i>
            <span>Wallet</span>
        </a>
        <a href="leaderboard.html" class="nav-link">
            <i class="fas fa-crown"></i>
            <span>VIP</span>
        </a>
        <a href="profile.html" class="nav-link">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <script src="js/config.js"></script>
    <script>
        const token = localStorage.getItem("token");
        if(!token){ location.href = "login.html"; }

        async function fetchProfile() {
            try {
                const res = await fetch(`${API_URL}/api/profile`, {
                    headers: { "authorization": token }
                });
                if (res.status === 401) {
                    localStorage.removeItem("token");
                    return location.href = "login.html";
                }
                const data = await res.json();
                if (data.success) {
                    document.getElementById("coins").innerText = data.user.coins.toLocaleString(undefined, {minimumFractionDigits: 2});
                }
            } catch (err) {}
        }

        fetchProfile();

        function logout(){
            localStorage.removeItem("token");
            location.href = "login.html";
        }
    </script>
</body>
</html>
