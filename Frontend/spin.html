<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Spin | Solo Casino</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .spin-game-container {
            text-align: center;
            padding: 40px 20px;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            border-radius: 40px;
            border: 2px solid #333;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            position: relative;
        }
        .wheel-outer {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 40px auto;
            border: 15px solid #222;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 152, 0, 0.3), inset 0 0 20px rgba(0,0,0,0.8);
            background: #111;
        }
        .wheel-container {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
        }
        .wheel-pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            z-index: 20;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5));
        }
        .wheel-pointer::after {
            content: '▼';
            font-size: 40px;
            color: #ff9800;
        }
        .section {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .section-text {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) rotate(0deg);
            font-weight: 800;
            color: white;
            font-size: 16px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        .center-hub {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: #222;
            border: 4px solid #ff9800;
            border-radius: 50%;
            z-index: 15;
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff9800;
            font-weight: bold;
            font-size: 12px;
        }
        .timer-box { font-size: 32px; font-weight: bold; color: #ff9800; margin-bottom: 20px; }
        .bet-buttons { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .bet-btn {
            background: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        .bet-btn.active { background: #ff9800; color: black; }
    </style>
</head>
<body>
    <header>
        <h1>SOLO SPIN</h1>
        <div class="balance-badge" style="background: rgba(255, 152, 0, 0.1); color: #ff9800; padding: 5px 15px; border-radius: 20px;">
            Balance: <span id="balance">0</span>
        </div>
    </header>

    <div class="form-box" style="max-width: 600px;">
        <div class="spin-game-container">
            <div class="timer-box" id="timer">00:45</div>

            <div class="wheel-outer">
                <div class="wheel-pointer"></div>
                <div class="center-hub">SPIN</div>
                <div class="wheel-container" id="wheel"></div>
            </div>

            <div id="gameStatus" style="font-weight: bold; font-size: 18px; margin: 20px 0; height: 24px;"></div>

            <div class="wallet-card">
                <label>Bet Amount</label>
                <input type="number" id="betAmount" value="50" min="10" style="text-align: center; font-size: 24px;">
            </div>

            <button class="button-primary" id="placeBetBtn" onclick="placeBet()" style="margin-top: 20px;">PLACE BET</button>

            <div id="history" style="margin-top: 30px; display: flex; gap: 10px; justify-content: center;"></div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const token = localStorage.getItem("token");
        if (!token) location.href = "login.html";

        const wheel = document.getElementById("wheel");
        const statusDisplay = document.getElementById("gameStatus");
        const timerDisplay = document.getElementById("timer");
        let currentRotation = 0;
        let lastRoundId = null;

        async function fetchState() {
            try {
                const res = await fetch(`${API_URL}/api/game/spin/state`, { headers: { authorization: token } });
                const data = await res.json();
                if (data.success) {
                    if (wheel.children.length === 0) renderWheel(data.sections);

                    timerDisplay.innerText = `00:${data.timer.toString().padStart(2, '0')}`;

                    if (data.timer < 5) {
                        document.getElementById("placeBetBtn").disabled = true;
                        document.getElementById("placeBetBtn").innerText = "SPINNING...";
                    } else {
                        document.getElementById("placeBetBtn").disabled = false;
                        document.getElementById("placeBetBtn").innerText = "PLACE BET";
                    }

                    if (data.history && data.history.length > 0) {
                        const last = data.history[0];
                        if (last.roundId !== lastRoundId) {
                            lastRoundId = last.roundId;
                            handleSpinResult(last, data.sections.length);
                        }
                        renderHistory(data.history);
                    }
                }
            } catch (e) { console.error(e); }
        }

        function renderWheel(sections) {
            const angle = 360 / sections.length;
            sections.forEach((s, i) => {
                const sec = document.createElement("div");
                sec.className = "section";
                sec.style.transform = `rotate(${i * angle}deg) skewY(${90 - angle}deg)`;

                // Better colors
                let color = "#333";
                if (s[1] === "RED") color = "#f44336";
                else if (s[1] === "BLUE") color = "#2196f3";
                else if (s[1] === "GOLD") color = "#ffc107";
                sec.style.backgroundColor = color;

                const text = document.createElement("div");
                text.className = "section-text";
                text.innerText = s[0] + "x";
                text.style.transform = `skewY(-${90 - angle}deg) rotate(${angle / 2}deg) translateY(20px)`;

                sec.appendChild(text);
                wheel.appendChild(sec);
            });
        }

        function handleSpinResult(last, totalSections) {
            const anglePerSection = 360 / totalSections;
            // The pointer is at the top (0 deg).
            // We want the section 'last.index' to land at the top.
            // Section 0 is at 0-30 deg, Section 1 is at 30-60 deg, etc.
            // To have section 'i' at the top, we rotate by -(i * anglePerSection + offset)
            const targetDeg = 360 - (last.index * anglePerSection + (anglePerSection / 2));
            currentRotation += 1440 + targetDeg; // At least 4 full spins
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            statusDisplay.innerText = "SPINNING...";
            setTimeout(() => {
                statusDisplay.innerText = last.multiplier > 0 ? `WIN! ${last.multiplier}x` : "BETTER LUCK NEXT TIME!";
                statusDisplay.style.color = last.multiplier > 0 ? "#4caf50" : "#f44336";
                fetchBalance();
            }, 4000);
        }

        async function placeBet() {
            const amount = document.getElementById("betAmount").value;
            try {
                const res = await fetch(`${API_URL}/api/game/spin/bet`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", authorization: token },
                    body: JSON.stringify({ amount })
                });
                const data = await res.json();
                if (data.success) {
                    alert("Bet Placed!");
                    fetchBalance();
                } else alert(data.message);
            } catch (e) { alert("Server Error"); }
        }

        async function fetchBalance() {
            const res = await fetch(`${API_URL}/api/profile`, { headers: { authorization: token } });
            const data = await res.json();
            if (data.success) document.getElementById("balance").innerText = data.user.coins.toLocaleString();
        }

        function renderHistory(history) {
            const container = document.getElementById("history");
            container.innerHTML = history.slice(0, 5).map(h => `
                <div style="background: #222; padding: 5px 10px; border-radius: 5px; font-size: 12px; border: 1px solid #444;">
                    ${h.multiplier}x
                </div>
            `).join('');
        }

        setInterval(fetchState, 2000);
        fetchBalance();
    </script>
</body>
</html>
