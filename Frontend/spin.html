<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spin & Win Royale | Solo Casino</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --gold: #f1c40f;
            --red: #ef4444;
            --blue: #3498db;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .balance-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 15px;
            border-radius: 20px;
            color: var(--gold);
            font-weight: 900;
            border: 1px solid rgba(241, 196, 15, 0.2);
        }

        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 30px auto;
            border-radius: 50%;
            border: 10px solid #2c3e50;
            box-shadow: 0 0 50px rgba(0,0,0,0.5), 0 0 20px var(--gold);
        }

        .wheel-img {
            width: 100%; height: 100%;
            border-radius: 50%;
            transition: transform 3s cubic-bezier(0.1, 0, 0.1, 1);
            background: conic-gradient(
                #ef4444 0deg 30deg, #333 30deg 60deg,
                #3498db 60deg 90deg, #333 90deg 120deg,
                #ef4444 120deg 150deg, #333 150deg 180deg,
                #f1c40f 180deg 210deg, #333 210deg 240deg,
                #ef4444 240deg 270deg, #333 270deg 300deg,
                #3498db 300deg 330deg, #333 330deg 360deg
            );
        }

        .pointer {
            position: absolute;
            top: -20px; left: 50%;
            transform: translateX(-50%);
            width: 40px; height: 40px;
            background: var(--gold);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
        }

        .timer-display {
            font-size: 32px;
            font-weight: 900;
            color: var(--gold);
            margin: 15px 0;
            text-align: center;
        }

        .bet-input-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 25px;
            margin-top: 10px;
            border: 1px solid #334155;
            text-align: center;
        }

        .btn-spin {
            background: #22c55e; color: white; width: 100%; height: 60px;
            border: none; border-radius: 15px; font-weight: 900;
            font-size: 20px; cursor: pointer; box-shadow: 0 4px 0 #15803d;
            margin-top: 15px;
            text-transform: uppercase;
        }
        .btn-spin:disabled { opacity: 0.5; background: #444; box-shadow: none; }

        .multiplier-list {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .mult-item {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            font-size: 11px;
            border: 1px solid #333;
            text-align: center;
        }
        .mult-item b { color: var(--gold); font-size: 16px; display: block; }

        #resPopup {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 30px 50px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 32px;
            z-index: 1000;
            display: none;
            text-align: center;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            animation: zoomIn 0.3s;
        }
        @keyframes zoomIn { from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } }
    </style>
</head>
<body>
    <div id="resPopup"></div>
    <div class="header">
        <button onclick="location.href='dashboard.html'" style="background:none; border:none; color:white; font-size: 24px;"><i class="fas fa-arrow-left"></i></button>
        <div class="balance-box">₹ <span id="balance">0.00</span></div>
    </div>

    <div class="timer-display" id="timer">00:20</div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="wheel-img" id="wheel"></div>
    </div>

    <div class="container" style="max-width: 500px; margin: 0 auto;">
        <div class="multiplier-list">
            <div class="mult-item"><b>10x</b> GOLD</div>
            <div class="mult-item"><b>5x</b> BLUE</div>
            <div class="mult-item"><b>2x</b> RED</div>
            <div class="mult-item"><b>0x</b> GRAY</div>
        </div>

        <div class="bet-input-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <span style="font-weight: 800; font-size: 18px;">Bet Amount</span>
                <input type="number" id="betAmount" value="100" style="background: #000; border: 2px solid #334155; color: var(--gold); padding: 10px; width: 120px; text-align: center; border-radius: 12px; font-size: 24px; font-weight: 900;">
            </div>
            <button class="btn-spin" id="spinBtn" onclick="placeBet()">SPIN NOW</button>
        </div>
    </div>

    <audio id="sndSpin" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    <audio id="sndWin" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>

    <script src="js/config.js"></script>
    <script>
        const token = localStorage.getItem("token");
        let isSpinning = false;
        let lastRoundId = null;
        let currentBet = 0;

        async function fetchState() {
            try {
                const res = await fetch(`${API_URL}/api/game/spin/state`, { headers: { authorization: token } });
                const data = await res.json();
                if (data.success) {
                    const secs = data.timer;
                    document.getElementById("timer").innerText = `Spinning In: ${secs}s`;
                    if(secs < 5) document.getElementById("timer").style.color = "#ef4444";
                    else document.getElementById("timer").style.color = "var(--gold)";

                    if (data.history && data.history.length > 0) {
                        const last = data.history[0];
                        if (last.roundId !== lastRoundId) {
                            lastRoundId = last.roundId;
                            if (currentBet > 0) {
                                checkWin(last);
                                currentBet = 0;
                            }
                        }
                    }

                    if (data.timer < 4) {
                        startSpin(data.history[0]?.index || 0);
                        document.getElementById("spinBtn").disabled = true;
                        document.getElementById("spinBtn").innerText = "SPINNING...";
                    } else {
                        isSpinning = false;
                        document.getElementById("spinBtn").disabled = false;
                        document.getElementById("spinBtn").innerText = "SPIN NOW";
                    }
                }
            } catch (e) {}
        }

        function startSpin(index) {
            if (isSpinning) return;
            isSpinning = true;
            document.getElementById("sndSpin").play().catch(e=>{});
            // Index 0 is yellow (10x), others... adjust conic-gradient if needed
            const deg = 3600 - (index * 30);
            document.getElementById("wheel").style.transform = `rotate(${deg}deg)`;
        }

        function checkWin(last) {
            const msg = document.getElementById("resPopup");
            msg.style.display = "block";

            const winAmount = last.winAmount || 0;
            if (winAmount > 0) {
                msg.innerHTML = `<div>WIN!</div><div style="font-size:24px;">₹${winAmount.toFixed(2)}</div>`;
                msg.style.background = "rgba(34, 197, 94, 0.95)";
                new Audio('sound/win.mp3').play().catch(e=>{});
            } else {
                msg.innerHTML = `<div>LOSE</div>`;
                msg.style.background = "rgba(239, 68, 68, 0.95)";
                new Audio('sound/lose.mp3').play().catch(e=>{});
            }
            setTimeout(() => {
                msg.style.display = "none";
                fetchBalance();
            }, 5000);
        }

        async function placeBet() {
            const amount = parseInt(document.getElementById("betAmount").value);
            const res = await fetch(`${API_URL}/api/game/spin/bet`, {
                method: "POST",
                headers: { "Content-Type": "application/json", authorization: token },
                body: JSON.stringify({ amount })
            });
            const data = await res.json();
            if (data.success) {
                currentBet = amount;
                fetchBalance();
            } else alert(data.message);
        }

        async function fetchBalance() {
            const res = await fetch(`${API_URL}/api/profile`, { headers: { authorization: token } });
            const data = await res.json();
            if (data.success) document.getElementById("balance").innerText = data.user.coins.toFixed(2);
        }

        setInterval(fetchState, 1000);
        fetchBalance();
    </script>
</body>
</html>
