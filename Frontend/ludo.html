<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ludo Turbo | Solo Casino</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --red: #ff3b3b;
            --blue: #2e90ff;
            --green: #2ecc71;
            --yellow: #f1c40f;
            --bg: #001529;
            --panel: #00224d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #000c18;
            color: white; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Lobby UI */
        #lobby {
            position: fixed; inset: 0; background: #000c18; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .stake-card {
            background: linear-gradient(135deg, #003366, #00224d); padding: 20px; border-radius: 20px; text-align: center;
            border: 2px solid rgba(255,255,255,0.1); cursor: pointer; margin-bottom: 15px; width: 100%; max-width: 300px;
        }
        .stake-card h3 { color: #94a3b8; font-size: 14px; margin-bottom: 5px; }
        .stake-card .amount { font-size: 24px; font-weight: 900; color: var(--yellow); }

        /* Header */
        .top-bar { width: 100%; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); }
        .prize-box { background: #1e3a8a; padding: 5px 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); }
        .timer-box { background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 8px; margin-top: 5px; display: flex; align-items: center; gap: 5px; }

        /* Board Styling */
        .game-container { flex: 1; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 5px; }

        .ludo-board {
            width: 98vw; height: 98vw; max-width: 450px; max-height: 450px;
            background: #fff; border: 4px solid #1e293b; display: grid;
            grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr);
            position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .cell { border: 0.1px solid rgba(0,0,0,0.05); position: relative; }
        .cell.safe::before { content: '\f005'; font-family: "Font Awesome 6 Free"; font-weight: 900; color: rgba(0,0,0,0.1); font-size: 10px; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }

        /* Bases */
        .base { grid-column: span 6; grid-row: span 6; padding: 10%; position: relative; }
        .base-inner { width: 100%; height: 100%; background: #fff; border-radius: 15%; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10%; padding: 10%; }
        .slot { background: #eee; border-radius: 50%; border: 1px dashed #ccc; }

        /* Colors */
        .red { background-color: var(--red) !important; }
        .blue { background-color: var(--blue) !important; }
        .green { background-color: var(--green) !important; }
        .yellow { background-color: var(--yellow) !important; }

        /* Center */
        .center-home {
            grid-column: span 3; grid-row: span 3; position: relative; background: #fff;
        }
        .tri { position: absolute; width: 0; height: 0; border-style: solid; }
        .tri-r { border-width: 45px 45px 0 45px; border-color: var(--red) transparent transparent transparent; top: 0; }
        .tri-b { border-width: 45px 0 45px 45px; border-color: transparent transparent transparent var(--blue); left: 0; }
        .tri-y { border-width: 0 45px 45px 45px; border-color: transparent transparent var(--yellow) transparent; bottom: 0; }
        .tri-g { border-width: 45px 45px 45px 0; border-color: transparent var(--green) transparent transparent; right: 0; }

        /* Tokens */
        .token {
            width: 70%; height: 70%; border-radius: 50%; border: 2px solid #fff;
            position: absolute; top: 15%; left: 15%; z-index: 100;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3); transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            display: flex; align-items: center; justify-content: center;
        }
        .token::after { content: ''; width: 50%; height: 50%; background: rgba(255,255,255,0.3); border-radius: 50%; }
        .token.active { animation: bounce 0.6s infinite alternate; z-index: 200; box-shadow: 0 0 15px #fff; border-width: 3px; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* Players */
        .player-row { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
        .score-box { background: #fff; color: #333; padding: 5px 15px; border-radius: 20px; border: 3px solid var(--red); text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .score-box.blue { border-color: var(--blue); }
        .profile { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #fff; object-fit: cover; }

        /* Dice */
        .dice-wrap { width: 55px; height: 55px; background: #fff; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #333; box-shadow: 0 5px 15px rgba(0,0,0,0.4); border: 2px solid transparent; transition: 0.2s; }
        .dice-wrap.active { border-color: #4ade80; animation: glow 1s infinite alternate; cursor: pointer; }
        @keyframes glow { from { box-shadow: 0 0 5px #4ade80; } to { box-shadow: 0 0 20px #4ade80; } }
        .dice-wrap.rolling { animation: spin 0.4s infinite linear; }
        @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }

        /* Overlays */
        #search-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .loader { width: 50px; height: 50px; border: 5px solid #333; border-top-color: var(--yellow); border-radius: 50%; animation: spin 1s infinite linear; }
    </style>
</head>
<body>

    <div id="lobby">
        <h1 style="color:var(--yellow); font-size: 32px; margin-top: 50px; font-weight: 900;">LUDO TURBO</h1>
        <div style="width: 100%; margin-top: 40px; display: flex; flex-direction: column; align-items: center;">
            <div class="stake-card" onclick="joinLudo(10)"><h3>Bronze</h3><div class="amount">₹10</div></div>
            <div class="stake-card" onclick="joinLudo(50)"><h3>Silver</h3><div class="amount">₹50</div></div>
            <div class="stake-card" onclick="joinLudo(100)"><h3>Gold</h3><div class="amount">₹100</div></div>
        </div>
    </div>

    <div id="search-overlay">
        <div class="loader"></div>
        <h2 style="margin-top: 20px;">Finding Player...</h2>
    </div>

    <div class="top-bar">
        <i class="fas fa-cog"></i>
        <div class="prize-box">
            <div style="font-size: 9px; opacity: 0.8; text-transform: uppercase;">Prize Pool</div>
            <div style="font-size: 18px; font-weight: 900;">₹<span id="prize-text">0.00</span></div>
        </div>
        <i class="fas fa-wifi"></i>
    </div>

    <div class="timer-box">
        <i class="fas fa-bolt" style="color:var(--yellow)"></i>
        <span id="game-timer" style="font-weight: 900; font-family: monospace; font-size: 18px; color: #4ade80;">05:00</span>
    </div>

    <div class="game-container">
        <!-- Opponent Player -->
        <div class="player-row">
            <div class="profile">
                <img id="opp-avatar" src="https://i.pravatar.cc/100?u=1" class="avatar">
                <div>
                    <div id="opp-name" style="font-weight: 800; font-size: 12px;">Waiting...</div>
                    <div id="opp-dice" class="dice-wrap" style="width: 35px; height: 35px; font-size: 18px;"><i class="fas fa-dice-one"></i></div>
                </div>
            </div>
            <div class="score-box blue">
                <div style="font-size: 10px; font-weight: 800;">SCORE</div>
                <div id="opp-score" style="font-size: 20px; font-weight: 900;">0</div>
            </div>
        </div>

        <!-- The Board -->
        <div class="ludo-board" id="board">
            <!-- Will be generated by JS -->
        </div>

        <!-- My Player -->
        <div class="player-row">
            <div class="score-box">
                <div style="font-size: 10px; font-weight: 800;">SCORE</div>
                <div id="my-score" style="font-size: 20px; font-weight: 900;">0</div>
            </div>
            <div class="profile" style="flex-direction: row-reverse; text-align: right;">
                <img id="my-avatar" src="https://i.pravatar.cc/100?u=2" class="avatar">
                <div>
                    <div id="my-name" style="font-weight: 800; font-size: 12px;">You</div>
                    <div id="diceBtn" class="dice-wrap" onclick="rollDice()"><i class="fas fa-dice-one"></i></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const token = localStorage.getItem("token");
        if (!token) location.href = "login.html";

        const socket = io({ auth: { token } });
        let myId = "", currentRoom = null, myPlayerIndex = -1, gameState = null;

        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = "";

            for (let r = 0; r < 15; r++) {
                for (let c = 0; c < 15; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `c-${r}-${c}`;

                    // Bases
                    if (r < 6 && c < 6) {
                        if (r === 0 && c === 0) {
                            cell.className = 'base red';
                            cell.innerHTML = '<div class="base-inner"><div class="slot" id="p0-t0"></div><div class="slot" id="p0-t1"></div><div class="slot" id="p0-t2"></div><div class="slot" id="p0-t3"></div></div>';
                        } else if (r > 0 || c > 0) { cell.style.display = 'none'; continue; }
                    }
                    else if (r > 8 && c > 8) {
                        if (r === 9 && c === 9) {
                            cell.className = 'base blue';
                            cell.innerHTML = '<div class="base-inner"><div class="slot" id="p1-t0"></div><div class="slot" id="p1-t1"></div><div class="slot" id="p1-t2"></div><div class="slot" id="p1-t3"></div></div>';
                        } else if (r > 9 || c > 9) { cell.style.display = 'none'; continue; }
                    }
                    else if (r < 6 && c > 8) { cell.classList.add('yellow'); }
                    else if (r > 8 && c < 6) { cell.classList.add('green'); }

                    // Path Colors
                    if (r === 7 && c > 0 && c < 6) cell.classList.add('red');
                    if (r === 7 && c > 8 && c < 14) cell.classList.add('blue');
                    if (c === 7 && r > 0 && r < 6) cell.classList.add('green');
                    if (c === 7 && r > 8 && r < 14) cell.classList.add('yellow');

                    // Safe Spots
                    if ((r === 6 && c === 1) || (r === 8 && c === 13) || (r === 1 && c === 8) || (r === 13 && c === 6) ||
                        (r === 2 && c === 6) || (r === 12 && c === 8) || (r === 6 && c === 12) || (r === 8 && c === 2)) {
                        cell.classList.add('safe');
                    }

                    // Center
                    if (r === 6 && c === 6) {
                        cell.className = 'center-home';
                        cell.innerHTML = '<div class="tri tri-r"></div><div class="tri tri-b"></div><div class="tri tri-y"></div><div class="tri tri-g"></div>';
                        cell.style.gridColumn = "span 3";
                        cell.style.gridRow = "span 3";
                    } else if (r >= 6 && r <= 8 && c >= 6 && c <= 8) {
                        cell.style.display = 'none';
                        continue;
                    }

                    board.appendChild(cell);
                }
            }
        }

        const cellMap = {};
        function initCellMap() {
            const path = [
                {r:6,c:0},{r:6,c:1},{r:6,c:2},{r:6,c:3},{r:6,c:4},{r:6,c:5},
                {r:5,c:6},{r:4,c:6},{r:3,c:6},{r:2,c:6},{r:1,c:6},{r:0,c:6},
                {r:0,c:7},
                {r:0,c:8},{r:1,c:8},{r:2,c:8},{r:3,c:8},{r:4,c:8},{r:5,c:8},
                {r:6,c:9},{r:6,c:10},{r:6,c:11},{r:6,c:12},{r:6,c:13},{r:6,c:14},
                {r:7,c:14},
                {r:8,c:14},{r:8,c:13},{r:8,c:12},{r:8,c:11},{r:8,c:10},{r:8,c:9},
                {r:9,c:8},{r:10,c:8},{r:11,c:8},{r:12,c:8},{r:13,c:8},{r:14,c:8},
                {r:14,c:7},
                {r:14,c:6},{r:13,c:6},{r:12,c:6},{r:11,c:6},{r:10,c:6},{r:9,c:6},
                {r:8,c:5},{r:8,c:4},{r:8,c:3},{r:8,c:2},{r:8,c:1},{r:8,c:0},
                {r:7,c:0}
            ];
            path.forEach((p, i) => cellMap[i + 1] = p);
            for(let i=1; i<=6; i++) cellMap[100+i] = {r:7, c:i};
            for(let i=1; i<=6; i++) cellMap[200+i] = {r:7, c:14-i};
        }

        function joinLudo(amount) {
            socket.emit('ludo_join', { amount });
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('search-overlay').style.display = 'flex';
            document.getElementById('prize-text').innerText = (amount * 1.8).toFixed(2);
        }

        function rollDice() {
            if (!gameState || gameState.turn !== myPlayerIndex || gameState.rolled) return;
            socket.emit('ludo_roll', { roomId: currentRoom });
            document.getElementById('diceBtn').classList.add('rolling');
        }

        socket.on('ludo_state', (state) => {
            gameState = state;
            currentRoom = state.id;
            updateUI(state);
        });

        socket.on('dice_rolled', (data) => {
            const diceIcons = ["one", "two", "three", "four", "five", "six"];
            const icon = `<i class="fas fa-dice-${diceIcons[data.dice - 1]}"></i>`;
            if (data.turn === myPlayerIndex) {
                document.getElementById('diceBtn').classList.remove('rolling');
                document.getElementById('diceBtn').innerHTML = icon;
            } else {
                document.getElementById('opp-dice').innerHTML = icon;
            }
        });

        function updateUI(state) {
            myId = socket.user?.id || JSON.parse(atob(token.split('.')[1])).id;
            myPlayerIndex = state.players.findIndex(p => p.id === myId);
            if (state.gameState === 'PLAYING') document.getElementById('search-overlay').style.display = 'none';

            const me = state.players[myPlayerIndex];
            const opp = state.players.find(p => p.id !== me.id) || { name: "Waiting...", score: 0 };

            document.getElementById('my-name').innerText = me.name;
            document.getElementById('my-score').innerText = me.score;
            document.getElementById('opp-name').innerText = opp.name;
            document.getElementById('opp-score').innerText = opp.score;
            document.getElementById('diceBtn').classList.toggle('active', state.turn === myPlayerIndex);

            const min = Math.floor(state.gameTimer / 60);
            const sec = state.gameTimer % 60;
            document.getElementById('game-timer').innerText = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;

            renderTokens(state.board.tokens);
        }

        function renderTokens(tokens) {
            document.querySelectorAll('.token').forEach(t => t.remove());
            [0, 1].forEach(pIdx => {
                tokens[pIdx].forEach((pos, tIdx) => {
                    const token = document.createElement('div');
                    token.className = `token ${pIdx === 0 ? 'red' : 'blue'}`;
                    if (gameState.turn === myPlayerIndex && pIdx === myPlayerIndex && gameState.rolled) token.classList.add('active');

                    token.onclick = (e) => {
                        e.stopPropagation();
                        if (gameState.turn === myPlayerIndex && pIdx === myPlayerIndex) {
                            socket.emit('ludo_move', { roomId: currentRoom, tokenIndex: tIdx });
                        }
                    };

                    if (pos === -1) {
                        const slot = document.getElementById(`p${pIdx}-t${tIdx}`);
                        if (slot) slot.appendChild(token);
                    } else {
                        const actualId = pos >= 101 ? (pIdx === 0 ? pos : pos + 100) : pos;
                        const coords = cellMap[actualId];
                        if (coords) {
                            const cell = document.getElementById(`c-${coords.r}-${coords.c}`);
                            if (cell) cell.appendChild(token);
                        }
                    }
                });
            });
        }

        initCellMap();
        createBoard();
        fetch(`${API_URL}/api/profile`, { headers: { authorization: token } })
            .then(r => r.json()).then(d => { if(d.success) socket.user = d.user; });
    </script>
</body>
</html>
