<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ludo Turbo | Solo Casino</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://casino-vri2.onrender.com/socket.io/socket.io.js"></script>
    <style>
        :root {
            --red-main: #ff3232; --red-light: #ff7676;
            --blue-main: #2874ed; --blue-light: #76a5ff;
            --yellow-main: #f1c40f; --yellow-light: #f9e38c;
            --green-main: #2ecc71; --green-light: #82eab1;
            --bg: #1a0b2e; --panel: #2d144d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Lobby */
        #lobby { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .stake-card { background: linear-gradient(135deg, #003366, #00224d); padding: 20px; border-radius: 20px; text-align: center; border: 2px solid rgba(255,255,255,0.1); cursor: pointer; margin-bottom: 15px; width: 100%; max-width: 300px; transition: 0.2s; }
        .stake-card:active { transform: scale(0.95); }
        .stake-card .amount { font-size: 24px; font-weight: 900; color: #f1c40f; }

        /* Header */
        .header { width: 100%; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); }
        .prize-box { background: #1e40af; padding: 3px 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); text-align: center; }
        .timer-badge { background: rgba(0,0,0,0.5); padding: 3px 12px; border-radius: 10px; display: flex; align-items: center; gap: 6px; margin-top: 5px; border: 1px solid rgba(255,255,255,0.1); }

        /* Board Area */
        .game-area { flex: 1; width: 100%; max-width: 500px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 10px 10px 100px 10px; overflow: hidden; gap: 20px; }

        .player-bar { width: 92%; display: flex; justify-content: space-between; align-items: center; padding: 8px 15px; background: rgba(255,255,255,0.1); border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(5px); }
        .profile { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #fff; object-fit: cover; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .score-circle { width: 45px; height: 45px; border-radius: 50%; background: #fff; border: 2px solid #333; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 900; flex-shrink: 0; }

        .ludo-board {
            width: 92vw; height: 92vw; max-width: 400px; max-height: 400px;
            background: #fff; border: 6px solid #1e293b; display: grid;
            grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr);
            position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            margin: 10px 0;
        }

        .cell { border: 0.1px solid rgba(0,0,0,0.1); position: relative; background: #fff; }
        .cell.safe::after { content: '\f005'; font-family: "Font Awesome 6 Free"; font-weight: 900; color: #cbd5e1; font-size: 14px; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; transition: transform 0.8s; }
        .cell.safe.red-bg::after, .cell.safe.blue-bg::after, .cell.safe.yellow-bg::after, .cell.safe.green-bg::after { color: rgba(255,255,255,0.8); }

        .base { grid-column: span 6; grid-row: span 6; position: relative; border: 1px solid rgba(0,0,0,0.1); }
        .base-inner { width: 80%; height: 80%; background: #fff; border-radius: 50%; position: absolute; top: 10%; left: 10%; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10%; padding: 15%; border: 1px solid rgba(0,0,0,0.05); transition: transform 0.8s; }
        .slot { background: #f1f5f9; border-radius: 50%; border: 1.5px dashed #cbd5e1; position: relative; }

        .red-bg { background-color: var(--red-main); }
        .blue-bg { background-color: var(--blue-main); }
        .yellow-bg { background-color: var(--yellow-main); }
        .green-bg { background-color: var(--green-main); }

        /* Center UI */
        .center { grid-column: span 3; grid-row: span 3; position: relative; background: #fff; overflow: hidden; border: 1px solid rgba(0,0,0,0.1); }
        .center svg { width: 100%; height: 100%; display: block; }

        /* Location Pin Style Tokens */
        .token {
            width: 20px; height: 28px;
            position: absolute; top: 50%; left: 50%;
            z-index: 100; cursor: pointer; transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translate(-50%, -50%);
        }
        .token-body {
            width: 100%; height: 100%;
            position: relative;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
            display: flex; flex-direction: column; align-items: center;
        }
        .pin-head {
            width: 18px; height: 18px; border-radius: 50% 50% 50% 0;
            background: currentColor;
            transform: rotate(-45deg);
            border: 1.5px solid white;
            display: flex; align-items: center; justify-content: center;
        }
        .pin-head::after {
            content: ''; width: 6px; height: 6px; background: white; border-radius: 50%;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
        }
        .token.red { color: #ff3232; }
        .token.blue { color: #2874ed; }
        .token.yellow { color: #f1c40f; }
        .token.green { color: #2ecc71; }

        .token.on-star { transform: translate(-50%, -50%) scale(0.7) rotate(${-boardRotation}deg) !important; filter: brightness(0.9); }

        .token.active { animation: tokenJump 0.6s infinite alternate; z-index: 200; }
        @keyframes tokenJump {
            from { transform: translate(-50%, -60%) scale(1.1); }
            to { transform: translate(-50%, -85%) scale(1.2); }
        }

        /* Wooden Dice Design */
        .dice-wrap {
            width: 45px; height: 45px; background: #f3e5ab !important; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; box-shadow: inset 0 0 10px #d4a76a, 0 4px 10px rgba(0,0,0,0.5);
            cursor: pointer; border: 2px solid #8b4513; transition: all 0.3s;
            position: relative; color: #3e2723 !important; z-index: 500;
        }
        .dice-wrap i { color: #3e2723 !important; }
        .dice-wrap.active { border-color: #2ecc71 !important; box-shadow: 0 0 15px #2ecc71; }
        @keyframes glow { from { box-shadow: 0 0 5px #4ade80; } to { box-shadow: 0 0 25px #4ade80; } }
        .dice-wrap.rolling { animation: jumpSpin 0.8s ease-out; }
        @keyframes jumpSpin {
            0% { transform: translateY(0) rotate(0deg) scale(1); }
            30% { transform: translateY(-50px) rotate(180deg) scale(1.4); }
            100% { transform: translateY(0) rotate(360deg) scale(1); }
        }

        /* Chat UI */
        #chat-ui { position: fixed; bottom: 125px; left: 15px; z-index: 1500; display: flex; flex-direction: column; align-items: flex-start; pointer-events: none; width: 100%; }
        .chat-bubble { background: rgba(0,0,0,0.9); color: white; padding: 6px 12px; border-radius: 15px; margin-bottom: 5px; font-size: 13px; border-left: 4px solid var(--yellow-main); animation: slideIn 0.3s ease-out; pointer-events: auto; max-width: 70%; }
        @keyframes slideIn { from { transform: translateX(-50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .bottom-panel { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.85); padding: 8px; display: flex; flex-direction: column; gap: 5px; z-index: 1800; border-top: 1px solid rgba(255,255,255,0.1); }
        .emoji-list { display: flex; justify-content: space-around; padding: 2px 0; }
        .emoji-btn { font-size: 28px; cursor: pointer; transition: 0.2s; }
        .emoji-btn:active { transform: scale(1.4); }
        .chat-row { display: flex; gap: 8px; align-items: center; padding: 0 5px; }
        .chat-input { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 10px 15px; border-radius: 20px; font-size: 14px; }
        .send-btn { background: var(--yellow-main); color: black; border: none; padding: 8px 18px; border-radius: 15px; font-weight: 900; font-size: 13px; }

        #search-overlay { position: fixed; inset: 0; background: rgba(0,21,41,0.95); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #result-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <audio id="bg-music" loop><source src="https://www.soundjay.com/misc/sounds/wind-chime-1.mp3"></audio>
    <audio id="dice-sound"><source src="sound/dice2.mp3"></audio>
    <audio id="move-sound"><source src="sound/move.mp3"></audio>
    <audio id="kill-sound"><source src="sound/kill.mp3"></audio>

    <div id="lobby">
        <h1 style="color:#f1c40f; font-size: 38px; margin-top: 60px; font-weight: 900; letter-spacing: 2px;">LUDO TURBO</h1>
        <div style="width: 100%; margin-top: 50px; display: flex; flex-direction: column; align-items: center;">
            <div class="stake-card" onclick="joinLudo(10)"><h3>BRONZE</h3><div class="amount">₹10</div></div>
            <div class="stake-card" onclick="joinLudo(50)"><h3>SILVER</h3><div class="amount">₹50</div></div>
            <div class="stake-card" onclick="joinLudo(100)"><h3>GOLD</h3><div class="amount">₹100</div></div>
        </div>
    </div>

    <div id="search-overlay">
        <div style="width:50px; height:50px; border:5px solid #333; border-top-color:#f1c40f; border-radius:50%; animation:spin 1s infinite linear;"></div>
        <h2 style="margin-top: 25px; font-weight: 800;">Finding Opponent...</h2>
    </div>

    <div class="header">
        <i class="fas fa-cog"></i>
        <div class="prize-box">
            <div style="font-size: 10px; font-weight: 600;">PRIZE POOL</div>
            <div style="font-size: 18px; font-weight: 900;">₹<span id="prize-text">0.00</span></div>
        </div>
        <i class="fas fa-wifi" style="color: #4ade80;"></i>
    </div>

    <div class="timer-badge">
        <i class="fas fa-bolt" style="color:#f1c40f"></i>
        <span id="game-clock">05:00</span>
    </div>

    <div class="game-area">
        <div class="player-bar" id="opp-bar">
            <div class="profile">
                <img id="opp-avatar" src="" class="avatar" alt="Opponent">
                <div>
                    <div id="opp-name" style="font-weight: 800; font-size: 12px; white-space: nowrap;">Waiting...</div>
                    <div id="opp-dice" class="dice-wrap" style="width: 35px; height: 35px; font-size: 20px;"><i class="fas fa-dice-one"></i></div>
                </div>
            </div>
            <div class="score-circle" id="opp-score-circle">
                <div style="font-size: 9px;">SCORE</div>
                <div id="opp-score">0</div>
            </div>
        </div>

        <div class="ludo-board" id="board"></div>

        <div class="player-bar" id="my-bar">
            <div class="score-circle" id="my-score-circle">
                <div style="font-size: 9px;">SCORE</div>
                <div id="my-score">0</div>
            </div>
            <div class="profile" style="flex-direction: row-reverse; text-align: right;">
                <img id="my-avatar" src="" class="avatar" alt="Me">
                <div>
                    <div id="my-name" style="font-weight: 800; font-size: 12px; white-space: nowrap;">You</div>
                    <div id="diceBtn" class="dice-wrap" onclick="rollDice()"><i class="fas fa-dice-one"></i></div>
                </div>
            </div>
        </div>
    </div>

    <div id="chat-ui"></div>

    <div class="bottom-panel">
        <div class="emoji-list">
            <span class="emoji-btn" onclick="sendEmoji('😂')">😂</span>
            <span class="emoji-btn" onclick="sendEmoji('🔥')">🔥</span>
            <span class="emoji-btn" onclick="sendEmoji('👍')">👍</span>
            <span class="emoji-btn" onclick="sendEmoji('😡')">😡</span>
            <span class="emoji-btn" onclick="sendEmoji('😮')">😮</span>
        </div>
        <div class="chat-row">
            <label for="chatInput" style="display:none">Chat</label>
            <input type="text" id="chatInput" class="chat-input" placeholder="Chat here..." onkeydown="if(event.key==='Enter') sendChat()">
            <button class="send-btn" onclick="sendChat()">SEND</button>
        </div>
    </div>

    <div id="result-overlay">
        <div style="background:var(--panel); padding:40px; border-radius:30px; text-align:center; border:4px solid #f1c40f; width: 85%;">
            <h1 id="res-title" style="font-size:38px; font-weight:900; color:#f1c40f;">YOU WIN!</h1>
            <p id="res-sub" style="font-size:22px; font-weight:900; color:#4ade80; margin:15px 0;">+₹18.00</p>
            <button onclick="location.reload()" style="padding:15px 40px; border-radius:15px; border:none; background:#f1c40f; color:#000; font-weight:900; cursor:pointer;">PLAY AGAIN</button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const token = localStorage.getItem("token");
        if (!token) location.href = "login.html";

        // Use API_URL from config.js for connection
        console.log("Connecting to Socket.io at:", typeof API_URL !== 'undefined' ? API_URL : window.location.origin);
        const socket = io(typeof API_URL !== 'undefined' ? API_URL : window.location.origin, { auth: { token } });

        socket.on('connect', () => { console.log("Socket connected successfully!"); });
        socket.on('connect_error', (err) => { console.error("Socket connection error:", err.message); });

        // Handle WebView Back Button with Permission
        function handleBack() {
            if (confirm("Do you want to exit the game? Any progress will be lost.")) {
                location.href = "dashboard.html";
            } else {
                history.pushState(null, null, window.location.pathname);
            }
        }
        window.addEventListener('popstate', handleBack);
        history.pushState(null, null, window.location.pathname);

        let myId = "", currentRoom = null, myPlayerIndex = -1, gameState = null, isMoving = false, boardRotation = 0;

        // Sounds
        const sndDice = new Audio('sound/dice2.mp3');
        const sndMove = new Audio('sound/move.mp3');
        const sndKill = new Audio('sound/kill.mp3');
        const sndStar = new Audio('sound/collect-token.mp3');
        const sndWin = new Audio('sound/gotiwun.mp3');
        const sndBg = new Audio('https://www.soundjay.com/misc/sounds/wind-chime-1.mp3');
        sndBg.loop = true;

        function initSounds() {
            const unlock = () => {
                [sndDice, sndMove, sndKill, sndStar, sndWin].forEach(s => { s.play().then(() => { s.pause(); s.currentTime = 0; }); });
                sndBg.play().catch(e => {});
                window.removeEventListener('touchstart', unlock);
                window.removeEventListener('click', unlock);
            };
            window.addEventListener('touchstart', unlock);
            window.addEventListener('click', unlock);
        }
        initSounds();

        function createBoard() {
            const board = document.getElementById('board'); board.innerHTML = "";
            for (let r = 0; r < 15; r++) {
                for (let c = 0; c < 15; c++) {
                    const cell = document.createElement('div'); cell.className = 'cell'; cell.id = `c-${r}-${c}`;
                    if (r < 6 && c < 6) {
                        if (r === 0 && c === 0) { cell.className = 'base red-bg'; cell.innerHTML = '<div class="base-inner"><div class="slot" id="s0-0"></div><div class="slot" id="s0-1"></div><div class="slot" id="s0-2"></div><div class="slot" id="s0-3"></div></div>'; }
                        else if (r > 0 || c > 0) { cell.style.display = 'none'; continue; }
                    } else if (r < 6 && c > 8) {
                        if (r === 0 && c === 9) { cell.className = 'base blue-bg'; cell.innerHTML = '<div class="base-inner"><div class="slot" id="s1-0"></div><div class="slot" id="s1-1"></div><div class="slot" id="s1-2"></div><div class="slot" id="s1-3"></div></div>'; }
                        else if (r > 0 || c > 9) { cell.style.display = 'none'; continue; }
                    } else if (r > 8 && c > 8) {
                        if (r === 9 && c === 9) { cell.className = 'base yellow-bg'; cell.innerHTML = '<div class="base-inner"><div class="slot" id="s2-0"></div><div class="slot" id="s2-1"></div><div class="slot" id="s2-2"></div><div class="slot" id="s2-3"></div></div>'; }
                        else if (r > 9 || c > 9) { cell.style.display = 'none'; continue; }
                    } else if (r > 8 && c < 6) {
                        if (r === 9 && c === 0) { cell.className = 'base green-bg'; cell.innerHTML = '<div class="base-inner"><div class="slot" id="s3-0"></div><div class="slot" id="s3-1"></div><div class="slot" id="s3-2"></div><div class="slot" id="s3-3"></div></div>'; }
                        else if (r > 9 || c > 0) { cell.style.display = 'none'; continue; }
                    }
                    if (r === 7 && c > 0 && c < 6) cell.classList.add('red-bg');
                    if (c === 7 && r > 0 && r < 6) cell.classList.add('blue-bg');
                    if (r === 7 && c > 8 && c < 14) cell.classList.add('yellow-bg');
                    if (c === 7 && r > 8 && r < 14) cell.classList.add('green-bg');

                    if ((r === 6 && c === 1) || (r === 1 && c === 8) || (r === 8 && c === 13) || (r === 13 && c === 6)) {
                        cell.classList.add('safe');
                        if (r === 6 && c === 1) cell.classList.add('red-bg');
                        if (r === 1 && c === 8) cell.classList.add('blue-bg');
                        if (r === 8 && c === 13) cell.classList.add('yellow-bg');
                        if (r === 13 && c === 6) cell.classList.add('green-bg');
                    }
                    if ((r === 2 && c === 6) || (r === 6 && c === 12) || (r === 12 && c === 8) || (r === 8 && c === 2)) cell.classList.add('safe');
                    if (r === 6 && c === 6) {
                        cell.className = 'center';
                        cell.innerHTML = `<svg viewBox="0 0 100 100">
                            <path d="M0 0 L50 50 L0 100 Z" fill="var(--red-main)"/>
                            <path d="M0 0 L100 0 L50 50 Z" fill="var(--blue-main)"/>
                            <path d="M100 0 L100 100 L50 50 Z" fill="var(--yellow-main)"/>
                            <path d="M0 100 L100 100 L50 50 Z" fill="var(--green-main)"/>
                        </svg>`;
                        cell.style.gridColumn = "span 3"; cell.style.gridRow = "span 3";
                    } else if (r >= 6 && r <= 8 && c >= 6 && c <= 8) { cell.style.display = 'none'; continue; }
                    board.appendChild(cell);
                }
            }
        }

        const cellMap = {};
        function initCellMap() {
            // Standard Ludo common path starting from Red Star
            const p = [ {r:6,c:1},{r:6,c:2},{r:6,c:3},{r:6,c:4},{r:6,c:5},{r:5,c:6},{r:4,c:6},{r:3,c:6},{r:2,c:6},{r:1,c:6},{r:0,c:6},{r:0,c:7},{r:0,c:8},{r:1,c:8},{r:2,c:8},{r:3,c:8},{r:4,c:8},{r:5,c:8},{r:6,c:9},{r:6,c:10},{r:6,c:11},{r:6,c:12},{r:6,c:13},{r:6,c:14},{r:7,c:14},{r:8,c:14},{r:8,c:13},{r:8,c:12},{r:8,c:11},{r:8,c:10},{r:8,c:9},{r:9,c:8},{r:10,c:8},{r:11,c:8},{r:12,c:8},{r:13,c:8},{r:14,c:8},{r:14,c:7},{r:14,c:6},{r:13,c:6},{r:12,c:6},{r:11,c:6},{r:10,c:6},{r:9,c:6},{r:8,c:5},{r:8,c:4},{r:8,c:3},{r:8,c:2},{r:8,c:1},{r:8,c:0},{r:7,c:0},{r:6,c:0} ];
            p.forEach((pos, i) => cellMap[i] = pos);

            // Home paths for each color
            for(let i=1; i<=6; i++) cellMap[100+i] = {r:7, c:i};    // Red Home
            for(let i=1; i<=6; i++) cellMap[200+i] = {r:i, c:7};    // Blue Home
            for(let i=1; i<=6; i++) cellMap[300+i] = {r:7, c:14-i}; // Yellow Home
            for(let i=1; i<=6; i++) cellMap[400+i] = {r:14-i, c:7};// Green Home
        }

        function joinLudo(amount) {
            socket.emit('ludo_join', { amount });
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('search-overlay').style.display = 'flex';
            document.getElementById('prize-text').innerText = (amount * 1.8).toFixed(2);
            initSounds();
        }

        function rollDice() {
            if (!gameState || gameState.turn !== myPlayerIndex || gameState.rolled || isMoving) return;
            socket.emit('ludo_roll', { roomId: currentRoom });
        }

        function sendChat() { const i = document.getElementById('chatInput'); if(i.value) { socket.emit('ludo_chat', { roomId: currentRoom, message: i.value }); i.value = ''; } }
        function sendEmoji(e) { socket.emit('ludo_chat', { roomId: currentRoom, emoji: e }); }

        socket.on('ludo_state', (state) => {
            gameState = state; currentRoom = state.id;
            if (state.gameState === 'PLAYING') document.getElementById('search-overlay').style.display = 'none';
            updateUI(state);
        });

        socket.on('ludo_timer', (data) => { const min = Math.floor(data.gameTimer / 60); const sec = data.gameTimer % 60; document.getElementById('game-clock').innerText = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`; });

        socket.on('dice_rolled', (data) => {
            const icons = ["one", "two", "three", "four", "five", "six"];
            const html = `<i class="fas fa-dice-${icons[data.dice - 1]}"></i>`;
            const el = (data.turn === myPlayerIndex) ? document.getElementById('diceBtn') : document.getElementById('opp-dice');
            el.classList.remove('rolling'); void el.offsetWidth; el.classList.add('rolling');

            sndDice.currentTime = 0;
            sndDice.play().catch(e=> console.warn("Audio blocked", e));

            setTimeout(() => { el.classList.remove('rolling'); el.innerHTML = html; }, 800);
        });

        socket.on('token_moved', async (data) => {
            isMoving = true;
            const colors = ['red', 'blue', 'yellow', 'green'];
            const token = document.querySelector(`.token.${colors[data.playerColor]}[data-idx="${data.tokenIndex}"]`);

            if (token) {
                // Token size fix and upright rotation
                token.style.width = "22px"; token.style.height = "30px";

                for (let i = 0; i < data.path.length; i++) {
                    const pos = data.path[i];
                    await new Promise(res => setTimeout(res, 220));

                    let actualId;
                    if (pos >= 101) {
                        actualId = pos + (data.playerColor * 100);
                    } else {
                        // Offset common path based on player color (0:Red, 1:Blue, 2:Yellow, 3:Green)
                        actualId = (pos + (data.playerColor * 13)) % 52;
                    }

                    const coords = cellMap[actualId];
                    const cell = document.getElementById(`c-${coords.r}-${coords.c}`);

                    if (cell) {
                        cell.appendChild(token);
                        const exist = cell.querySelectorAll('.token').length - 1;
                        const offset = exist * 2;

                        if (cell.classList.contains('safe')) {
                            token.classList.add('on-star');
                            token.style.transform = `translate(calc(-50% + ${offset}px), calc(-50% + ${offset}px)) scale(0.7) rotate(${-boardRotation}deg)`;
                        } else {
                            token.classList.remove('on-star');
                            token.style.transform = `translate(calc(-50% + ${offset}px), calc(-50% + ${offset}px)) rotate(${-boardRotation}deg)`;
                        }
                    }

                    if (i === data.path.length - 1) { // Final position
                        if (pos >= 57) { sndWin.play().catch(e=>{}); }
                        else if (cell && cell.classList.contains('safe')) { sndStar.play().catch(e=>{}); }
                        else { sndMove.currentTime = 0; sndMove.play().catch(e=>{}); }
                    } else {
                        sndMove.currentTime = 0; sndMove.play().catch(e=>{});
                    }
                }
            }

            if (data.killed) {
                setTimeout(() => {
                    sndKill.play().catch(e=>{});
                    const killedToken = document.querySelector(`.token.${colors[data.killData.color]}[data-idx="${data.killData.index}"]`);
                    if (killedToken) {
                        killedToken.style.transition = "all 0.6s cubic-bezier(0.4, 0, 0.2, 1)";
                        const baseSlot = document.getElementById(`s${data.killData.color}-${data.killData.index}`);
                        if (baseSlot) {
                            baseSlot.appendChild(killedToken);
                            killedToken.style.transform = `translate(-50%, -50%) rotate(${-boardRotation}deg)`;
                        }
                        setTimeout(() => killedToken.style.transition = "all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275)", 700);
                    }
                }, 100);
            }

            document.getElementById('my-score').innerText = data.scores[myPlayerIndex];
            document.getElementById('opp-score').innerText = data.scores[1 - myPlayerIndex];
            isMoving = false;
            updateUI(gameState);
        });

        socket.on('ludo_chat_received', (data) => {
            const b = document.createElement('div'); b.className = 'chat-bubble'; b.innerText = `${data.name}: ${data.emoji || data.message}`;
            const ui = document.getElementById('chat-ui'); ui.appendChild(b);
            setTimeout(() => b.remove(), 4000);
        });

        socket.on('error_msg', (data) => { alert(data.message); location.reload(); });

        function updateUI(state) {
            myId = socket.user?.id || socket.user?._id;
            myPlayerIndex = state.players.findIndex(p => p.id === myId?.toString());

            if (myPlayerIndex === -1) return;

            const me = state.players[myPlayerIndex];
            const opp = state.players.find(p => p.id !== me.id) || { name: "Waiting...", score: 0, color: (me.color + 1) % 4 };
            const colorNames = ['red', 'blue', 'yellow', 'green'];

            // Board Rotation: Always put my color at bottom
            // 0: Red (TL), 1: Blue (TR), 2: Yellow (BR), 3: Green (BL)
            // We want 'me.color' to move to BR (Index 2)
            boardRotation = (2 - me.color) * 90;
            const board = document.getElementById('board');
            board.style.transform = `rotate(${boardRotation}deg)`;

            // Counter-rotate elements to keep them upright
            document.querySelectorAll('.base-inner, .cell.safe::after').forEach(el => {
                el.style.transform = `rotate(${-boardRotation}deg)`;
            });

            document.getElementById('my-name').innerText = me.name;
            document.getElementById('my-score').innerText = me.score;
            document.getElementById('my-avatar').src = me.avatar?.startsWith('http') ? me.avatar : `${API_URL}/${me.avatar}`;
            document.getElementById('opp-name').innerText = opp.name;
            document.getElementById('opp-avatar').src = opp.avatar?.startsWith('http') ? opp.avatar : (opp.avatar ? (opp.avatar.startsWith('/')?API_URL+opp.avatar:opp.avatar) : 'https://i.pravatar.cc/100?u=opp');
            document.getElementById('opp-score').innerText = opp.score;

            const myDice = document.getElementById('diceBtn');
            const oppDice = document.getElementById('opp-dice');
            myDice.style.borderColor = `var(--${colorNames[me.color]}-main)`;
            oppDice.style.borderColor = `var(--${colorNames[opp.color]}-main)`;
            if (state.turn === myPlayerIndex) myDice.classList.add('active'); else myDice.classList.remove('active');

            document.getElementById('my-score-circle').style.borderColor = `var(--${colorNames[me.color]}-main)`;
            document.getElementById('opp-score-circle').style.borderColor = `var(--${colorNames[opp.color]}-main)`;

            if (!isMoving) renderTokens(state.board.tokens);
        }

        function renderTokens(tokens) {
            document.querySelectorAll('.token').forEach(t => t.remove());
            const colors = ['red', 'blue', 'yellow', 'green'];
            Object.keys(tokens).forEach(colorIdx => {
                const colorName = colors[colorIdx];
                tokens[colorIdx].forEach((pos, tIdx) => {
                    const token = document.createElement('div');
                    token.className = `token ${colorName}`;
                    token.setAttribute('data-idx', tIdx);
                    token.innerHTML = `<div class="token-body"><div class="pin-head"></div></div>`;

                    const isMyTurn = gameState.turn === myPlayerIndex;
                    const isMyColor = gameState.players[myPlayerIndex].color == colorIdx;
                    if (isMyTurn && isMyColor && gameState.rolled) token.classList.add('active');
                    token.onclick = (e) => { if (isMyTurn && isMyColor && !isMoving) socket.emit('ludo_move', { roomId: currentRoom, tokenIndex: tIdx }); };

                    // Counter-rotate token content and center it
                    token.style.transform = `translate(-50%, -50%) rotate(${-boardRotation}deg)`;

                    if (pos === -1) {
                        const slot = document.getElementById(`s${colorIdx}-${tIdx}`);
                        if (slot) {
                            slot.appendChild(token);
                            token.style.transform = `translate(-50%, -50%) rotate(${-boardRotation}deg)`;
                        }
                    } else {
                        let actualId;
                        if (pos >= 101) {
                            actualId = pos + (Number(colorIdx) * 100);
                        } else {
                            actualId = (pos + (Number(colorIdx) * 13)) % 52;
                        }

                        const coords = cellMap[actualId];
                        if (coords) {
                            const cell = document.getElementById(`c-${coords.r}-${coords.c}`);
                            if (cell) {
                                if (cell.classList.contains('safe')) token.classList.add('on-star');
                                const exist = cell.querySelectorAll('.token').length;
                                const offset = exist * 2;
                                const tScale = cell.classList.contains('safe') ? 0.65 : 1;
                                token.style.transform = `translate(calc(-50% + ${offset}px), calc(-50% + ${offset}px)) scale(${tScale}) rotate(${-boardRotation}deg)`;
                                cell.appendChild(token);
                            }
                        }
                    }
                });
            });
        }

        socket.on('game_over', (data) => {
            const overlay = document.getElementById('result-overlay'); overlay.style.display = 'flex';
            if (data.winnerId.toString() === myId?.toString()) { document.getElementById('res-title').innerText = "YOU WIN!"; }
            else { document.getElementById('res-title').innerText = "YOU LOSE"; document.getElementById('res-title').style.color = "var(--red-main)"; }
        });

        initCellMap(); createBoard();
        const profileUrl = (typeof API_URL !== 'undefined' ? API_URL : window.location.origin) + '/api/profile';
        fetch(profileUrl, { headers: { authorization: token } }).then(r => r.json()).then(d => {
            if(d.success) {
                socket.user = d.user;
                if (gameState) updateUI(gameState);
            }
        });
    </script>
</body>
</html>
