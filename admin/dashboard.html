    <script>const API_URL = window.location.origin;const API_URL = window.location.origin;<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Solo Casino</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-sidebar {
            width: 250px;
            background: var(--bg-card);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 20px;
            border-right: 1px solid var(--glass-border);
            z-index: 100;
        }
        .admin-main {
            margin-left: 250px;
            padding: 30px;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            text-align: center;
        }
        .stat-card i { font-size: 24px; color: var(--primary); margin-bottom: 10px; }
        .stat-card h4 { color: var(--text-dim); font-size: 14px; text-transform: uppercase; }
        .stat-card .value { font-size: 28px; font-weight: 800; margin-top: 5px; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-card);
            border-radius: 15px;
            overflow: hidden;
            margin-top: 20px;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
            font-size: 14px;
        }
        th { background: rgba(255,255,255,0.03); color: var(--text-dim); font-weight: 500; }

        .action-btn {
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            margin-right: 5px;
            transition: 0.2s;
        }
        .btn-edit { background: var(--secondary); color: white; }
        .btn-block { background: var(--accent-red); color: white; }
        .btn-unblock { background: var(--accent-green); color: white; }
        .btn-delete { background: #333; color: white; }

        .sidebar-link {
            display: block;
            padding: 12px 15px;
            color: var(--text-dim);
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 5px;
            transition: 0.3s;
            cursor: pointer;
        }
        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(255, 152, 0, 0.1);
            color: var(--primary);
        }
        .sidebar-link i { margin-right: 10px; width: 20px; }

        .control-panel {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .control-card {
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
        }
        .control-card h4 { color: var(--primary); margin-bottom: 15px; border-bottom: 1px solid rgba(255,152,0,0.2); padding-bottom: 10px; }

        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge-pending { background: rgba(255, 152, 0, 0.1); color: var(--primary); }
        .badge-success { background: rgba(76, 175, 80, 0.1); color: var(--accent-green); }
        .badge-danger { background: rgba(244, 67, 54, 0.1); color: var(--accent-red); }
    </style>
</head>
<body style="background: #050507;">
    <div class="admin-sidebar">
        <h1 style="font-size: 20px; color: var(--primary); margin-bottom: 40px;">ADMIN PANEL</h1>
        <a class="sidebar-link active" onclick="showSection('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a class="sidebar-link" onclick="showSection('users')"><i class="fas fa-users"></i> Users</a>
        <a class="sidebar-link" onclick="showSection('deposits')"><i class="fas fa-wallet"></i> Deposits</a>
        <a class="sidebar-link" onclick="showSection('withdrawals')"><i class="fas fa-university"></i> Withdrawals</a>
        <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 20px 0;">
        <a class="sidebar-link" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>

    <div class="admin-main">
        <!-- Dashboard Section -->
        <div id="section-dashboard">
            <h2 style="margin-bottom: 25px;">Live Game Control</h2>

            <div class="control-panel">
                <div class="control-card">
                    <h4><i class="fas fa-plane"></i> Aviator Control</h4>
                    <label style="font-size: 12px; color: var(--text-dim);">Set Next Crash</label>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <input type="number" id="forceAviatorMult" value="1.5" step="0.1" style="flex: 1; padding: 8px; background: #111; border: 1px solid #333; color: white; border-radius: 5px;">
                        <button class="action-btn btn-edit" onclick="forceAviator()">SET</button>
                    </div>
                </div>

                <div class="control-card">
                    <h4><i class="fas fa-dice"></i> Big Small</h4>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <button class="action-btn btn-block" onclick="forceGame('bigsmall', 'SMALL')" style="padding: 10px;">SMALL</button>
                        <button class="action-btn btn-unblock" onclick="forceGame('bigsmall', 'BIG')" style="padding: 10px;">BIG</button>
                    </div>
                </div>

                <div class="control-card">
                    <h4><i class="fas fa-spade"></i> Teen Patti</h4>
                    <select id="tpTableSelect" style="width: 100%; padding: 10px; background: #111; color: white; border: 1px solid #333; border-radius: 8px;">
                        <option value="1">Table 1</option>
                        <option value="2">Table 2</option>
                        <option value="3">Table 3</option>
                    </select>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <button class="action-btn btn-block" onclick="forceGame('teenpatti', 'DEALER_WINS', document.getElementById('tpTableSelect').value)" style="flex: 1;">Dealer Win</button>
                        <button class="action-btn btn-unblock" onclick="forceGame('teenpatti', 'PLAYERS_WIN', document.getElementById('tpTableSelect').value)" style="flex: 1;">Player Win</button>
                    </div>
                </div>
            </div>

            <div class="stat-grid">
                <div class="stat-card">
                    <i class="fas fa-users"></i>
                    <h4>Total Users</h4>
                    <div class="value" id="stat-totalUsers">0</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-coins"></i>
                    <h4>Total Coins</h4>
                    <div class="value" id="stat-totalCoins">0</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-vault"></i>
                    <h4>Admin Profit</h4>
                    <div class="value" id="stat-adminWallet">0</div>
                </div>
            </div>

            <h3>Active Teen Patti Tables</h3>
            <div id="tp-tables-container" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 40px;"></div>

            <h3>Recent Game Logs</h3>
            <table style="margin-top: 10px;">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Game</th>
                        <th>Amount</th>
                        <th>Details</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="game-logs-body"></tbody>
            </table>
        </div>

        <!-- Users Section -->
        <div id="section-users" style="display: none;">
            <h2>User Management</h2>
            <div style="display: flex; gap: 10px; margin: 20px 0;">
                <input type="text" id="userSearch" placeholder="Search by name or email..." style="flex: 1; padding: 10px; background: var(--bg-card); border: 1px solid var(--glass-border); color: white; border-radius: 10px;">
                <button class="button-primary" onclick="fetchUsers()">Search</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Coins</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="users-body"></tbody>
            </table>
        </div>

        <!-- Deposits Section -->
        <div id="section-deposits" style="display: none;">
            <h2>Deposit Requests</h2>
            <table>
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Amount</th>
                        <th>Method</th>
                        <th>Details</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="deposits-body"></tbody>
            </table>
        </div>

        <!-- Withdrawals Section -->
        <div id="section-withdrawals" style="display: none;">
            <h2>Withdrawal Requests</h2>
            <table>
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Amount</th>
                        <th>Details</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="withdrawals-body"></tbody>
            </table>
        </div>
    </div>

    <script>const API_URL = window.location.origin;
        const token = localStorage.getItem("adminToken");
        if (!token) location.href = "login.html";

        function showSection(sectionId) {
            document.querySelectorAll('.admin-main > div').forEach(div => div.style.display = 'none');
            document.getElementById('section-' + sectionId).style.display = 'block';
            document.querySelectorAll('.sidebar-link').forEach(link => link.classList.remove('active'));
            if(event && event.currentTarget) if(event && event.currentTarget) event.currentTarget.classList.add('active');

            if (sectionId === 'users') fetchUsers();
            if (sectionId === 'deposits') fetchRequests('deposit');
            if (sectionId === 'withdrawals') fetchRequests('withdraw');
            if (sectionId === 'dashboard') fetchStats();
        }

        async function fetchStats() {
            try {
                const res = await fetch(`${API_URL}/api/admin/stats", { headers: { authorization: token } });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('stat-totalUsers').innerText = data.stats.totalUsers;
                    document.getElementById('stat-totalCoins').innerText = data.stats.totalCoins.toLocaleString();
                    document.getElementById('stat-adminWallet').innerText = data.stats.adminWalletBalance.toLocaleString();
                }
                fetchGameLogs();
                fetchTPTables();
            } catch (e) { console.error(e); }
        }

        async function fetchGameLogs() {
            const res = await fetch(`${API_URL}/api/admin/game-logs", { headers: { authorization: token } });
            const logs = await res.json();
            const body = document.getElementById('game-logs-body');
            body.innerHTML = logs.map(log => `
                <tr>
                    <td>${log.name}</td>
                    <td><span class="badge badge-pending">${log.type.split('_')[1]}</span></td>
                    <td style="color: ${log.amount < 0 ? 'var(--accent-red)' : 'var(--accent-green)'}; font-weight: bold;">
                        ${log.amount > 0 ? '+' : ''}${log.amount}
                    </td>
                    <td>${log.details}</td>
                    <td>${new Date(log.created_at).toLocaleTimeString()}</td>
                </tr>
            `).join('');
        }

        async function fetchTPTables() {
            const res = await fetch(`${API_URL}/api/teenpatti/tables", { headers: { authorization: token } });
            const data = await res.json();
            const container = document.getElementById('tp-tables-container');
            container.innerHTML = data.tables.map(t => `
                <div class="control-card">
                    <div style="display: flex; justify-content: space-between;">
                        <b>Table ${t.id}</b>
                        <span class="badge ${t.state === 'BETTING' ? 'badge-pending' : 'badge-success'}">${t.state}</span>
                    </div>
                    <div style="margin-top: 10px; font-size: 13px;">
                        Players: ${t.playerCount}/6 | Timer: ${t.timer}s
                    </div>
                </div>
            `).join('');
        }

        async function fetchUsers() {
            const keyword = document.getElementById('userSearch').value;
            const url = keyword ? `${API_URL}/api/admin/search-user/${keyword}` : `${API_URL}/api/admin/users";
            const res = await fetch(url, { headers: { authorization: token } });
            const users = await res.json();
            const body = document.getElementById('users-body');
            body.innerHTML = users.map(user => `
                <tr>
                    <td>${user.name}</td>
                    <td>${user.email}</td>
                    <td>${user.coins}</td>
                    <td><span class="badge ${user.status === 'active' ? 'badge-success' : 'badge-danger'}">${user.status}</span></td>
                    <td>
                        <button class="action-btn btn-edit" onclick="updateCoins(${user.id}, ${user.coins})">Coins</button>
                        ${user.status === 'active'
                            ? `<button class="action-btn btn-block" onclick="toggleUser(${user.id}, 'block')">Block</button>`
                            : `<button class="action-btn btn-unblock" onclick="toggleUser(${user.id}, 'unblock')">Unblock</button>`
                        }
                    </td>
                </tr>
            `).join('');
        }

        async function fetchRequests(type) {
            const res = await fetch(`${API_URL}/api/admin/deposits", { headers: { authorization: token } });
            const all = await res.json();
            const requests = all.filter(r => (type === 'withdraw' ? (type === 'withdraw' ? r.payment_method === 'withdraw' : r.payment_method !== 'withdraw') : r.payment_method !== 'withdraw'));
            const body = document.getElementById(type === 'withdraw' ? 'withdrawals-body' : 'deposits-body');
            body.innerHTML = requests.map(r => `
                <tr>
                    <td>${r.name}</td>
                    <td>${r.amount}</td>
                    ${type === 'deposit' ? `<td>${r.payment_method}</td>` : ''}
                    <td>${r.details}</td>
                    <td><span class="badge ${r.status === 'pending' ? 'badge-pending' : (r.status === 'approved' ? 'badge-success' : 'badge-danger')}">${r.status}</span></td>
                    <td>
                        ${r.status === 'pending' ? `
                            <button class="action-btn btn-unblock" onclick="handleRequest(${r.id}, 'approve')">Approve</button>
                            <button class="action-btn btn-block" onclick="handleRequest(${r.id}, 'reject')">Reject</button>
                        ` : '--'}
                    </td>
                </tr>
            `).join('');
        }

        async function handleRequest(id, action) {
            const res = await fetch(`${API_URL}/api/admin/deposits/${id}/${action}`, {
                method: "POST",
                headers: { authorization: token }
            });
            const data = await res.json();
            alert(data.message);
            location.reload();
        }

        async function updateCoins(id, current) {
            const amount = prompt("Enter new coin balance:", current);
            if (amount === null) return;
            const res = await fetch(`${API_URL}/api/admin/update-coins", {
                method: "POST",
                headers: { "Content-Type": "application/json", authorization: token },
                body: JSON.stringify({ userId: id, coins: amount })
            });
            const data = await res.json();
            if (data.success) fetchUsers();
        }

        async function toggleUser(id, action) {
            const res = await fetch(`${API_URL}/api/admin/${action}-user`, {
                method: "POST",
                headers: { "Content-Type": "application/json", authorization: token },
                body: JSON.stringify({ userId: id })
            });
            const data = await res.json();
            if (data.success) fetchUsers();
        }

        async function forceGame(game, result, tableId = null) {
            const res = await fetch(`${API_URL}/api/admin/force-result", {
                method: "POST",
                headers: { "Content-Type": "application/json", authorization: token },
                body: JSON.stringify({ game, result, tableId })
            });
            const data = await res.json();
            alert(data.message);
        }

        async function forceAviator() {
            const multiplier = document.getElementById('forceAviatorMult').value;
            const res = await fetch(`${API_URL}/api/admin/force-result", {
                method: "POST",
                headers: { "Content-Type": "application/json", authorization: token },
                body: JSON.stringify({ game: 'aviator', multiplier })
            });
            const data = await res.json();
            alert(data.message);
        }

        function logout() {
            localStorage.removeItem("adminToken");
            location.href = "login.html";
        }

        setInterval(fetchStats, 5000);
        fetchStats();
    </script>
</body>
</html>
