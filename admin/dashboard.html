<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Solo Casino</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-sidebar {
            width: 250px;
            background: var(--bg-card);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 20px;
            border-right: 1px solid var(--glass-border);
            z-index: 100;
        }
        .admin-main { margin-left: 250px; padding: 30px; }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            text-align: center;
        }
        .stat-card i { font-size: 24px; color: var(--primary); margin-bottom: 10px; }
        .stat-card .value { font-size: 28px; font-weight: 800; margin-top: 5px; }

        .control-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .control-card {
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
        }
        .control-card h4 { color: var(--primary); margin-bottom: 15px; border-bottom: 1px solid rgba(255,152,0,0.2); padding-bottom: 10px; }

        table { width: 100%; border-collapse: collapse; background: var(--bg-card); margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--glass-border); font-size: 13px; }

        .live-bet-table { font-size: 11px; margin-top: 10px; background: rgba(0,0,0,0.2); }
        .action-btn { padding: 8px 12px; border-radius: 8px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; margin-right: 5px; }
        .btn-edit { background: var(--secondary); color: white; }
        .btn-block { background: var(--accent-red); color: white; }
        .btn-unblock { background: var(--accent-green); color: white; }

        .sidebar-link { display: block; padding: 12px 15px; color: var(--text-dim); text-decoration: none; border-radius: 10px; margin-bottom: 5px; cursor: pointer; }
        .sidebar-link.active { background: rgba(255, 152, 0, 0.1); color: var(--primary); }
    </style>
</head>
<body style="background: #050507;">
    <div class="admin-sidebar">
        <h1 style="font-size: 20px; color: var(--primary); margin-bottom: 40px;">ADMIN PANEL</h1>
        <a class="sidebar-link active" onclick="showSection('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a class="sidebar-link" onclick="showSection('users')"><i class="fas fa-users"></i> Users</a>
        <a class="sidebar-link" onclick="showSection('deposits')"><i class="fas fa-wallet"></i> Deposits</a>
        <a class="sidebar-link" onclick="showSection('withdrawals')"><i class="fas fa-university"></i> Withdrawals</a>
        <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 20px 0;">
        <a class="sidebar-link" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>

    <div class="admin-main">
        <div id="section-dashboard">
            <h2>Live Game Control</h2>
            <div class="control-panel">
                <!-- Color Game Control -->
                <div class="control-card">
                    <h4><i class="fas fa-palette"></i> Color Game</h4>
                    <div style="margin-bottom: 10px;">
                        <label style="font-size: 11px;">Force Number (1-20)</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="number" id="forceColorNum" min="1" max="20" style="width: 60px; padding: 5px;">
                            <button class="action-btn btn-edit" onclick="forceGame('color', null, null, document.getElementById('forceColorNum').value)">SET</button>
                            <button class="action-btn btn-unblock" onclick="toggleAutoOpen(true)">AUTO ON</button>
                            <button class="action-btn btn-block" onclick="toggleAutoOpen(false)">AUTO OFF</button>
                        </div>
                    </div>
                    <div id="live-bets-color" class="live-bet-table"></div>
                </div>

                <!-- Lucky Draw Control -->
                <div class="control-card">
                    <h4><i class="fas fa-star"></i> Lucky Draw</h4>
                    <button class="action-btn btn-unblock" style="width: 100%;" onclick="forceGame('luckydraw')">FORCE 777 NEXT</button>
                    <div id="live-bets-lucky" class="live-bet-table" style="margin-top: 10px;"></div>
                </div>

                <!-- Spin Game Control -->
                <div class="control-card">
                    <h4><i class="fas fa-sync"></i> Spin Game</h4>
                    <div style="display: flex; gap: 5px;">
                        <input type="number" id="forceSpinIndex" placeholder="Index (0-11)" style="flex: 1; padding: 5px;">
                        <button class="action-btn btn-edit" onclick="forceGame('spin', document.getElementById('forceSpinIndex').value)">SET</button>
                    </div>
                    <div id="live-bets-spin" class="live-bet-table"></div>
                </div>

                <!-- Rummy Control -->
                <div class="control-card">
                    <h4><i class="fas fa-playing-cards"></i> Rummy</h4>
                    <div style="display: flex; gap: 5px; flex-direction: column;">
                        <input type="number" id="rummyTableId" placeholder="Table ID" style="padding: 5px;">
                        <input type="text" id="rummyWinnerId" placeholder="Winner User ID" style="padding: 5px;">
                        <button class="action-btn btn-edit" onclick="forceGame('rummy', document.getElementById('rummyWinnerId').value, document.getElementById('rummyTableId').value)">SET WINNER</button>
                    </div>
                    <div id="live-bets-rummy" class="live-bet-table"></div>
                </div>
            </div>

            <div class="stat-grid">
                <div class="stat-card"><h4>Users</h4><div class="value" id="stat-totalUsers">0</div></div>
                <div class="stat-card"><h4>Total Coins</h4><div class="value" id="stat-totalCoins">0</div></div>
                <div class="stat-card"><h4>Admin Profit</h4><div class="value" id="stat-adminWallet">0</div></div>
            </div>

            <h3>Recent Game Logs</h3>
            <table id="game-logs"><thead><tr><th>User</th><th>Game</th><th>Amount</th><th>Details</th><th>Time</th></tr></thead><tbody id="game-logs-body"></tbody></table>
        </div>

        <!-- Section Users, Deposits, Withdrawals (Placeholder for structure) -->
        <div id="section-users" style="display:none;"><h2>User Management</h2><table id="users-table"></table></div>
        <div id="section-deposits" style="display:none;"><h2>Deposits</h2><table id="deposits-table"></table></div>
        <div id="section-withdrawals" style="display:none;"><h2>Withdrawals</h2><table id="withdrawals-table"></table></div>
    </div>

    <script>
        const API_URL = window.location.origin;
        const token = localStorage.getItem("adminToken");
        if (!token) location.href = "login.html";

        async function fetchStats() {
            const res = await fetch(`${API_URL}/api/admin/stats`, { headers: { authorization: token } });
            const data = await res.json();
            if (data.success) {
                const s = data.stats;
                document.getElementById('stat-totalUsers').innerText = s.totalUsers;
                document.getElementById('stat-totalCoins').innerText = s.totalCoins.toLocaleString();
                document.getElementById('stat-adminWallet').innerText = s.adminWalletBalance.toLocaleString();

                renderLiveBets('color', s.liveBets.color);
                renderLiveBets('lucky', s.liveBets.luckydraw);
                renderLiveBets('spin', s.liveBets.spin);
                renderLiveBets('rummy', s.liveBets.rummy);
            }
        }

        function renderLiveBets(game, bets) {
            const container = document.getElementById(`live-bets-${game}`);
            if (game === 'rummy') {
                container.innerHTML = bets.map(t => `<div>Table ${t.id}: ${Object.keys(t.players).length} Players</div>`).join('');
                return;
            }
            container.innerHTML = `<div>Active Bets: ${bets.length} | Total Vol: ${bets.reduce((a,b)=>a+b.amount,0)}</div>`;
            if (bets.length > 0) {
                container.innerHTML += bets.map(b => `<div>${b.name}: ${b.amount} (${b.type || ''} ${b.value || ''})</div>`).slice(0,5).join('');
            }
        }

        async function forceGame(game, result = null, tableId = null, number = null) {
            const res = await fetch(`${API_URL}/api/admin/force-result`, {
                method: "POST",
                headers: { "Content-Type": "application/json", authorization: token },
                body: JSON.stringify({ game, result, tableId, number })
            });
            const data = await res.json();
            alert(data.message);
        }

        async function toggleAutoOpen(autoOpen) {
            const res = await fetch(`${API_URL}/api/admin/force-result`, {
                method: "POST",
                headers: { "Content-Type": "application/json", authorization: token },
                body: JSON.stringify({ game: 'color', autoOpen })
            });
            const data = await res.json();
            alert(data.message);
        }

        function showSection(id) {
            document.querySelectorAll('.admin-main > div').forEach(d => d.style.display = 'none');
            document.getElementById('section-' + id).style.display = 'block';
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function logout() { localStorage.removeItem("adminToken"); location.href = "login.html"; }

        setInterval(fetchStats, 3000);
        fetchStats();
    </script>
</body>
</html>
