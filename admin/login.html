<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Solo Casino</title>
   <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: radial-gradient(circle at center, #1a1a1a 0%, #050507 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center;">

    <div class="form-box animate" style="width: 100%; max-width: 400px; padding: 40px; background: rgba(21, 21, 24, 0.9); backdrop-filter: blur(10px);">
        <div style="text-align: center; margin-bottom: 30px;">
            <i class="fas fa-user-shield" style="font-size: 50px; color: var(--primary); margin-bottom: 15px;"></i>
            <h1 style="font-size: 24px; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">ADMIN SECURE LOGIN</h1>
            <p style="color: var(--text-dim); font-size: 14px; margin-top: 10px;">Authorized Access Only</p>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="font-size: 13px; color: var(--text-dim); display: block; margin-bottom: 8px;">Username</label>
            <input type="text" id="username" placeholder="Enter admin username" style="margin-bottom: 0;">
        </div>

        <div style="margin-bottom: 30px;">
            <label style="font-size: 13px; color: var(--text-dim); display: block; margin-bottom: 8px;">Password</label>
            <input type="password" id="password" placeholder="Enter password" style="margin-bottom: 0;">
        </div>

        <button class="button-primary" onclick="login()" style="width: 100%; padding: 16px; font-size: 16px;">
            <i class="fas fa-sign-in-alt" style="margin-right: 10px;"></i> ACCESS DASHBOARD
        </button>

        <div id="loginStatus" style="margin-top: 20px; text-align: center; font-size: 14px;"></div>
    </div>

    <script>
        async function login(){
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const status = document.getElementById("loginStatus");

            if(!username || !password) {
                status.innerText = "Please fill all fields";
                status.style.color = "var(--accent-red)";
                return;
            }

            status.innerText = "Authenticating...";
            status.style.color = "var(--primary)";

            try {
              const res = await fetch("https://casino-vri2.onrender.com/api/admin/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    status.innerText = "Access Granted! Redirecting...";
                    status.style.color = "var(--accent-green)";
                    localStorage.setItem("adminToken", data.token);
                    setTimeout(() => {
                        location.href = "dashboard.html";
                    }, 1000);
                } else {
                    status.innerText = data.message || "Invalid Credentials";
                    status.style.color = "var(--accent-red)";
                }
            } catch (err) {
                status.innerText = "Server error. Connection failed.";
                status.style.color = "var(--accent-red)";
            }
        }

        // Enter key to login
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
